name: git-cliff version
description: Install git-cliff and compute the next SemVer from conventional commits.

outputs:
  version:
    description: Next version tag (e.g. v1.3.0).
    value: ${{ steps.compute.outputs.version }}
  release:
    description: "true when commits since the last tag warrant a release."
    value: ${{ steps.compute.outputs.release }}

runs:
  using: composite
  steps:
    - id: compute
      shell: bash
      run: |
        # renovate: datasource=github-releases depName=orhun/git-cliff
        CLIFF_VERSION=v2.13.1
        curl -fsSL --retry 3 \
          "https://github.com/orhun/git-cliff/releases/download/${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION#v}-x86_64-unknown-linux-gnu.tar.gz" \
          | tar xz -C /usr/local/bin --strip-components=1 "git-cliff-${CLIFF_VERSION#v}/git-cliff"
        # Capture stderr so a git-cliff failure surfaces a diagnostic instead
        # of an opaque non-zero exit. The `if !` puts the assignment in a
        # condition context (so -e doesn't fire) and routes a non-zero exit to
        # an explicit, logged failure. A zero exit with empty output (compute
        # produced nothing) is also treated as a hard failure rather than a
        # silent release=false.
        #
        # --unreleased anchors the version base at the actual latest tag.
        # Without it, cliff derives the base from its post-filter release
        # history: a tag whose entire commit window is filtered out (all
        # commits excluded by exclude_paths or skip-typed — e.g. a legacy
        # release minted purely from CI-pin bumps) vanishes from that model,
        # so the base regresses to an older tag and the computed "next"
        # version can equal an EXISTING tag at a different commit — which the
        # release tag-create guard then refuses, failing the run. Verified on
        # git-cliff v2.13.1: bare mode at a filtered-empty latest tag returns
        # versions below `git describe`; --unreleased returns the latest tag
        # itself (no unreleased commits -> release=false) and bumps past
        # existing tags correctly when real commits are pending. Bootstrap
        # (no tags) still falls back to [bump].initial_tag.
        # --tag-pattern '^v[0-9]' is passed explicitly (CLI overrides config)
        # so the ROOT version universe never depends on the consumer's synced
        # cliff.toml being current: under a stale UNANCHORED config, a
        # prefixed tag (a nested-module lane tag like yamlenv/v1.0.0, even an
        # orphaned one left behind after a lane dir was deleted) would hijack
        # --bumped-version into returning a lane-prefixed "root" version.
        # Probe state H3 in cplieger/ci pins the override semantics.
        if ! NEXT="$(git cliff --unreleased --bumped-version --tag-pattern '^v[0-9]' 2>/tmp/cliff.err)"; then
          echo "::error::git-cliff --bumped-version failed:"
          sed 's/^/  /' /tmp/cliff.err >&2 || true
          exit 1
        fi
        if [ -z "$NEXT" ]; then
          echo "::error::git-cliff returned an empty version with no error"
          exit 1
        fi
        # --match constrains describe to the same tag universe as the consumer
        # cliff.toml's tag_pattern ("v[0-9].*"), so the NEXT/LATEST comparison
        # below never compares versions selected under two different rules
        # (e.g. a non-release utility tag picked up by an unconstrained
        # describe).
        LATEST="$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "")"
        if [ "$NEXT" = "$LATEST" ]; then
          echo "release=false" >> "$GITHUB_OUTPUT"
        else
          echo "release=true" >> "$GITHUB_OUTPUT"
        fi
        echo "version=$NEXT" >> "$GITHUB_OUTPUT"
        echo "Computed version: ${NEXT} (latest tag: ${LATEST:-<none>})"
