# Reusable Docker build, sign, attest, and release workflow.
#
# Builds multi-platform images on native GitHub-hosted runners — no QEMU.
# Default runner mapping (override via `platforms` input):
#   linux/amd64 → ubuntu-24.04
#   linux/arm64 → ubuntu-24.04-arm
#
# Three-job pipeline:
#   prepare        : compute version + matrix + tag metadata (x64)
#   build (matrix) : per-platform native build, push by digest
#   finalize       : assemble multi-arch manifest, cosign + SBOM + Trivy + release
#
# Covers GHCR-only and GHCR+DockerHub variants via the `registries` input.

name: Docker Release

on:
  workflow_call:
    inputs:
      image-name:
        description: "Image name (without registry prefix). Defaults to repo name."
        type: string
        default: ${{ github.event.repository.name }}
      registries:
        description: "Comma-separated registries to push to (ghcr,dockerhub)."
        type: string
        default: "ghcr,dockerhub"
      platforms:
        description: "Linux platforms to build for. Each is mapped to a native runner."
        type: string
        default: "linux/amd64,linux/arm64"
      dockerfile:
        description: "Path to the Dockerfile."
        type: string
        default: "./Dockerfile"
      syft-config:
        description: "Path to a .syft.yaml config for anchore/sbom-action. Empty = none."
        type: string
        default: ""
      sbom-from:
        description: "'image' scans the pushed manifest list; 'path' extracts binary to /tmp/sbom-src first."
        type: string
        default: "image"
      skip-build-guard:
        description: "When true, skip the build if the head commit is by renovate[bot] and contains [skip-build]."
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

env:
  IMAGE_NAME: ${{ github.repository_owner }}/${{ inputs.image-name }}
  REGISTRY: ghcr.io
  COSIGN_VERSION: v3.0.6
  BUILDX_VERSION: v0.34.1

jobs:
  prepare:
    if: ${{ !inputs.skip-build-guard || !(github.event.head_commit.author.name == 'renovate[bot]' && contains(github.event.head_commit.message, '[skip-build]')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
      release: ${{ steps.prep.outputs.release }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      meta-json: ${{ steps.meta.outputs.json }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Compute SemVer tag
        id: prep
        uses: cplieger/ci/actions/git-cliff-version@4e0a6937409828785a87d9eba577315d6cce50e0 # v1

      - name: Derive version tags
        id: ver
        run: |
          VERSION="${{ steps.prep.outputs.version }}"
          VERSION="${VERSION#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION%.*}"
          {
            echo "version=v${VERSION}"
            echo "major=v${MAJOR}"
            echo "minor=v${MINOR}"
          } >> "$GITHUB_OUTPUT"

      - name: Compute build matrix
        id: matrix
        env:
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          # Map each platform to a native GitHub-hosted runner.
          # linux/arm* → ubuntu-24.04-arm; everything else → ubuntu-24.04.
          # Emit a JSON array consumed by the build job's strategy.matrix.
          matrix='[]'
          IFS=','
          for p in $PLATFORMS; do
            p=$(echo "$p" | xargs)
            case "$p" in
              linux/arm*) runner="ubuntu-24.04-arm" ;;
              *)          runner="ubuntu-24.04" ;;
            esac
            name="${p//\//-}"
            matrix=$(jq -c --arg p "$p" --arg r "$runner" --arg n "$name" \
              '. + [{platform: $p, runner: $r, name: $n}]' <<<"$matrix")
          done
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Matrix: $matrix"

      - name: Extract metadata (GHCR + Docker Hub)
        if: ${{ contains(inputs.registries, 'dockerhub') }}
        id: meta-dual
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            docker.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,priority=500
            type=raw,value=latest,priority=400
            type=raw,value=${{ steps.ver.outputs.major }},priority=300
            type=raw,value=${{ steps.ver.outputs.minor }},priority=200
            type=raw,value=${{ steps.ver.outputs.version }},priority=100

      - name: Extract metadata (GHCR only)
        if: ${{ !contains(inputs.registries, 'dockerhub') }}
        id: meta-ghcr
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,priority=500
            type=raw,value=latest,priority=400
            type=raw,value=${{ steps.ver.outputs.major }},priority=300
            type=raw,value=${{ steps.ver.outputs.minor }},priority=200
            type=raw,value=${{ steps.ver.outputs.version }},priority=100

      - name: Consolidate metadata outputs
        id: meta
        env:
          DUAL_TAGS: ${{ steps.meta-dual.outputs.tags }}
          DUAL_LABELS: ${{ steps.meta-dual.outputs.labels }}
          DUAL_JSON: ${{ steps.meta-dual.outputs.json }}
          GHCR_TAGS: ${{ steps.meta-ghcr.outputs.tags }}
          GHCR_LABELS: ${{ steps.meta-ghcr.outputs.labels }}
          GHCR_JSON: ${{ steps.meta-ghcr.outputs.json }}
        run: |
          # Pick whichever metadata variant ran (only one of the two
          # `if:`-gated steps above produces output for a given run).
          if [ -n "$DUAL_TAGS" ]; then
            TAGS="$DUAL_TAGS"; LABELS="$DUAL_LABELS"; JSON="$DUAL_JSON"
          else
            TAGS="$GHCR_TAGS"; LABELS="$GHCR_LABELS"; JSON="$GHCR_JSON"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
            echo "labels<<EOF"
            echo "$LABELS"
            echo "EOF"
            echo "json<<EOF"
            echo "$JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          version: ${{ env.BUILDX_VERSION }}

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        if: ${{ contains(inputs.registries, 'dockerhub') }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ needs.prepare.outputs.labels }}
          provenance: true
          # push-by-digest writes the per-arch image to GHCR (and Docker Hub
          # if logged in) under a digest-only ref — no human-readable tags
          # at this stage. The finalize job assembles the multi-arch manifest
          # at the user-facing tags by referencing these digests.
          outputs: |
            type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          # Filename = matrix.name (e.g. linux-amd64); content = the digest.
          echo "$digest" > "/tmp/digests/${{ matrix.name }}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.name }}
          path: /tmp/digests/${{ matrix.name }}
          if-no-files-found: error
          retention-days: 1

  finalize:
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}
      version: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          version: ${{ env.BUILDX_VERSION }}

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        if: ${{ contains(inputs.registries, 'dockerhub') }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create multi-arch manifest
        id: manifest
        env:
          TAGS: ${{ needs.prepare.outputs.tags }}
        run: |
          # Build the imagetools args:
          #   one -t per user-facing tag (latest, vMAJ, vMAJ.MIN, vMAJ.MIN.PATCH, sha-...)
          #   one source per per-arch digest pushed in the matrix step
          # imagetools writes a manifest list (a.k.a. OCI image index) at every -t
          # tag, all pointing at the same set of per-arch images.
          tag_args=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            tag_args="$tag_args -t $tag"
          done <<< "$TAGS"

          src_args=""
          for f in /tmp/digests/*; do
            d=$(cat "$f")
            src_args="$src_args ${REGISTRY}/${IMAGE_NAME}@${d}"
          done

          # --metadata-file captures the index digest deterministically.
          # Format (per Docker docs): { "containerimage.descriptor": { "digest": "sha256:...", ... }, "image.name": "..." }
          # Note: this is different from build-push-action's metadata which uses
          # a flat "containerimage.digest" key.
          # shellcheck disable=SC2086
          docker buildx imagetools create --metadata-file /tmp/manifest-meta.json $tag_args $src_args

          digest=$(jq -r '."containerimage.descriptor".digest' /tmp/manifest-meta.json)
          if [ -z "$digest" ] || [ "$digest" = "null" ]; then
            echo "::error::Failed to extract manifest digest from imagetools metadata"
            cat /tmp/manifest-meta.json
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Manifest digest: $digest"

      - name: Trivy scan published image
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image-build'

      - name: Extract binary for SBOM (path mode)
        if: ${{ inputs.sbom-from == 'path' }}
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}
        run: |
          # path-mode SBOM: pull the multi-arch image (Docker resolves to the
          # finalize-job's host arch, amd64), extract /app/<image-name>, then
          # syft scans the binary directly. Used by Go apps where syft on the
          # image misses the static binary's deps.
          docker pull "$IMAGE_REF"
          CID=$(docker create "$IMAGE_REF")
          trap 'docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT
          mkdir -p /tmp/sbom-src
          docker cp "$CID:/app/${{ inputs.image-name }}" /tmp/sbom-src/${{ inputs.image-name }}

      - name: Generate SBOM (from image)
        if: ${{ inputs.sbom-from == 'image' && inputs.syft-config == '' }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: false

      - name: Generate SBOM (from image, with syft config)
        if: ${{ inputs.sbom-from == 'image' && inputs.syft-config != '' }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: false
          config: ${{ inputs.syft-config }}

      - name: Generate SBOM (from path)
        if: ${{ inputs.sbom-from == 'path' }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: /tmp/sbom-src
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Sign GHCR manifest (recursive — covers per-arch images too)
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}
        run: cosign sign --yes --recursive "$IMAGE_REF"

      - name: Attest SBOM to GHCR
        # NOTE: cosign attest does not support --recursive (that's a sign-only
        # flag). The attestation is scoped to the manifest list digest;
        # verifiers resolve through the index to find the attestation.
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "$IMAGE_REF"

      - name: Sign Docker Hub manifest (recursive)
        if: ${{ contains(inputs.registries, 'dockerhub') }}
        env:
          IMAGE_REF: docker.io/${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}
        run: cosign sign --yes --recursive "$IMAGE_REF"

      - name: Attest SBOM to Docker Hub
        if: ${{ contains(inputs.registries, 'dockerhub') }}
        env:
          IMAGE_REF: docker.io/${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "$IMAGE_REF"

      - name: Install git-cliff
        # Reuse the same composite action prepare uses; this also computes a
        # version output we ignore (only the binary install matters here).
        uses: cplieger/ci/actions/git-cliff-version@330a5a25fd3847ef97ea8286ff73c3d3ebf9f198 # v1

      - name: Generate release notes
        run: git-cliff --latest --strip header > RELEASE_NOTES.md || echo "Initial release" > RELEASE_NOTES.md

      - name: Create release
        # Only create a GitHub Release when cliff says a version bump is
        # warranted (feat/fix/sec etc. since the last tag). Pure
        # chore/ci/docs pushes still build + push images but reuse the
        # existing tag — gh release create would error otherwise.
        if: ${{ needs.prepare.outputs.release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file RELEASE_NOTES.md \
            sbom.spdx.json

      - name: Sync description to Docker Hub
        if: ${{ contains(inputs.registries, 'dockerhub') && github.ref == 'refs/heads/main' }}
        continue-on-error: true
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REPO_DESC: ${{ github.event.repository.description }}
        run: |
          TOKEN=$(curl -fsSL "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg u "$DOCKERHUB_USERNAME" --arg p "$DOCKERHUB_TOKEN" \
              '{username: $u, password: $p}')" | jq -r .token)
          curl -fsSL -X PATCH \
            "https://hub.docker.com/v2/repositories/${DOCKERHUB_USERNAME}/${{ inputs.image-name }}/" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg d "$REPO_DESC" '{description: $d}')" >/dev/null

      - name: Push README to Docker Hub
        if: ${{ contains(inputs.registries, 'dockerhub') && github.ref == 'refs/heads/main' }}
        continue-on-error: true
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.image-name }}
          readme-filepath: README.md
