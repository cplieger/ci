# Weekly mutation testing across all Go-having cplieger consumer repos.
# Pattern C: this workflow owns the matrix and the max-parallel cap; runs
# happen here (not via cross-repo workflow_dispatch) so we have one place
# to (a) bound concurrency, (b) aggregate per-repo across N runs, and
# (c) update the per-repo tracker issue body.
#
# Schedule:           Sundays 22:00 UTC (off-peak, finishes by ~02:00 Mon)
# Concurrency cap:    6 jobs in parallel (account budget: 20; reserves >=4
#                     for ad-hoc PR/sync/release work)
# Runs per repo:      3 — averaged for trend stability + stddev measurement
# Reporting:          Per-repo tracker issue, body updated with rolling
#                     12-week table inside <!-- gremlins-data --> sentinels.
#                     Free-form notes outside the sentinels are preserved.
# Regression alert:   Adds 'mutation-regression' label to the tracker issue
#                     when this week's mean drops >5% below the rolling mean.
name: Weekly gremlins

on:
  schedule:
    - cron: "0 22 * * 0"   # Sunday 22:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  # Issue ops happen in CONSUMER repos via CI_SCHEDULE PAT, not GITHUB_TOKEN.

concurrency:
  group: weekly-gremlins
  cancel-in-progress: false

jobs:
  fanout:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.fanout.outputs.matrix }}
    steps:
      - name: Discover Go-having repos with non-trivial source
        id: fanout
        env:
          GH_TOKEN: ${{ secrets.CI_SCHEDULE }}
        run: |
          set -euo pipefail
          repos=$(gh repo list cplieger --limit 300 --json name,isArchived --jq '
            [.[] | select(.isArchived == false) | .name] | .[]
          ')

          # Keep repos that:
          #   - have go.mod at root
          #   - have at least 200 LOC of non-test Go (heuristic to skip tiny
          #     repos like db-dumper where mutation testing yields nothing)
          GO_REPOS=()
          for r in $repos; do
            gh api "/repos/cplieger/${r}/contents/go.mod" --silent 2>/dev/null || continue
            loc=$(gh api "/repos/cplieger/${r}/git/trees/main?recursive=1" \
              --jq '[.tree[] | select(.type=="blob" and (.path | test("\\.go$") and (test("_test\\.go$") | not)))] | map(.size // 0) | add // 0' 2>/dev/null)
            # Bytes ~ 50/line for typical Go; 200 LOC ≈ 10000 bytes
            if [ "${loc:-0}" -ge 10000 ]; then
              GO_REPOS+=("$r")
              echo "  include: ${r} (${loc} bytes of non-test Go)"
            else
              echo "  skip:    ${r} (${loc} bytes — below 200 LOC threshold)"
            fi
          done

          # Build matrix: repo × attempt(1..3)
          matrix=$(printf '%s\n' "${GO_REPOS[@]}" | jq -R . | jq -s -c '
            [.[] | . as $r | [1,2,3] | .[] | {repo: $r, attempt: .}]
          ')
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Total matrix entries: $(echo "$matrix" | jq 'length')"

  run:
    needs: fanout
    if: ${{ needs.fanout.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      max-parallel: 6   # account budget: 20; leave >=4 for ad-hoc PR work
      matrix:
        include: ${{ fromJSON(needs.fanout.outputs.matrix) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.CI_SCHEDULE }}
    steps:
      - name: Clone target repo
        run: gh repo clone "cplieger/${{ matrix.repo }}" target -- --depth 1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: target/go.mod
          cache: false

      - name: Install gremlins
        env:
          # renovate: datasource=github-releases depName=go-gremlins/gremlins
          VERSION: v0.6.0
        run: |
          curl -fsSL --retry 3 \
            "https://github.com/go-gremlins/gremlins/releases/download/${VERSION}/gremlins_${VERSION#v}_linux_amd64.tar.gz" \
            | tar -xz -C /tmp gremlins
          sudo mv /tmp/gremlins /usr/local/bin/

      - name: Sync central .gremlins.yaml if repo doesn't have one
        run: |
          cd target
          if [ ! -f .gremlins.yaml ]; then
            curl -fsSL "https://raw.githubusercontent.com/cplieger/ci/main/configs/gremlins.yaml" -o .gremlins.yaml
          fi

      - name: Run gremlins (attempt ${{ matrix.attempt }})
        continue-on-error: true
        working-directory: target
        run: |
          # Gremlins exits 0 on success regardless of efficacy (we set
          # threshold=0). It exits non-zero only on internal errors.
          gremlins unleash --output /tmp/gremlins-out.json . || echo "::warning::gremlins reported non-zero (continuing)"
          if [ ! -s /tmp/gremlins-out.json ]; then
            echo "::warning::no gremlins output — emitting empty mutants list"
            echo '{"mutants":[]}' > /tmp/gremlins-out.json
          fi

      - name: Upload full mutants.json (artifact, 90-day retention)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gremlins-${{ matrix.repo }}-${{ matrix.attempt }}
          path: /tmp/gremlins-out.json
          if-no-files-found: warn
          retention-days: 90

  # Publish the per-repo mutation badge to each consumer's orphan `badges`
  # branch. Independent of the `aggregate` (issue-tracker) job below, so a
  # tracker-issue failure never blocks the README badge — and vice versa. Reads
  # the same per-attempt artifacts and reuses scripts/gremlins-aggregate.py's
  # parser (the trusted efficacy formula) plus scripts/publish-badge.sh (the
  # sibling-preserving publisher shared with coverage.yaml).
  badge:
    needs: [fanout, run]
    if: always() && needs.fanout.outputs.matrix != '[]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout ci (for scripts/)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download all per-attempt artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: gremlins-*

      - name: Compute + publish mutation badge per repo
        env:
          # CI_SCHEDULE must carry contents:write on consumer repos (it already
          # clones them and edits their tracker issues). The push targets each
          # repo's orphan `badges` branch, alongside coverage.json.
          TOKEN: ${{ secrets.CI_SCHEDULE }}
        run: |
          # No `set -e` at loop scope: one repo's failure (e.g. a transient
          # push 403) must not abort the whole fleet. Each repo runs in a
          # guarded subshell; failures warn and continue.
          set -uo pipefail
          REPOS=$(find artifacts -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sed -E 's/^gremlins-(.+)-[0-9]+$/\1/' | sort -u)
          for repo in $REPOS; do
            echo "::group::$repo"
            (
              set -e
              python3 scripts/gremlins-aggregate.py \
                --repo "$repo" \
                --artifacts-dir artifacts \
                --week "$(date -u +%Y-%m-%d)" \
                --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
                --badge-file "/tmp/mutation-${repo}.json" >/dev/null
              if [ -s "/tmp/mutation-${repo}.json" ]; then
                bash scripts/publish-badge.sh \
                  "cplieger/${repo}" "$TOKEN" mutation.json "$(cat "/tmp/mutation-${repo}.json")"
              else
                echo "::warning::no badge JSON for ${repo} (no parseable attempts) — skipping"
              fi
            ) || echo "::warning::badge publish failed for ${repo} — continuing with remaining repos"
            echo "::endgroup::"
          done

  aggregate:
    needs: [fanout, run]
    if: always() && needs.fanout.outputs.matrix != '[]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.CI_SCHEDULE }}
    steps:
      - name: Download all per-attempt artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: gremlins-*

      - name: Aggregate + update tracker issue per repo
        run: |
          # Delegate stats + body generation to scripts/gremlins-aggregate.py —
          # the same parser the `badge` job trusts. It reads each attempt's
          # gremlins-out.json (the artifact the `run` job actually uploads),
          # computes mean/stddev/coverage, rolls the 12-week history forward
          # (preserving free-form notes), renders the frequency-bucketed live
          # mutants, and writes a regression marker. No `set -e` at loop scope:
          # one repo's failure must not abort the fleet — each runs in a guarded
          # subshell that warns and continues.
          set -uo pipefail
          REPOS=$(find artifacts -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sed -E 's/^gremlins-(.+)-[0-9]+$/\1/' | sort -u)
          WEEK_ENDING=$(date -u +%Y-%m-%d)
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          title="Gremlins mutation testing tracker"

          for repo in $REPOS; do
            echo "::group::$repo"
            (
              set -e
              R="cplieger/${repo}"

              # The tracker issue references these labels; create them if absent
              # (idempotent — the consumer repo may never have had them).
              gh label create gremlins-tracker -R "$R" -c 5319e7 -d "Gremlins mutation testing tracker" 2>/dev/null || true
              gh label create auto-generated -R "$R" -c ededed -d "Maintained by automation" 2>/dev/null || true
              gh label create mutation-regression -R "$R" -c b60205 -d "Mutation efficacy regression" 2>/dev/null || true

              issue_num=$(gh issue list -R "$R" --state open \
                --label gremlins-tracker --search "$title in:title" \
                --json number,title --jq '.[] | select(.title == "'"$title"'") | .number' | head -1)

              existing_args=()
              if [ -n "$issue_num" ]; then
                gh issue view "$issue_num" -R "$R" --json body --jq .body > "/tmp/existing-${repo}.md"
                existing_args=(--existing-body-file "/tmp/existing-${repo}.md")
              fi

              python3 scripts/gremlins-aggregate.py \
                --repo "$repo" \
                --artifacts-dir artifacts \
                --week "$WEEK_ENDING" \
                --run-url "$RUN_URL" \
                --regression-marker-file "/tmp/regression-${repo}.txt" \
                "${existing_args[@]}" \
                > "/tmp/body-${repo}.md"

              if [ -n "$issue_num" ]; then
                gh issue edit "$issue_num" -R "$R" --body-file "/tmp/body-${repo}.md" >/dev/null
                echo "  updated tracker issue #${issue_num}"
              else
                url=$(gh issue create -R "$R" \
                  --title "$title" \
                  --label gremlins-tracker,auto-generated \
                  --body-file "/tmp/body-${repo}.md")
                issue_num="${url##*/}"
                echo "  created tracker issue #${issue_num}"
              fi

              # Apply or clear the regression label from the python marker.
              if [ -n "$issue_num" ] && [ "$(cat "/tmp/regression-${repo}.txt" 2>/dev/null)" = "true" ]; then
                gh issue edit "$issue_num" -R "$R" --add-label mutation-regression >/dev/null
                echo "  flagged mutation-regression"
              elif [ -n "$issue_num" ]; then
                gh issue edit "$issue_num" -R "$R" --remove-label mutation-regression >/dev/null 2>&1 || true
              fi
            ) || echo "::warning::aggregate failed for ${repo} — continuing with remaining repos"
            echo "::endgroup::"
          done
