# Weekly mutation testing across all Go-having cplieger consumer repos.
# Pattern C: this workflow owns the matrix and the max-parallel cap; runs
# happen here (not via cross-repo workflow_dispatch) so we have one place
# to (a) bound concurrency, (b) aggregate per-repo across N runs, and
# (c) update the per-repo tracker issue body.
#
# Schedule:           Sundays 22:00 UTC (off-peak, finishes by ~02:00 Mon)
# Concurrency cap:    6 jobs in parallel (account budget: 20; reserves >=4
#                     for ad-hoc PR/sync/release work)
# Runs per repo:      3 — averaged for trend stability + stddev measurement
# Reporting:          Per-repo tracker issue, body updated with rolling
#                     12-week table inside <!-- gremlins-data --> sentinels.
#                     Free-form notes outside the sentinels are preserved.
# Regression alert:   Adds 'mutation-regression' label to the tracker issue
#                     when this week's mean drops >5% below the rolling mean.
name: Weekly gremlins

on:
  schedule:
    - cron: "0 22 * * 0"   # Sunday 22:00 UTC
  workflow_dispatch:
    inputs:
      only:
        description: "Comma/space-separated repo names to limit the run (for testing a fix). Empty runs against all cplieger repos."
        required: false
        default: ""

permissions:
  contents: read
  # Issue ops happen in CONSUMER repos via CI_SCHEDULE PAT, not GITHUB_TOKEN.

concurrency:
  group: weekly-gremlins
  cancel-in-progress: false

jobs:
  fanout:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.fanout.outputs.matrix }}
    steps:
      - name: Discover Go-having repos with non-trivial source
        id: fanout
        env:
          GH_TOKEN: ${{ secrets.CI_SCHEDULE }}
          # Injected via env (not inline ${{ }} in the script) so a crafted
          # dispatch input can't expand into shell code (template injection).
          ONLY: ${{ github.event.inputs.only }}
        run: |
          set -euo pipefail
          repos=$(gh repo list cplieger --limit 300 --json name,isArchived --jq '
            [.[] | select(.isArchived == false) | .name] | .[]
          ')

          # Optional manual filter: the workflow_dispatch 'only' input limits the
          # matrix to named repos (fast iteration when validating a fix). The
          # scheduled run leaves it empty and covers all cplieger repos.
          if [ -n "${ONLY:-}" ]; then
            wanted=" $(echo "$ONLY" | tr ',' ' ') "
            filtered=""
            for r in $repos; do
              case "$wanted" in *" $r "*) filtered="$filtered $r" ;; esac
            done
            repos="$filtered"
            echo "manual 'only' filter active -> ${repos:-<none matched>}"
          fi

          # Keep repos that:
          #   - have go.mod at root
          #   - have at least 200 LOC of non-test Go (heuristic to skip tiny
          #     repos like db-dumper where mutation testing yields nothing)
          GO_REPOS=()
          for r in $repos; do
            gh api "/repos/cplieger/${r}/contents/go.mod" --silent 2>/dev/null || continue
            loc=$(gh api "/repos/cplieger/${r}/git/trees/main?recursive=1" \
              --jq '[.tree[] | select(.type=="blob" and (.path | test("\\.go$") and (test("_test\\.go$") | not)))] | map(.size // 0) | add // 0' 2>/dev/null)
            # Bytes ~ 50/line for typical Go; 200 LOC ≈ 10000 bytes
            if [ "${loc:-0}" -ge 10000 ]; then
              GO_REPOS+=("$r")
              echo "  include: ${r} (${loc} bytes of non-test Go)"
            else
              echo "  skip:    ${r} (${loc} bytes — below 200 LOC threshold)"
            fi
          done

          # Build matrix: repo × attempt(1..3)
          matrix=$(printf '%s\n' "${GO_REPOS[@]}" | jq -R . | jq -s -c '
            [.[] | . as $r | [1,2,3] | .[] | {repo: $r, attempt: .}]
          ')
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Total matrix entries: $(echo "$matrix" | jq 'length')"

  run:
    needs: fanout
    if: ${{ needs.fanout.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      max-parallel: 6   # account budget: 20; leave >=4 for ad-hoc PR work
      matrix:
        include: ${{ fromJSON(needs.fanout.outputs.matrix) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.CI_SCHEDULE }}
    steps:
      # Checkout FIRST: actions/checkout cleans the workspace, so it must not
      # run after the target clone below.
      - name: Checkout ci (for configs/)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - name: Clone target repo
        run: gh repo clone "cplieger/${{ matrix.repo }}" target -- --depth 1

      - name: Sync central .gremlins.yaml (authoritative for the weekly run)
        run: |
          # Always overwrite with the central policy so the weekly run uses the
          # canonical exclude-list regardless of what each consumer has
          # committed. The committed per-repo copies (kept in sync by
          # sync.yaml, for local `gremlins unleash`) may lag; the shared run must
          # not. "centralization is the point" — see configs/gremlins.yaml.
          # Copied from this run's own checkout (same commit as the workflow),
          # not fetched from raw main at run time.
          cp configs/gremlins.yaml target/.gremlins.yaml

      - name: Run gremlins (attempt ${{ matrix.attempt }})
        run: |
          set -uo pipefail
          # gremlins exits 0 on success regardless of efficacy (threshold=0); a
          # non-zero exit means an internal error (bad config, build failure, …).
          # Surface that as a RED cell — fail-fast is off, so one bad repo doesn't
          # cancel the others, and the upload step (if: always()) still ships an
          # artifact downstream.
          #
          # MEMORY CONTAINMENT VIA A DOCKER CGROUP. Mutation is precisely the act
          # of turning a bounded size/loop into an unbounded one, so some mutant
          # WILL allocate without limit (a boundary mutant on a make() size, an
          # append in a now-infinite loop, …). Measured on subflux: a single
          # worker hit ~14 GiB on one internal/server mutant. GOMEMLIMIT is a
          # SOFT heap target and does not stop a single large LIVE allocation, so
          # it cannot prevent this; worker count is irrelevant (1 worker OOMs
          # just the same). Run bare on the host, that runaway trips the kernel
          # OOM-killer on the whole VM, which nondeterministically reaps either
          # the test (run continues) or the runner agent (job dies, "received a
          # shutdown signal") — every subflux shard failed this way at 33/38/81
          # min, at 4 AND at 2 workers.
          #
          # Fix: run gremlins INSIDE a container capped at 80% of MemAvailable. A
          # runaway now busts the CONTAINER cgroup, whose OOM-killer reaps the
          # biggest task (the runaway test) while gremlins keeps going and
          # records it (verified: a 1- and 2-worker capped run survive the ~14
          # GiB mutant and complete). The runner agent lives OUTSIDE the
          # container, so the worst case is a clean step failure, never a runner
          # shutdown. Workers are bounded by memory (heap + compile/link
          # toolchain per worker): 2 on a 16 GB runner — low enough that the
          # OOM-killer's victim is unambiguous — and auto-scaling on bigger
          # runners (where the runaway simply fits under the larger cap).
          # renovate: datasource=github-releases depName=go-gremlins/gremlins
          GREMLINS_VERSION=v0.6.0

          # Go toolchain image from the target's go.mod (a `toolchain` line wins
          # over the `go` line); fall back to the minor tag if the patch tag is
          # missing, then to a sane default.
          gover=$(grep -oP '^(toolchain go|go )\K[0-9]+\.[0-9]+(\.[0-9]+)?' target/go.mod | tail -1)
          image="golang:${gover:-1.26}"
          docker pull "$image" 2>/dev/null || { image="golang:${gover%.*}"; docker pull "$image"; }

          # Memory-aware sizing, computed on the host and passed into the
          # container. cap_mb is BOTH the container memory ceiling and the budget
          # the worker count derives from; reserve heap + toolchain per worker.
          avail_kb=$(awk '/^MemAvailable:/{print $2}' /proc/meminfo)
          cap_mb=$(( avail_kb * 80 / 100 / 1024 ))
          nproc_n=$(nproc)
          toolchain_mb=2048   # go compile+link RSS per worker (not bounded by GOMEMLIMIT)
          heap_min_mb=2048    # GOMEMLIMIT floor; lower makes healthy tests GC-thrash into false timeouts
          per_worker_mb=$(( toolchain_mb + heap_min_mb ))
          max_by_mem=$(( cap_mb / per_worker_mb )); [ "$max_by_mem" -lt 1 ] && max_by_mem=1
          workers=$(( nproc_n < max_by_mem ? nproc_n : max_by_mem ))
          gomem_mb=$(( (cap_mb - workers * toolchain_mb) / workers ))
          [ "$gomem_mb" -lt "$heap_min_mb" ] && gomem_mb=$heap_min_mb
          echo "image=${image} workers=${workers} (nproc=${nproc_n}, mem-cap=${max_by_mem})"
          echo "GOMEMLIMIT=${gomem_mb}MiB container=${cap_mb}MiB (MemAvailable=${avail_kb}KiB)"

          rc=0
          docker run --rm \
            --memory="${cap_mb}m" --memory-swap="${cap_mb}m" \
            -v "${PWD}/target":/work -w /work \
            -e GOMEMLIMIT="${gomem_mb}MiB" \
            -e GREMLINS_VERSION="${GREMLINS_VERSION}" \
            -e WORKERS="${workers}" \
            "${image}" bash -euo pipefail -c '
              curl -fsSL --retry 3 \
                "https://github.com/go-gremlins/gremlins/releases/download/${GREMLINS_VERSION}/gremlins_${GREMLINS_VERSION#v}_linux_amd64.tar.gz" \
                | tar -xz -C /usr/local/bin gremlins
              gremlins unleash --workers "${WORKERS}" --output /work/gremlins-out.json .
            ' || rc=$?

          # Hand the result to the badge/aggregate jobs, which read /tmp.
          if [ "$rc" -ne 0 ]; then
            # Error marker so they SKIP this attempt (load_run returns None on a
            # file with no "files" key) instead of publishing a misleading 0%.
            echo '{"gremlins_error": true}' > /tmp/gremlins-out.json
            echo "::error::gremlins failed for ${{ matrix.repo }} (attempt ${{ matrix.attempt }}), exit ${rc}"
            exit "$rc"
          fi
          if [ -s target/gremlins-out.json ]; then
            sudo cp target/gremlins-out.json /tmp/gremlins-out.json
          else
            # Defensive: clean exit, no file => "no mutants"; a minimal
            # {"files":[]} parses as a 0-mutant result (load_run zero-fills).
            echo '{"files":[]}' > /tmp/gremlins-out.json
          fi

      - name: Upload full mutants.json (artifact, 90-day retention)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gremlins-${{ matrix.repo }}-${{ matrix.attempt }}
          path: /tmp/gremlins-out.json
          if-no-files-found: warn
          retention-days: 90

  # Publish the per-repo mutation badge to each consumer's orphan `badges`
  # branch. Independent of the `aggregate` (issue-tracker) job below, so a
  # tracker-issue failure never blocks the README badge — and vice versa. Reads
  # the same per-attempt artifacts and reuses scripts/gremlins-aggregate.py's
  # parser (the trusted efficacy formula) plus the sibling-preserving publisher
  # script bundled with the publish-badge composite action (called directly
  # here — this job loops repos inside one step, where a `uses:` per repo is
  # not possible).
  badge:
    needs: [fanout, run]
    if: always() && needs.fanout.outputs.matrix != '[]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout ci (for scripts/)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - name: Download all per-attempt artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: gremlins-*

      - name: Compute + publish mutation badge per repo
        env:
          # CI_SCHEDULE must carry contents:write on consumer repos. The push
          # targets each repo's orphan `badges` branch, alongside coverage.json.
          TOKEN: ${{ secrets.CI_SCHEDULE }}
        run: |
          # Explicit per-command error handling (NOT `set -e` inside a subshell:
          # bash ignores errexit for a `( … ) || …` subshell, which is why an
          # earlier version reported success while every repo failed). Each repo
          # is isolated; a failure warns, sets had_failure, and the loop
          # continues so healthy repos still publish. The job then exits red if
          # anything failed, so the run never goes green on a real failure.
          set -uo pipefail
          REPOS=$(find artifacts -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sed -E 's/^gremlins-(.+)-[0-9]+$/\1/' | sort -u)
          WEEK=$(date -u +'%Y-%m-%d %H:%M')
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          publish_one() {
            local repo="$1"
            local badge="/tmp/mutation-${repo}.json"
            python3 scripts/gremlins-aggregate.py \
              --repo "$repo" --artifacts-dir artifacts --week "$WEEK" \
              --run-url "$RUN_URL" --badge-file "$badge" >/dev/null || return 1
            # The script only writes the badge when at least one attempt parsed,
            # so a repo whose every attempt errored is skipped (its red comes
            # from the run job) instead of overwriting a good badge with 0%.
            if [ ! -s "$badge" ]; then
              echo "  no parseable attempts for ${repo} — leaving existing badge untouched"
              return 0
            fi
            bash actions/publish-badge/publish-badge.sh \
              "cplieger/${repo}" "$TOKEN" mutation.json "$(cat "$badge")" || return 1
          }

          had_failure=0
          for repo in $REPOS; do
            echo "::group::$repo"
            if ! publish_one "$repo"; then
              echo "::warning::badge publish failed for ${repo} — continuing"
              had_failure=1
            fi
            echo "::endgroup::"
          done
          if [ "$had_failure" -ne 0 ]; then
            echo "::error::one or more mutation-badge publishes failed"
            exit 1
          fi

  aggregate:
    needs: [fanout, run]
    if: always() && needs.fanout.outputs.matrix != '[]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.CI_SCHEDULE }}
    steps:
      - name: Checkout ci (for scripts/)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - name: Download all per-attempt artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: gremlins-*

      - name: Aggregate + update tracker issue per repo
        run: |
          # Delegate stats + body generation to scripts/gremlins-aggregate.py —
          # the same parser the `badge` job trusts. It reads each attempt's
          # gremlins-out.json, computes mean/stddev/coverage, rolls the 12-week
          # history forward (preserving free-form notes), renders the
          # frequency-bucketed live mutants, and writes regression + attempts
          # markers. Explicit per-command error handling (NOT `set -e` in a
          # `( … ) || …` subshell, which bash neuters): each repo is isolated,
          # failures warn and set had_failure, and the job exits red at the end
          # if anything failed.
          set -uo pipefail
          REPOS=$(find artifacts -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sed -E 's/^gremlins-(.+)-[0-9]+$/\1/' | sort -u)
          WEEK_ENDING=$(date -u +'%Y-%m-%d %H:%M')
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          title="Gremlins mutation testing tracker"

          # Create a label, tolerating "already exists" but surfacing real
          # errors (e.g. the PAT lacking issues:write) as a failure.
          ensure_label() {
            local name="$1" repo="$2" color="$3" desc="$4" err
            err=$(gh label create "$name" -R "$repo" -c "$color" -d "$desc" 2>&1) && return 0
            printf '%s' "$err" | grep -qi "already exists" && return 0
            echo "  label create failed for ${name}: ${err}" >&2
            return 1
          }

          process_repo() {
            local repo="$1" R="cplieger/$1" issue_num att url existing_args=()

            issue_num=$(gh issue list -R "$R" --state open --label gremlins-tracker \
              --search "$title in:title" --json number,title \
              --jq '.[] | select(.title == "'"$title"'") | .number' 2>/dev/null | head -1) || true

            if [ -n "$issue_num" ]; then
              gh issue view "$issue_num" -R "$R" --json body --jq .body > "/tmp/existing-${repo}.md" || return 1
              existing_args=(--existing-body-file "/tmp/existing-${repo}.md")
            fi

            python3 scripts/gremlins-aggregate.py \
              --repo "$repo" --artifacts-dir artifacts --week "$WEEK_ENDING" --run-url "$RUN_URL" \
              --regression-marker-file "/tmp/regression-${repo}.txt" \
              --attempts-marker-file "/tmp/attempts-${repo}.txt" \
              "${existing_args[@]}" > "/tmp/body-${repo}.md" || return 1

            att=$(cat "/tmp/attempts-${repo}.txt" 2>/dev/null || echo 0)
            if [ "$att" -eq 0 ]; then
              echo "  no parseable attempts for ${repo} — leaving the tracker issue untouched"
              return 0
            fi

            if [ -z "$issue_num" ]; then
              ensure_label gremlins-tracker "$R" 5319e7 "Gremlins mutation testing tracker" || return 1
              ensure_label auto-generated "$R" ededed "Maintained by automation" || return 1
              ensure_label mutation-regression "$R" b60205 "Mutation efficacy regression" || return 1
              url=$(gh issue create -R "$R" --title "$title" \
                --label gremlins-tracker,auto-generated --body-file "/tmp/body-${repo}.md") || return 1
              issue_num="${url##*/}"
              echo "  created tracker issue #${issue_num}"
            else
              gh issue edit "$issue_num" -R "$R" --body-file "/tmp/body-${repo}.md" >/dev/null || return 1
              echo "  updated tracker issue #${issue_num}"
            fi

            # Toggle the regression label from the python marker (ensure it
            # exists first — the issue may predate the label).
            ensure_label mutation-regression "$R" b60205 "Mutation efficacy regression" || return 1
            if [ "$(cat "/tmp/regression-${repo}.txt" 2>/dev/null)" = "true" ]; then
              gh issue edit "$issue_num" -R "$R" --add-label mutation-regression >/dev/null || return 1
              echo "  flagged mutation-regression"
            else
              gh issue edit "$issue_num" -R "$R" --remove-label mutation-regression >/dev/null 2>&1 || true
            fi
          }

          had_failure=0
          for repo in $REPOS; do
            echo "::group::$repo"
            if ! process_repo "$repo"; then
              echo "::warning::aggregate failed for ${repo} — continuing"
              had_failure=1
            fi
            echo "::endgroup::"
          done
          if [ "$had_failure" -ne 0 ]; then
            echo "::error::one or more tracker-issue updates failed"
            exit 1
          fi
