# Unified release pipeline for all cplieger consumer repos.
#
# Single entry point. Consumer repos call this workflow on every push to main;
# all routing decisions are made centrally:
#
#   detect job    →  Compute cliff version, detect repo type
#                    (docker/go/ts), find TS subpackages, identify which paths
#                    actually changed (vs. excluded test/lint/docs), and resolve
#                    per-repo policy overrides (registries, platforms, sbom).
#
#   docker job    →  Delegates to docker-release.yaml when type=docker AND
#                    non-excluded paths changed. docker-release.yaml itself
#                    handles build/sign/SBOM/release using the values we pass.
#
#   go job        →  Tag + GitHub Release for type=go (root module). No build
#                    step — `go install <repo>@<tag>` fetches by tag.
#
#   ts job        →  npm + JSR publish + tag + GitHub Release for type=ts
#                    (root TS lib).
#
#   subpackage    →  Matrix over `*/jsr.json` subpackages where the subpackage
#                    dir had non-excluded changes; npm + JSR publish per dir.
#                    Used by hybrid repos (e.g., web-terminal-engine: Go module at root +
#                    web/ TS subpackage). Shares the ROOT version.
#
#   go-nested     →  Matrix over tracked nested Go modules (`<dir>/go.mod`)
#                    whose dir had non-excluded changes. Each is an
#                    independent release lane: own conventional-commit
#                    version, own `<dir>/vX.Y.Z` tag + GitHub Release with
#                    lane-scoped notes. Root version/notes are recomputed
#                    lane-aware when lanes exist (the fleet-synced cliff
#                    config cannot know per-repo lane dirs, so lane commits
#                    would otherwise count toward the root bump — see the
#                    detect job's recompute step).
#
# Path-change detection uses central exclusion patterns (see "Detect changed
# paths" step) — opinionated and tight by default. Tests, lint configs, docs,
# generated bundles, CI metadata are all ignored. If only excluded paths
# changed, no rebuild/republish is triggered even if cliff would bump the
# version (rare edge case: a `feat:` commit that only touches README).
#
# Per-repo policy is centralized in the "Resolve repo policy" step — no
# per-repo config files. To change a repo's settings, edit this workflow.
name: Release

on:
  workflow_call:
    inputs:
      skip_if_unchanged:
        description: >-
          Give this run no-op-skip semantics: when the docker pipeline finds
          the rebuilt image's package inventory identical to what :latest
          already ships, every publish step is skipped (no tag moves, no
          digest churn). Normally set via the consumer stub's
          workflow_dispatch input by the scheduled staleness rebuild
          (cplieger/ci rebuild-stale.yaml); push events keep today's
          always-publish semantics. Docker-type repos only; go/ts releases
          ignore it.
        type: boolean
        required: false
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

# Top-level is read-only (OpenSSF Scorecard Token-Permissions); each job below
# declares the exact write scopes it needs. The docker job forwards them to the
# called docker-release.yaml, whose own jobs scope them further.
permissions:
  contents: read

concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    outputs:
      type: ${{ steps.type.outputs.type }}
      subpackages: ${{ steps.type.outputs.subpackages }}
      subpackages_to_publish: ${{ steps.changes.outputs.subpackages_to_publish }}
      # version/release: the lane-aware recompute (steps.lanes) overrides the
      # composite action's config-driven result whenever nested Go module
      # lanes exist — the fleet-synced cliff config cannot know per-repo lane
      # dirs, so without it lane commits count toward the ROOT version bump
      # (see the recompute step). Empty-string-falsy fallback keeps
      # single-module repos byte-identical.
      version: ${{ steps.lanes.outputs.version || steps.cliff.outputs.version }}
      release: ${{ steps.lanes.outputs.release || steps.cliff.outputs.release }}
      root_changed: ${{ steps.changes.outputs.root_changed }}
      go_modules: ${{ steps.gomodules.outputs.go_modules }}
      go_modules_to_release: ${{ steps.changes.outputs.go_modules_to_release }}
      # finalize: a prior run tagged this exact commit but died before its
      # GitHub Release; publish jobs repair the Release only (see the step).
      finalize: ${{ steps.finalize.outputs.finalize }}
      registries: ${{ steps.policy.outputs.registries }}
      platforms: ${{ steps.policy.outputs.platforms }}
      sbom_from: ${{ steps.policy.outputs.sbom_from }}
      syft_config: ${{ steps.policy.outputs.syft_config }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false
          fetch-depth: 0

      - name: Compute version (cliff)
        id: cliff
        # Absolute @sha pin (Renovate-managed via the # v2 comment). Unlike a
        # local reusable workflow, a local composite action (`./actions/...`)
        # resolves against the CONSUMER's checked-out workspace, not this
        # repo, so it 404s when release.yaml is called from another repo. This
        # action's content is stable, so pin-lag is a non-issue here.
        uses: cplieger/ci/actions/git-cliff-version@cf43aba05a821e38747afc8f15efcfebb7245940 # v2

      - name: Detect type + subpackages
        id: type
        run: |
          # Type precedence: Dockerfile > jsr.json > go.mod. A repo that has
          # multiple of these signals (e.g., docker-age has Dockerfile + go.mod)
          # is treated as docker; the go.mod is for the binary inside the image
          # and isn't a separately released module.
          if [ -f Dockerfile ]; then
            TYPE=docker
          elif [ -f jsr.json ]; then
            TYPE=ts
          elif [ -f go.mod ]; then
            TYPE=go
          else
            TYPE=none
          fi
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"

          # Find first-level subdirectories with jsr.json (subpackages).
          # Only one repo currently uses this (web-terminal-engine/web/), but the mechanism
          # is generic — any repo with a Go/Docker root + a TS lib in a subdir
          # gets unified releases via this matrix.
          SUBS="[]"
          for d in */; do
            if [ -f "${d}jsr.json" ]; then
              SUBS=$(echo "$SUBS" | jq -c --arg v "${d%/}" '. + [$v]')
            fi
          done
          echo "subpackages=$SUBS" >> "$GITHUB_OUTPUT"
          echo "type=$TYPE  subpackages=$SUBS"

      - name: Detect nested Go modules
        id: gomodules
        run: |
          # Nested Go modules — a TRACKED subdirectory go.mod — each get their
          # own release lane: independent conventional-commit versioning and
          # <dir>/vX.Y.Z tags (the go-nested job below). Works for any repo
          # type; a repo without nested modules produces [] and nothing below
          # changes behavior. Discovery prunes vendored/generated trees: a
          # committed node_modules (e.g. subflux's embedded frontend deps) can
          # carry upstream go.mod files that are not release lanes. git
          # pathspec '*/go.mod' matches at any depth (git wildmatch '*'
          # crosses slashes) but never the root go.mod.
          #
          # Eligibility filters (keep in sync with ci.yaml's detect step and
          # scripts/test-lane-semantics.sh, which pins them):
          #   - module path's first element must contain a dot: Go itself
          #     never fetches a dotless path from the network, so a sentinel
          #     go.mod (e.g. web-terminal-engine's `module web-ignore`, which
          #     exists to keep root `go test ./...` out of a TS subtree) is
          #     not a lane. This filter is what keeps the feature dormant on
          #     repos that track sentinel modules.
          #   - the dir must contain tracked .go files (a module with no Go
          #     source releases nothing).
          #   - RELEASE lanes skip dirs under internal/ (unimportable outside
          #     the repo, so tags/Releases for them are noise; ci.yaml still
          #     VALIDATES internal modules).
          #   - dir names are restricted to [A-Za-z0-9._/-]: anything else is
          #     not a valid Go module path element and would mis-scope the
          #     glob/regex/tag machinery downstream — fail loud, not weird.
          #   - overlapping lanes (one dir an ancestor of another) are
          #     rejected: prefix classification would assign files to a
          #     parent lane nondeterministically.
          LANES="[]"
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            d=$(dirname "$f")
            case "$d" in
              *[!A-Za-z0-9._/-]*)
                echo "::error::nested go.mod dir '$d' contains characters outside [A-Za-z0-9._/-]; not a valid Go module path element"
                exit 1 ;;
            esac
            case "/$d/" in
              */internal/*)
                echo "::notice::nested module '$d' is under internal/ — validated by CI, not released"
                continue ;;
            esac
            modpath=$(awk '$1=="module"{print $2; exit}' "$f")
            case "${modpath%%/*}" in
              *.*) : ;;
              *)
                echo "::notice::nested go.mod '$f' (module '${modpath:-<none>}') has a dotless first path element — a sentinel/local module, not a release lane"
                continue ;;
            esac
            if [ -z "$(git ls-files "$d/*.go" | head -1)" ]; then
              echo "::notice::nested module '$d' has no tracked .go files — not a release lane"
              continue
            fi
            LANES=$(echo "$LANES" | jq -c --arg v "$d" '. + [$v]')
          done < <(git ls-files '*/go.mod' | grep -Ev '(^|/)(node_modules|vendor|testdata|static|dist)/' || true)
          # Reject overlapping lanes (ancestor/descendant pairs).
          while IFS= read -r a; do
            [ -z "$a" ] && continue
            while IFS= read -r b; do
              [ -z "$b" ] && continue
              if [ "$a" != "$b" ] && [ "${b#"$a"/}" != "$b" ]; then
                echo "::error::nested Go modules '$a' and '$b' overlap (one contains the other); restructure so lane dirs are disjoint"
                exit 1
              fi
            done < <(echo "$LANES" | jq -r '.[]')
          done < <(echo "$LANES" | jq -r '.[]')
          echo "go_modules=$LANES" >> "$GITHUB_OUTPUT"
          echo "nested Go module lanes: $LANES"

      - name: Detect changed paths
        id: changes
        env:
          BEFORE: ${{ github.event.before }}
          HEAD: ${{ github.sha }}
          SUBPACKAGES_JSON: ${{ steps.type.outputs.subpackages }}
          GO_LANES_JSON: ${{ steps.gomodules.outputs.go_modules }}
          REPO_TYPE: ${{ steps.type.outputs.type }}
        run: |
          # Determine the set of files that materially changed in this push.
          # - For push events with a known `before` SHA: git diff before..HEAD.
          # - For workflow_dispatch, initial branch creation, or unreachable
          #   `before` (force-push): treat all tracked files as "changed" so
          #   the run proceeds (loose default; tighter behaviors can be added
          #   later if needed).
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "::notice::No before SHA — treating all tracked files as changed"
            CHANGED=$(git ls-files)
          elif ! CHANGED=$(git diff --name-only "$BEFORE..$HEAD" 2>/dev/null); then
            echo "::notice::git diff failed (force push or unreachable history) — treating all tracked files as changed"
            CHANGED=$(git ls-files)
          fi

          # Central exclusion patterns. Tight by default: anything that doesn't
          # ship in the artifact (tests, lint configs, generated bundles, docs,
          # CI metadata) is excluded. To loosen, remove entries from this array.
          # The patterns use extended regex (grep -E).
          EXCLUDE_PATTERNS=(
            # Editor / formatter / linter configs
            '(^|/)\.editorconfig$'
            '(^|/)\.gitignore$'
            '(^|/)\.gitattributes$'
            '(^|/)\.dockerignore$'
            '(^|/)\.prettierrc(\.json|\.yaml|\.toml)?$'
            '(^|/)\.prettierignore$'
            '(^|/)\.htmlvalidate\.json$'
            '(^|/)\.stylelintrc\.json$'
            '(^|/)eslint\.config\.(mjs|js|cjs)$'
            '(^|/)eslint\.config\.base\.mjs$'
            '(^|/)vitest\.config\.(ts|js)$'
            '(^|/)tsconfig\.(test|tests|node)\.json$'
            # Base tsconfig.json: root-anchored ONLY. In the Go+web docker repos
            # a nested static-src/tsconfig.json is a tsc build input (it
            # compiles the web client that main.go then embeds), so it MUST
            # trigger a rebuild — do NOT broaden this to (^|/). Pure-TS libs
            # (actions, reactive) and TS subpackages keep their base tsconfig
            # at root.
            '^tsconfig\.json$'
            '(^|/)knip\.json$'
            '(^|/)stryker\.config\.json$'
            '(^|/)\.golangci\.(yaml|yml)$'
            # Gremlins (Go mutation testing) config — synced across the repos from
            # cplieger/ci into every Go repo, like .golangci. Dev-only; never
            # COPY'd/embedded into any artifact.
            '(^|/)\.gremlins\.(yaml|yml)$'
            # Ruff (Python lint/format) config, synced from cplieger/ci to the
            # Python repo (.kiro). Dev-only; never shipped.
            '(^|/)ruff\.toml$'

            # Docs and license
            '\.md$'
            '(^|/)LICENSE$'
            # Recommended alert rules shipped as README-companion
            # documentation (root-level alerts.yaml convention) — consumed by
            # operators copy-pasting into their own monitoring stack, never
            # by any Dockerfile or published package.
            '^alerts\.yaml$'
            # Grafana dashboards — committed for manual UI import (per the
            # dashboards-imported-via-UI convention), never COPY'd/embedded
            # into any image or served from one.
            '(^|/)grafana-dashboard\.json$'

            # CI / security tooling configs
            '(^|/)cliff\.toml$'
            '(^|/)renovate\.json$'
            '(^|/)\.gitleaks\.toml$'
            '(^|/)\.codeql-suppressions\.yaml$'
            '(^|/)\.trivyignore$'
            '(^|/)\.syft\.yaml$'
            '^\.github/'

            # Go test code
            '_test\.go$'
            '(^|/)testdata/'
            '(^|/)testsupport/'
            '(^|/)testcerts/'
            '(^|/)authtest/'

            # TS test code
            '\.test\.ts$'
            '\.spec\.ts$'
            '\.fuzz\.test\.ts$'
            '\.property\.test\.ts$'
            '(^|/)__test-helpers__/'
            '(^|/)__snapshots__/'
            '(^|/)test-stubs/'
            '(^|/)fc-strict-setup\.ts$'

            # Generated / vendored output
            '(^|/)dist/'
            '(^|/)coverage/'
            '(^|/)node_modules/'
            '(^|/)static/[^/]+\.js$'
            '(^|/)static/[^/]+\.js\.map$'
            '(^|/)static/style\.css$'
            '(^|/)static/vendor/'

            # Dependency lockfiles — dev/build artifacts, never shipped to
            # npm/JSR consumers (npm publish omits the lockfile; consumers
            # resolve from package.json ranges). Verified not consumed by any
            # repo Dockerfile, so excluding them is safe across docker/go/ts
            # types. This stops Renovate "Lock File Maintenance"
            # (chore(deps): lock file maintenance) — which touches only the
            # lockfile — from flipping root_changed=true and triggering a
            # spurious npm/JSR publish or image rebuild. package.json itself
            # is NOT excluded here; it gets type-aware handling in the
            # "Refine package.json significance" step below (dev-only changes
            # never ship, so they must not trigger a build/release).
            '(^|/)package-lock\.json$'
            '(^|/)npm-shrinkwrap\.json$'
            '(^|/)yarn\.lock$'
            '(^|/)pnpm-lock\.yaml$'
            '(^|/)bun\.lockb$'
            '(^|/)bun\.lock$'

            # Dev convenience / manual test scripts
            '^compose\.yaml$'
            '^test-validate\.sh$'
            '(^|/)setup-tools\.test\.sh$'
            '^tests/'
          )

          # The array above is the authoritative exclusion list. It already
          # covers every file cplieger/ci syncs into consumer repos (editor,
          # lint, CI, and changelog configs), plus tests, generated output, and
          # lockfiles: shared, non-shipping config that a chore(sync): or
          # Renovate commit must not turn into a rebuild/republish. When a NEW
          # synced config type is added, add its path to the array above in the
          # same change. (Previously auto-derived by fetching cplieger/ci's
          # sync.yml at runtime; that manifest is no longer committed, the sync
          # workflow generates it on the fly, so the exclusions are kept
          # explicit here.)
          #
          # Counterpart: the consumer cliff.toml (configs/cliff-stable.toml /
          # cliff-alpha.toml) carries an `exclude_paths` list so the RELEASE
          # gate (version bump + notes) agrees with this BUILD gate. That list
          # must stay a strict subset of this one — when removing a pattern
          # here (making a path significant again), remove it there first.

          # Join patterns with | for a single grep -E invocation.
          EXCLUDE_RE=$(IFS='|'; echo "${EXCLUDE_PATTERNS[*]}")

          # Filter: keep only paths that DON'T match any exclude pattern.
          if [ -z "$CHANGED" ]; then
            SIGNIFICANT=""
          else
            SIGNIFICANT=$(echo "$CHANGED" | grep -Ev "$EXCLUDE_RE" || true)
          fi

          # Refine package.json significance (type-aware). package.json is the
          # one file that is both a dev artifact (devDependencies, scripts) and,
          # for TS libs, the published manifest. A blanket exclude would let a
          # real runtime-dep / exports / files change ship without republishing;
          # leaving it fully significant lets a devDependency bump mint a
          # spurious release (the bug this fixes). So:
          #
          #   docker / go : NO build artifact reads package.json (web-UI images
          #                 pin TS deps as Dockerfile ARGs + tsc; verified no
          #                 Dockerfile references package.json). Drop every
          #                 package.json from the significant set outright.
          #   ts          : package.json IS the published tarball manifest, but
          #                 devDependencies never ship. Keep it significant only
          #                 when a non-devDependencies field changed. Compare
          #                 before/after with devDependencies stripped; if equal,
          #                 the change was dev-only — drop it. Applies to root
          #                 and subpackage package.json alike.
          if [ -n "$SIGNIFICANT" ] && echo "$SIGNIFICANT" | grep -qE '(^|/)package\.json$'; then
            if [ "$REPO_TYPE" = "docker" ] || [ "$REPO_TYPE" = "go" ]; then
              SIGNIFICANT=$(echo "$SIGNIFICANT" | grep -Ev '(^|/)package\.json$' || true)
              echo "::notice::$REPO_TYPE repo — package.json is dev-only here, dropped from significance"
            elif [ "$REPO_TYPE" = "ts" ] && [ -n "$BEFORE" ] \
                 && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              while IFS= read -r pj; do
                [ -z "$pj" ] && continue
                b=$(git show "$BEFORE:$pj" 2>/dev/null | jq -S 'del(.devDependencies)' 2>/dev/null || echo "")
                h=$(git show "$HEAD:$pj"   2>/dev/null | jq -S 'del(.devDependencies)' 2>/dev/null || echo "")
                if [ -n "$b" ] && [ "$b" = "$h" ]; then
                  SIGNIFICANT=$(echo "$SIGNIFICANT" | grep -vxF "$pj" || true)
                  echo "::notice::$pj changed only in devDependencies — not significant"
                fi
              done < <(echo "$SIGNIFICANT" | grep -E '(^|/)package\.json$')
            fi
          fi

          # Determine root_changed (any significant file outside all subpackage
          # dirs AND all nested Go module lane dirs) and which subpackages /
          # lanes changed. A lane dir's changes belong to that lane's release,
          # not the root's — the same classification the TS subpackages use.
          ROOT_CHANGED=false
          declare -A SUBPKG_CHANGED
          declare -A LANE_CHANGED
          mapfile -t SUBPACKAGES < <(echo "$SUBPACKAGES_JSON" | jq -r '.[]')
          mapfile -t GO_LANES < <(echo "$GO_LANES_JSON" | jq -r '.[]')
          for s in "${SUBPACKAGES[@]}"; do
            SUBPKG_CHANGED["$s"]=false
          done
          for l in "${GO_LANES[@]}"; do
            LANE_CHANGED["$l"]=false
          done

          if [ -n "$SIGNIFICANT" ]; then
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              in_subpkg=false
              for s in "${SUBPACKAGES[@]}"; do
                if [[ "$f" == "$s/"* ]]; then
                  SUBPKG_CHANGED["$s"]=true
                  in_subpkg=true
                  break
                fi
              done
              in_lane=false
              for l in "${GO_LANES[@]}"; do
                if [[ "$f" == "$l/"* ]]; then
                  LANE_CHANGED["$l"]=true
                  in_lane=true
                  break
                fi
              done
              if ! $in_subpkg && ! $in_lane; then
                ROOT_CHANGED=true
              fi
            done <<< "$SIGNIFICANT"
          fi

          SUBS_TO_PUBLISH="[]"
          for s in "${SUBPACKAGES[@]}"; do
            if [ "${SUBPKG_CHANGED[$s]}" = "true" ]; then
              SUBS_TO_PUBLISH=$(echo "$SUBS_TO_PUBLISH" | jq -c --arg v "$s" '. + [$v]')
            fi
          done

          GO_LANES_TO_RELEASE="[]"
          for l in "${GO_LANES[@]}"; do
            if [ "${LANE_CHANGED[$l]}" = "true" ]; then
              GO_LANES_TO_RELEASE=$(echo "$GO_LANES_TO_RELEASE" | jq -c --arg v "$l" '. + [$v]')
            fi
          done

          {
            echo "root_changed=$ROOT_CHANGED"
            echo "subpackages_to_publish=$SUBS_TO_PUBLISH"
            echo "go_modules_to_release=$GO_LANES_TO_RELEASE"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Change detection summary"
            echo ""
            echo "**Before:** \`$BEFORE\`"
            echo "**Head:** \`$HEAD\`"
            echo ""
            echo "**Significant paths:**"
            echo '```'
            echo "${SIGNIFICANT:-(none — only excluded paths changed)}"
            echo '```'
            echo ""
            echo "**Outputs:**"
            echo "- root_changed: $ROOT_CHANGED"
            echo "- subpackages_to_publish: $SUBS_TO_PUBLISH"
            echo "- go_modules_to_release: $GO_LANES_TO_RELEASE"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Recompute lane-aware versions
        id: lanes
        if: ${{ steps.gomodules.outputs.go_modules != '[]' }}
        env:
          GO_LANES_JSON: ${{ steps.gomodules.outputs.go_modules }}
        run: |
          # With nested Go module lanes present, the composite action's
          # config-driven compute above is not lane-safe: the fleet-synced
          # cliff config cannot know this repo's lane dirs, so a lane-only
          # commit (e.g. a yaml-dep feat in yamlenv/) would count toward the
          # ROOT version bump and mint a spurious root release (verified on
          # v2.13.1; probe state H pins it). Recompute the root version with
          # per-repo CLI scoping: each lane's commits excluded via
          # --exclude-path '<dir>/**' (CLI excludes MERGE with the config
          # exclude_paths — probe state J pins that), plus the root tag
          # universe stated explicitly via --tag-pattern '^v[0-9]' as
          # defense-in-depth — the anchored pattern ships in the synced
          # config, but this step must not depend on every consumer's
          # cliff.toml being current (an unanchored stale copy would let a
          # lane tag hijack the version string — probe state G's hazard).
          # Version + tarball sha256 pinned as a pair; Renovate maintains both
          # via the custom.git-cliff datasource (GitHub release-asset digest).
          # Fail-closed: a tarball that does not match the committed pin never
          # installs — the binary runs against every repo's history, and the
          # checkout already treats it as untrusted (persist-credentials is
          # false everywhere it runs).
          # renovate: datasource=custom.git-cliff depName=orhun/git-cliff
          CLIFF_VERSION=v2.13.1
          CLIFF_SHA256=9a1263f24e59a2f508c7b3d3283c9dea94a8bf697f96dbc18cc783cac6284546
          curl -fsSL --retry 3 -o "$RUNNER_TEMP/git-cliff.tgz" \
            "https://github.com/orhun/git-cliff/releases/download/${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION#v}-x86_64-unknown-linux-gnu.tar.gz"
          echo "${CLIFF_SHA256}  ${RUNNER_TEMP}/git-cliff.tgz" | sha256sum -c -
          tar xzf "$RUNNER_TEMP/git-cliff.tgz" -C /usr/local/bin --strip-components=1 "git-cliff-${CLIFF_VERSION#v}/git-cliff"
          ARGS=(--tag-pattern '^v[0-9]')
          while IFS= read -r d; do
            [ -z "$d" ] && continue
            ARGS+=(--exclude-path "$d/**")
          done < <(echo "$GO_LANES_JSON" | jq -r '.[]')
          if ! NEXT="$(git cliff --unreleased --bumped-version "${ARGS[@]}" 2>/tmp/cliff.err)"; then
            echo "::error::lane-aware git-cliff --bumped-version failed:"
            sed 's/^/  /' /tmp/cliff.err >&2 || true
            exit 1
          fi
          if [ -z "$NEXT" ]; then
            echo "::error::lane-aware git-cliff returned an empty version with no error"
            exit 1
          fi
          # Defense in depth: the root lane must never tag a lane-prefixed
          # version. If this fires, the cliff contract changed under us.
          case "$NEXT" in
            v[0-9]*) : ;;
            *)
              echo "::error::lane-aware compute returned non-root version '$NEXT'; refusing"
              exit 1 ;;
          esac
          LATEST="$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo "")"
          if [ "$NEXT" = "$LATEST" ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Lane-aware root version: ${NEXT} (latest root tag: ${LATEST:-<none>}; lanes: ${GO_LANES_JSON})"

      - name: Detect finalize state
        id: finalize
        env:
          GH_TOKEN: ${{ github.token }}
          EFFECTIVE_RELEASE: ${{ steps.lanes.outputs.release || steps.cliff.outputs.release }}
          EFFECTIVE_VERSION: ${{ steps.lanes.outputs.version || steps.cliff.outputs.version }}
        run: |
          # A prior run can create the version tag and then die before the
          # GitHub Release lands (a transient API failure in exactly the
          # window of the 2026-07-15 fleet incident class). On rerun the
          # version compute sees NEXT == LATEST and reports release=false,
          # so the publish jobs would skip and the missing Release could
          # never be repaired by rerun — while re-cutting or moving the tag
          # is forbidden (Go module versions and image provenance are
          # immutable once published). Not just a cosmetic gap: the release
          # EVENT never fires, so its consumers (the per-repo Komodo hook
          # that expedites a Renovate scan) miss it, and the Release page
          # with the changelog + signed SBOM assets is absent until
          # repaired. Image deploys still land via the resident Renovate's
          # hourly registry sweep — delayed, not lost.
          #
          # finalize=true when the computed version's tag already points at
          # THIS commit and its GitHub Release is missing. The go/ts/docker
          # jobs then run in finalize mode: repair the Release only (notes
          # via --current, since the commits are no longer "unreleased";
          # probe states K/L pin that rendering). They never re-tag — the
          # exists-at-same-SHA guard already passes through — and never
          # touch package registries (the root ts publish step is gated on
          # release=='true'; by step order a root tag can only exist after
          # its registries already published). Same-SHA only, deliberately:
          # after the branch moves on, notes and artifacts can no longer be
          # reproduced faithfully from a newer checkout — re-run the
          # original commit's workflow run instead (the natural repair path,
          # which this step is what makes work).
          FINALIZE=false
          if [ "$EFFECTIVE_RELEASE" = "false" ] && [ -n "$EFFECTIVE_VERSION" ]; then
            TAG_SHA=$(git rev-list -n1 "$EFFECTIVE_VERSION" 2>/dev/null || echo "")
            if [ "$TAG_SHA" = "$GITHUB_SHA" ]; then
              # Status-aware absence check: only a definitive HTTP 404 means
              # "no Release" (finalize); any other failure (auth, rate limit,
              # transient 5xx) fails the job rather than guessing in either
              # direction. The by-tag endpoint returns only PUBLISHED
              # releases, so a DRAFT orphaned by a wedged asset upload (gh
              # release create drafts first when assets are attached) also
              # reads as missing; the docker create step deletes such drafts
              # before re-creating.
              if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${EFFECTIVE_VERSION}" >/dev/null 2>/tmp/relerr; then
                echo "::notice::tag ${EFFECTIVE_VERSION} exists at this commit and its Release is present — nothing to repair"
              elif grep -q 'HTTP 404' /tmp/relerr; then
                FINALIZE=true
                echo "::notice::tag ${EFFECTIVE_VERSION} exists at this commit without a GitHub Release — finalize mode (repair the Release only)"
              else
                echo "::error::could not determine whether Release ${EFFECTIVE_VERSION} exists:"
                cat /tmp/relerr
                exit 1
              fi
            fi
          fi
          echo "finalize=$FINALIZE" >> "$GITHUB_OUTPUT"

      - name: Resolve repo policy
        id: policy
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # Per-repo policy overrides. Centralized here, NOT per-repo config.
          # When you need to change a repo's release behavior, edit this step.
          #
          # Defaults:
          #   registries  = "ghcr,dockerhub" (push to both)
          #   platforms   = "linux/amd64,linux/arm64" (multi-arch)
          #   sbom_from   = "image" (scan published image)
          #   syft_config = ".syft.yaml" if file exists at root, else ""
          REGISTRIES="ghcr,dockerhub"
          PLATFORMS="linux/amd64,linux/arm64"
          SBOM_FROM="image"

          case "$REPO_NAME" in
            # GHCR-only (no Docker Hub mirror). Pre-1.0 apps not yet mirrored
            # to Docker Hub. The docker-* infra images (caddy, age, keepalived,
            # static-web, radvd) graduated to dual-publish once they hit 1.0.
            # Keep in sync with GHCR_ONLY in scripts/audit.py (it exempts
            # these repos from the DOCKERHUB_* secrets check).
            subflux|vibekit)
              REGISTRIES="ghcr" ;;
          esac

          case "$REPO_NAME" in
            # SBOM from extracted binary path (image-level scan misses static
            # Go deps for these builds).
            web-terminal-kiro|vibekit)
              SBOM_FROM="path" ;;
          esac

          # Auto-detect a checked-in syft config at repo root.
          if [ -f .syft.yaml ]; then
            SYFT_CONFIG=".syft.yaml"
          else
            SYFT_CONFIG=""
          fi

          {
            echo "registries=$REGISTRIES"
            echo "platforms=$PLATFORMS"
            echo "sbom_from=$SBOM_FROM"
            echo "syft_config=$SYFT_CONFIG"
          } >> "$GITHUB_OUTPUT"

          echo "Policy: registries=$REGISTRIES platforms=$PLATFORMS sbom_from=$SBOM_FROM syft_config='$SYFT_CONFIG'"

  # ─── Docker image build + sign + SBOM + release (delegated) ────────────────
  docker:
    needs: detect
    if: ${{ needs.detect.outputs.type == 'docker' && needs.detect.outputs.root_changed == 'true' }}
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    # Local ref (not an @sha pin): docker-release.yaml resolves to the SAME
    # commit a consumer pinned this release.yaml to, so a fix to
    # docker-release.yaml reaches consumers on the next release.yaml bump
    # without a second internal-pin bump + tag cycle.
    uses: ./.github/workflows/docker-release.yaml
    with:
      version: ${{ needs.detect.outputs.version }}
      release-needed: ${{ needs.detect.outputs.release }}
      go-modules: ${{ needs.detect.outputs.go_modules }}
      finalize: ${{ needs.detect.outputs.finalize }}
      registries: ${{ needs.detect.outputs.registries }}
      platforms: ${{ needs.detect.outputs.platforms }}
      sbom-from: ${{ needs.detect.outputs.sbom_from }}
      syft-config: ${{ needs.detect.outputs.syft_config }}
      # Effective no-op-skip flag: an explicit workflow_call input (direct
      # callers) OR the consumer stub's own workflow_dispatch input. The
      # github context inside a reusable workflow is the CALLER's, so the
      # stub's dispatch input is readable here without the stub forwarding it
      # via `with:` (forwarding would break every consumer whose pinned SHA
      # predates the input during the template-sync/Renovate-bump gap). Push
      # events always evaluate false: github.event.inputs only exists on
      # workflow_dispatch, so the push path keeps today's always-publish
      # semantics.
      skip-if-unchanged: ${{ inputs.skip_if_unchanged || github.event.inputs.skip_if_unchanged == 'true' }}
    secrets: inherit

  # ─── Go module release (tag + GitHub Release; `go install` fetches by tag) ─
  go:
    needs: detect
    # finalize widens the gate so a rerun after a tag-created/Release-missing
    # partial run can repair the Release (see detect's finalize step); the
    # release==false + finalize==true combination changes only the notes
    # rendering inside the Tag + GitHub Release step.
    if: ${{ needs.detect.outputs.type == 'go' && needs.detect.outputs.root_changed == 'true' && (needs.detect.outputs.release == 'true' || needs.detect.outputs.finalize == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false
          fetch-depth: 0

      - name: Verify module path matches major version
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          # Go semantic import versioning: a module released at v2+ MUST carry
          # its major in the module path (.../v2, .../v3). git-cliff bumps the
          # major on a feat!:/BREAKING CHANGE: commit, but adding the /vN suffix
          # to go.mod (and rewriting internal imports) is a separate manual step
          # that is easy to forget. The gap is invisible until the first v2+
          # consumer runs `go get .../vN` and hits "module path must match major
          # version". Fail the release here so a broken v2+ tag is never cut.
          ver="${VERSION#v}"
          major="${ver%%.*}"
          case "$major" in
            '' | *[!0-9]*)
              echo "::notice::'$VERSION' has no numeric major — skipping module-path check"
              exit 0 ;;
          esac
          if [ "$major" -lt 2 ]; then
            echo "v$major needs no /vN module-path suffix — ok ($VERSION)"
            exit 0
          fi
          modpath=$(awk '$1=="module"{print $2; exit}' go.mod)
          if [ -z "$modpath" ]; then
            echo "::error::no module directive found in go.mod"
            exit 1
          fi
          case "$modpath" in
            */v"$major")
              echo "ok: module path '$modpath' matches major v$major ($VERSION)" ;;
            *)
              echo "::error::go.mod module path '$modpath' must end in /v$major to release $VERSION (Go semantic import versioning). Add the /v$major suffix to the module directive and rewrite internal imports, then re-release."
              exit 1 ;;
          esac

      - name: Generate release notes
        # Deliberately token-free: this step downloads and EXECUTES git-cliff,
        # and an untrusted binary must never run with a credential in its
        # environment (persist-credentials=false keeps it out of .git/config,
        # but a step-level GH_TOKEN would still be readable by any child
        # process). The gh/tagging calls live in the next step, which runs no
        # downloaded code.
        env:
          VERSION: ${{ needs.detect.outputs.version }}
          GO_LANES_JSON: ${{ needs.detect.outputs.go_modules }}
          FINALIZE: ${{ needs.detect.outputs.finalize }}
        run: |
          # Version + tarball sha256 pinned as a pair; Renovate maintains both
          # via the custom.git-cliff datasource (GitHub release-asset digest).
          # Fail-closed: a tarball that does not match the committed pin never
          # installs.
          # renovate: datasource=custom.git-cliff depName=orhun/git-cliff
          CLIFF_VERSION=v2.13.1
          CLIFF_SHA256=9a1263f24e59a2f508c7b3d3283c9dea94a8bf697f96dbc18cc783cac6284546
          curl -fsSL --retry 3 -o "$RUNNER_TEMP/git-cliff.tgz" \
            "https://github.com/orhun/git-cliff/releases/download/${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION#v}-x86_64-unknown-linux-gnu.tar.gz"
          echo "${CLIFF_SHA256}  ${RUNNER_TEMP}/git-cliff.tgz" | sha256sum -c -
          tar xzf "$RUNNER_TEMP/git-cliff.tgz" -C /usr/local/bin --strip-components=1 "git-cliff-${CLIFF_VERSION#v}/git-cliff"
          # Lane-aware notes: when nested Go module lanes exist, scope the
          # root notes to the root lane (root tag universe + lane commits
          # excluded), or lane commits leak into the root release's notes
          # (probe state J). No lanes -> no extra args -> unchanged.
          LANE_ARGS=()
          if [ -n "$GO_LANES_JSON" ] && [ "$GO_LANES_JSON" != "[]" ]; then
            LANE_ARGS+=(--tag-pattern '^v[0-9]')
            while IFS= read -r d; do
              [ -z "$d" ] && continue
              LANE_ARGS+=(--exclude-path "$d/**")
            done < <(echo "$GO_LANES_JSON" | jq -r '.[]')
          fi
          # --unreleased --tag renders the commits since the last tag as
          # $VERSION. The new tag does NOT exist yet (the gh release create
          # below creates it), so a bare `--latest` would render the PREVIOUS
          # release's notes instead of this one's. In FINALIZE mode the tag
          # DOES exist (at this very commit — detect verified it), so those
          # commits are no longer "unreleased": render the CURRENT release
          # instead (probe states K/L pin that --current sees them, lane
          # flags respected).
          if [ "$FINALIZE" = "true" ]; then
            git cliff --current "${LANE_ARGS[@]}" --strip header > NOTES.md
          else
            git cliff --unreleased --tag "$VERSION" "${LANE_ARGS[@]}" --strip header > NOTES.md
          fi

      - name: Tag + GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          # Tag ref created first via the git data API, pinned to the trigger
          # commit; release then attaches to the existing tag (no --target).
          # `gh release create --target` tag-creation 403s for the integration
          # token when a mid-run push moved main past $GITHUB_SHA (observed
          # fleet-wide 2026-07-15); the git ref create has no head restriction.
          if EXISTING=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${VERSION}" --jq .object.sha 2>/dev/null); then
            if [ "$EXISTING" != "$GITHUB_SHA" ]; then
              echo "::error::Tag ${VERSION} exists at ${EXISTING}, not ${GITHUB_SHA}; refusing."
              exit 1
            fi
          else
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" -f ref="refs/tags/${VERSION}" -f sha="${GITHUB_SHA}"
          fi
          gh release view "$VERSION" >/dev/null 2>&1 || gh release create "$VERSION" --title "$VERSION" --notes-file NOTES.md

  # ─── TypeScript library release (npm + JSR + tag + GitHub Release) ─────────
  ts:
    needs: detect
    # finalize widens the gate exactly as in the go job; the npm/JSR publish
    # steps are already idempotent version-exists skips, so a finalize rerun
    # passes through them and repairs only the missing GitHub Release.
    if: ${{ needs.detect.outputs.type == 'ts' && needs.detect.outputs.root_changed == 'true' && (needs.detect.outputs.release == 'true' || needs.detect.outputs.finalize == 'true') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm + JSR
        # release-only, never finalize: by step order a root tag can only
        # exist after both registries already published, so a finalize rerun
        # (or a hand-pushed tag at HEAD) has nothing to publish — running
        # here anyway would push a package for a version compute that said
        # release=false. The version-exists guards below stay as the
        # belt-and-suspenders for reruns of the publish path itself.
        if: ${{ needs.detect.outputs.release == 'true' }}
        env:
          # No NODE_AUTH_TOKEN — both NPM and JSR publish via GitHub OIDC.
          # NPM: trusted publisher configured at npmjs.com pointing to this
          #      workflow + repo (auto-attaches provenance attestation).
          # JSR: trusted publisher configured at jsr.io at the scope level.
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          ver="${VERSION#v}"
          pkg="$(npm pkg get name | tr -d '\"')"
          npm pkg set version="$ver"
          node -e "const fs=require('fs'),f='jsr.json',j=JSON.parse(fs.readFileSync(f));j.version='${ver}';fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          # Skip NPM if version already exists (bootstrap-friendly).
          if npm view "$pkg@$ver" version >/dev/null 2>&1; then
            echo "::notice::npm: $pkg@$ver already published — skipping"
          else
            npm publish --access public
          fi
          # Skip JSR if the version already exists. JSR has no overwrite and
          # `jsr publish` errors on a duplicate, which would wedge a re-run
          # after a partial/cancelled release (npm can publish but the run
          # dies before tagging). Mirror of the npm guard above.
          if curl -fsSL "https://jsr.io/${pkg}/meta.json" \
               | jq -e --arg v "$ver" '.versions[$v]' >/dev/null 2>&1; then
            echo "::notice::jsr: $pkg@$ver already published — skipping"
          else
            # deno's `jsr publish` uses BYONM, so runtime deps (e.g.
            # @cplieger/actions -> @cplieger/reactive) must already be in
            # node_modules; the npm publish above does not install them.
            # Install (without touching the lockfile) before publishing to JSR.
            npm install --no-save
            # Pin the jsr CLI: a bare `npx jsr` fetches whatever is latest at
            # publish time — the one floating executable on the release path.
            # renovate: datasource=npm depName=jsr
            JSR_VERSION=0.14.3
            npx -y "jsr@${JSR_VERSION}" publish --allow-dirty
          fi

      - name: Generate release notes
        # Deliberately token-free — this step executes the downloaded
        # git-cliff binary; see the go job's identical split.
        env:
          VERSION: ${{ needs.detect.outputs.version }}
          GO_LANES_JSON: ${{ needs.detect.outputs.go_modules }}
          FINALIZE: ${{ needs.detect.outputs.finalize }}
        run: |
          # Version + tarball sha256 pinned as a pair; Renovate maintains both
          # via the custom.git-cliff datasource (GitHub release-asset digest).
          # Fail-closed: a tarball that does not match the committed pin never
          # installs.
          # renovate: datasource=custom.git-cliff depName=orhun/git-cliff
          CLIFF_VERSION=v2.13.1
          CLIFF_SHA256=9a1263f24e59a2f508c7b3d3283c9dea94a8bf697f96dbc18cc783cac6284546
          curl -fsSL --retry 3 -o "$RUNNER_TEMP/git-cliff.tgz" \
            "https://github.com/orhun/git-cliff/releases/download/${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION#v}-x86_64-unknown-linux-gnu.tar.gz"
          echo "${CLIFF_SHA256}  ${RUNNER_TEMP}/git-cliff.tgz" | sha256sum -c -
          tar xzf "$RUNNER_TEMP/git-cliff.tgz" -C /usr/local/bin --strip-components=1 "git-cliff-${CLIFF_VERSION#v}/git-cliff"
          # Lane-aware notes when nested Go module lanes exist (see the go
          # job's identical block; probe state J).
          LANE_ARGS=()
          if [ -n "$GO_LANES_JSON" ] && [ "$GO_LANES_JSON" != "[]" ]; then
            LANE_ARGS+=(--tag-pattern '^v[0-9]')
            while IFS= read -r d; do
              [ -z "$d" ] && continue
              LANE_ARGS+=(--exclude-path "$d/**")
            done < <(echo "$GO_LANES_JSON" | jq -r '.[]')
          fi
          # --unreleased --tag renders the commits since the last tag as
          # $VERSION (the tag does not exist yet on the publish path); in
          # FINALIZE mode the tag exists at this commit, so render the
          # CURRENT release instead (see the go job; probe states K/L).
          if [ "$FINALIZE" = "true" ]; then
            git cliff --current "${LANE_ARGS[@]}" --strip header > NOTES.md
          else
            git cliff --unreleased --tag "$VERSION" "${LANE_ARGS[@]}" --strip header > NOTES.md
          fi

      - name: Tag + GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          # Tag ref created first via the git data API, pinned to the trigger
          # commit; release then attaches to the existing tag (no --target).
          # `gh release create --target` tag-creation 403s for the integration
          # token when a mid-run push moved main past $GITHUB_SHA (observed
          # fleet-wide 2026-07-15); the git ref create has no head restriction.
          if EXISTING=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${VERSION}" --jq .object.sha 2>/dev/null); then
            if [ "$EXISTING" != "$GITHUB_SHA" ]; then
              echo "::error::Tag ${VERSION} exists at ${EXISTING}, not ${GITHUB_SHA}; refusing."
              exit 1
            fi
          else
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" -f ref="refs/tags/${VERSION}" -f sha="${GITHUB_SHA}"
          fi
          gh release view "$VERSION" >/dev/null 2>&1 || gh release create "$VERSION" --title "$VERSION" --notes-file NOTES.md

  # ─── Subpackage publish (matrix over `*/jsr.json` dirs that changed) ───────
  subpackage:
    needs: [detect, docker, ts, go]
    # finalize widens this gate too — the OPPOSITE asymmetry of the root ts
    # job. Root ts registries publish BEFORE the root tag, so an existing
    # tag proves they published and the finalize path skips them. This job
    # publishes AFTER the root go/ts/docker job (needs-ordered), so a run
    # that died between the root tag and here leaves the subpackage
    # registries genuinely unpublished; a finalize rerun must pass through
    # (the version-exists guards inside skip anything that did land).
    if: |
      always()
      && needs.detect.outputs.subpackages_to_publish != '[]'
      && (needs.detect.outputs.release == 'true' || needs.detect.outputs.finalize == 'true')
      && (needs.docker.result == 'success' || needs.docker.result == 'skipped')
      && (needs.ts.result == 'success' || needs.ts.result == 'skipped')
      && (needs.go.result == 'success' || needs.go.result == 'skipped')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        dir: ${{ fromJSON(needs.detect.outputs.subpackages_to_publish) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish subpackage to npm + JSR
        working-directory: ${{ matrix.dir }}
        env:
          # OIDC-only: trusted publishers configured at npmjs.com + jsr.io.
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          ver="${VERSION#v}"
          pkg="$(npm pkg get name | tr -d '\"')"
          npm pkg set version="$ver"
          node -e "const fs=require('fs'),f='jsr.json',j=JSON.parse(fs.readFileSync(f));j.version='${ver}';fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          if npm view "$pkg@$ver" version >/dev/null 2>&1; then
            echo "::notice::npm: $pkg@$ver already published — skipping"
          else
            npm publish --access public
          fi
          # Skip JSR if the version already exists (mirror of the npm guard);
          # keeps a re-run after a partial/cancelled release from wedging on
          # a duplicate `jsr publish`.
          if curl -fsSL "https://jsr.io/${pkg}/meta.json" \
               | jq -e --arg v "$ver" '.versions[$v]' >/dev/null 2>&1; then
            echo "::notice::jsr: $pkg@$ver already published — skipping"
          else
            # deno's `jsr publish` uses BYONM, so runtime deps (e.g.
            # @cplieger/actions -> @cplieger/reactive) must already be in
            # node_modules; the npm publish above does not install them.
            # Install (without touching the lockfile) before publishing to JSR.
            npm install --no-save
            # Pin the jsr CLI: a bare `npx jsr` fetches whatever is latest at
            # publish time — the one floating executable on the release path.
            # renovate: datasource=npm depName=jsr
            JSR_VERSION=0.14.3
            npx -y "jsr@${JSR_VERSION}" publish --allow-dirty
          fi

  # ─── Nested Go module lanes (matrix; independent <dir>/vX.Y.Z versions) ────
  # Each tracked nested go.mod is its own release lane: its version is
  # computed from ITS commits (conventional commits touching the lane dir)
  # against ITS tag universe (<dir>/vX.Y.Z), fully independent of the root
  # version — so a yaml-dep bump in a nested module never mints a root
  # release, and a root release never re-tags an unchanged nested module.
  # Only needs detect (nothing is shared with the root/docker/ts jobs; the
  # lane has its own version). Consumers require the BARE semver
  # (`go get repo/<dir>@vX.Y.Z`); the Go tooling maps it to this lane's
  # `<dir>/vX.Y.Z` git tag (standard Go subdirectory-module tagging). Lane
  # versions are computed here, not in detect: the matrix job checks out
  # full history anyway, and this avoids plumbing a dir->version map through
  # job outputs.
  go-nested:
    needs: detect
    if: ${{ needs.detect.outputs.go_modules_to_release != '' && needs.detect.outputs.go_modules_to_release != '[]' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJSON(needs.detect.outputs.go_modules_to_release) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false
          fetch-depth: 0

      - name: Compute lane version
        id: lane
        env:
          DIR: ${{ matrix.dir }}
        run: |
          # Version + tarball sha256 pinned as a pair; Renovate maintains both
          # via the custom.git-cliff datasource (GitHub release-asset digest).
          # Fail-closed: a tarball that does not match the committed pin never
          # installs — the binary runs against every repo's history, and the
          # checkout already treats it as untrusted (persist-credentials is
          # false everywhere it runs).
          # renovate: datasource=custom.git-cliff depName=orhun/git-cliff
          CLIFF_VERSION=v2.13.1
          CLIFF_SHA256=9a1263f24e59a2f508c7b3d3283c9dea94a8bf697f96dbc18cc783cac6284546
          curl -fsSL --retry 3 -o "$RUNNER_TEMP/git-cliff.tgz" \
            "https://github.com/orhun/git-cliff/releases/download/${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION#v}-x86_64-unknown-linux-gnu.tar.gz"
          echo "${CLIFF_SHA256}  ${RUNNER_TEMP}/git-cliff.tgz" | sha256sum -c -
          tar xzf "$RUNNER_TEMP/git-cliff.tgz" -C /usr/local/bin --strip-components=1 "git-cliff-${CLIFF_VERSION#v}/git-cliff"
          # Lane scoping (probe state I): the lane's tag universe via
          # --tag-pattern '^<dir>/v[0-9]' (dir regex-escaped), the lane's
          # commit window via --include-path '<dir>/**', and first-release
          # bootstrap via GIT_CLIFF__BUMP__INITIAL_TAG=<dir>/v1.0.0 (the
          # config initial_tag is root-shaped and would fail the pattern).
          ESC=$(printf '%s' "$DIR" | sed -e 's/[][\.|(){}?+*^$]/\\&/g')
          if ! NEXT="$(GIT_CLIFF__BUMP__INITIAL_TAG="${DIR}/v1.0.0" git cliff \
                --unreleased --bumped-version \
                --tag-pattern "^${ESC}/v[0-9]" \
                --include-path "${DIR}/**" 2>/tmp/cliff.err)"; then
            echo "::error::lane git-cliff --bumped-version failed for ${DIR}:"
            sed 's/^/  /' /tmp/cliff.err >&2 || true
            exit 1
          fi
          if [ -z "$NEXT" ]; then
            echo "::error::lane git-cliff returned an empty version for ${DIR}"
            exit 1
          fi
          # The lane must never produce anything but its own prefixed semver.
          case "$NEXT" in
            "$DIR"/v[0-9]*) : ;;
            *)
              echo "::error::lane compute for '${DIR}' returned '${NEXT}' (not ${DIR}/vX.Y.Z); refusing"
              exit 1 ;;
          esac
          # Release boolean, lane-scoped: `git describe --match` is a
          # WHOLE-NAME glob, so the root's v* tags can never satisfy it.
          #
          # Publication is a resumable state machine, not a boolean: a prior
          # run can have created the tag and then died before the GitHub
          # Release (transient API failure). On rerun, NEXT == LATEST would
          # read as "nothing to do" and the missing Release could never be
          # repaired — and moving/re-cutting the tag is forbidden (Go module
          # versions are immutable once published). So: publish when a new
          # version is warranted, AND when the computed version's tag already
          # sits at THIS commit but its GitHub Release is missing (finalize).
          LATEST="$(git describe --tags --abbrev=0 --match "${DIR}/v[0-9]*" 2>/dev/null || echo "")"
          PUBLISH=true
          FINALIZE=false
          if [ "$NEXT" = "$LATEST" ]; then
            PUBLISH=false
            TAG_SHA="$(git rev-list -n1 "$NEXT" 2>/dev/null || echo "")"
            if [ "$TAG_SHA" = "$GITHUB_SHA" ]; then
              # Tag exists at this very commit: finalize if the Release is
              # missing (partial prior run); no-op if it exists.
              FINALIZE=true
              echo "::notice::lane ${DIR}: tag ${NEXT} already at this commit — finalize mode (repair a missing GitHub Release only)"
            else
              echo "::notice::lane ${DIR}: no release warranted (at ${LATEST})"
            fi
          fi
          if [ "$PUBLISH" = "true" ] || [ "$FINALIZE" = "true" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "finalize=$FINALIZE" >> "$GITHUB_OUTPUT"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Lane ${DIR}: version=${NEXT} publish=${PUBLISH} finalize=${FINALIZE} (latest lane tag: ${LATEST:-<none>})"

      - name: Verify lane module path
        if: ${{ steps.lane.outputs.release == 'true' }}
        env:
          DIR: ${{ matrix.dir }}
          VERSION: ${{ steps.lane.outputs.version }}
        run: |
          # The nested module's path must be exactly
          # github.com/<owner>/<repo>/<dir> (+ /vN for major >= 2, Go semantic
          # import versioning — the root job's check, extended with the exact
          # path assertion: a copy-pasted module directive would mint a tag
          # the Go proxy can never serve for this import path.
          modpath=$(awk '$1=="module"{print $2; exit}' "$DIR/go.mod")
          if [ -z "$modpath" ]; then
            echo "::error::no module directive found in ${DIR}/go.mod"
            exit 1
          fi
          ver="${VERSION#"$DIR"/v}"
          major="${ver%%.*}"
          expected="github.com/${GITHUB_REPOSITORY}/${DIR}"
          case "$major" in
            '' | *[!0-9]*)
              echo "::notice::'$VERSION' has no numeric major — applying the base-path rule only" ;;
            *)
              if [ "$major" -ge 2 ]; then
                expected="${expected}/v${major}"
              fi ;;
          esac
          if [ "$modpath" != "$expected" ]; then
            echo "::error::${DIR}/go.mod module path '$modpath' must be '$expected' to release ${VERSION} (nested Go module lane). Fix the module directive (and internal imports for a /vN major), then re-release."
            exit 1
          fi
          echo "ok: module path '$modpath' matches lane ${DIR} ($VERSION)"

      - name: Generate lane release notes
        # Deliberately token-free — this step executes the downloaded
        # git-cliff binary (installed by the compute step above); see the
        # go job's identical split.
        if: ${{ steps.lane.outputs.release == 'true' }}
        env:
          DIR: ${{ matrix.dir }}
          VERSION: ${{ steps.lane.outputs.version }}
          FINALIZE: ${{ steps.lane.outputs.finalize }}
        run: |
          # Lane-scoped notes: same flags as the version compute (probe
          # state J — lane notes carry lane commits only). In finalize mode
          # the tag already exists at HEAD, so the lane's commits are no
          # longer "unreleased" — render the CURRENT (latest tagged) release
          # instead (probe state K pins that --current sees them).
          ESC=$(printf '%s' "$DIR" | sed -e 's/[][\.|(){}?+*^$]/\\&/g')
          if [ "$FINALIZE" = "true" ]; then
            git cliff --current \
              --tag-pattern "^${ESC}/v[0-9]" \
              --include-path "${DIR}/**" --strip header > NOTES.md
          else
            git cliff --unreleased --tag "$VERSION" \
              --tag-pattern "^${ESC}/v[0-9]" \
              --include-path "${DIR}/**" --strip header > NOTES.md
          fi

      - name: Tag + GitHub Release (lane)
        if: ${{ steps.lane.outputs.release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.lane.outputs.version }}
        run: |
          # Tag ref via the git data API pinned to the trigger commit, with
          # the exists-at-different-SHA refuse guard (mirrors the root go
          # job; slash tags are ordinary multi-segment refs).
          if EXISTING=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${VERSION}" --jq .object.sha 2>/dev/null); then
            if [ "$EXISTING" != "$GITHUB_SHA" ]; then
              echo "::error::Tag ${VERSION} exists at ${EXISTING}, not ${GITHUB_SHA}; refusing."
              exit 1
            fi
          else
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" -f ref="refs/tags/${VERSION}" -f sha="${GITHUB_SHA}"
          fi
          gh release view "$VERSION" >/dev/null 2>&1 || gh release create "$VERSION" --title "$VERSION" --notes-file NOTES.md
