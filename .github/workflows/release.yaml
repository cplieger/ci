# Unified release pipeline for all cplieger consumer repos.
#
# Single entry point. Consumer repos call this workflow on every push to main;
# all routing decisions are made centrally:
#
#   detect job    →  Compute cliff version, detect repo type
#                    (docker/go/ts), find TS subpackages, identify which paths
#                    actually changed (vs. excluded test/lint/docs), and resolve
#                    per-repo policy overrides (registries, platforms, sbom).
#
#   docker job    →  Delegates to docker-release.yaml when type=docker AND
#                    non-excluded paths changed. docker-release.yaml itself
#                    handles build/sign/SBOM/release using the values we pass.
#
#   go job        →  Tag + GitHub Release for type=go (root module). No build
#                    step — `go install <repo>@<tag>` fetches by tag.
#
#   ts job        →  npm + JSR publish + tag + GitHub Release for type=ts
#                    (root TS lib).
#
#   subpackage    →  Matrix over `*/jsr.json` subpackages where the subpackage
#                    dir had non-excluded changes; npm + JSR publish per dir.
#                    Used by hybrid repos (e.g., web-terminal-engine: Go module at root +
#                    web/ TS subpackage).
#
# Path-change detection uses central exclusion patterns (see "Detect changed
# paths" step) — opinionated and tight by default. Tests, lint configs, docs,
# generated bundles, CI metadata are all ignored. If only excluded paths
# changed, no rebuild/republish is triggered even if cliff would bump the
# version (rare edge case: a `feat:` commit that only touches README).
#
# Per-repo policy is centralized in the "Resolve repo policy" step — no
# per-repo config files. To change a repo's settings, edit this workflow.
name: Release

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

# Top-level is read-only (OpenSSF Scorecard Token-Permissions); each job below
# declares the exact write scopes it needs. The docker job forwards them to the
# called docker-release.yaml, whose own jobs scope them further.
permissions:
  contents: read

concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    outputs:
      type: ${{ steps.type.outputs.type }}
      subpackages: ${{ steps.type.outputs.subpackages }}
      subpackages_to_publish: ${{ steps.changes.outputs.subpackages_to_publish }}
      version: ${{ steps.cliff.outputs.version }}
      release: ${{ steps.cliff.outputs.release }}
      root_changed: ${{ steps.changes.outputs.root_changed }}
      registries: ${{ steps.policy.outputs.registries }}
      platforms: ${{ steps.policy.outputs.platforms }}
      sbom_from: ${{ steps.policy.outputs.sbom_from }}
      syft_config: ${{ steps.policy.outputs.syft_config }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Compute version (cliff)
        id: cliff
        # Absolute @sha pin (Renovate-managed via the # v2 comment). Unlike a
        # local reusable workflow, a local composite action (`./actions/...`)
        # resolves against the CONSUMER's checked-out workspace, not this
        # repo, so it 404s when release.yaml is called from another repo. This
        # action's content is stable, so pin-lag is a non-issue here.
        uses: cplieger/ci/actions/git-cliff-version@5d063e5ae93743ae032c32f1dfbe8a3089f4c2bf # v2

      - name: Detect type + subpackages
        id: type
        run: |
          # Type precedence: Dockerfile > jsr.json > go.mod. A repo that has
          # multiple of these signals (e.g., docker-age has Dockerfile + go.mod)
          # is treated as docker; the go.mod is for the binary inside the image
          # and isn't a separately released module.
          if [ -f Dockerfile ]; then
            TYPE=docker
          elif [ -f jsr.json ]; then
            TYPE=ts
          elif [ -f go.mod ]; then
            TYPE=go
          else
            TYPE=none
          fi
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"

          # Find first-level subdirectories with jsr.json (subpackages).
          # Only one repo currently uses this (web-terminal-engine/web/), but the mechanism
          # is generic — any repo with a Go/Docker root + a TS lib in a subdir
          # gets unified releases via this matrix.
          SUBS="[]"
          for d in */; do
            if [ -f "${d}jsr.json" ]; then
              SUBS=$(echo "$SUBS" | jq -c --arg v "${d%/}" '. + [$v]')
            fi
          done
          echo "subpackages=$SUBS" >> "$GITHUB_OUTPUT"
          echo "type=$TYPE  subpackages=$SUBS"

      - name: Detect changed paths
        id: changes
        env:
          BEFORE: ${{ github.event.before }}
          HEAD: ${{ github.sha }}
          SUBPACKAGES_JSON: ${{ steps.type.outputs.subpackages }}
          REPO_TYPE: ${{ steps.type.outputs.type }}
        run: |
          # Determine the set of files that materially changed in this push.
          # - For push events with a known `before` SHA: git diff before..HEAD.
          # - For workflow_dispatch, initial branch creation, or unreachable
          #   `before` (force-push): treat all tracked files as "changed" so
          #   the run proceeds (loose default; tighter behaviors can be added
          #   later if needed).
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "::notice::No before SHA — treating all tracked files as changed"
            CHANGED=$(git ls-files)
          elif ! CHANGED=$(git diff --name-only "$BEFORE..$HEAD" 2>/dev/null); then
            echo "::notice::git diff failed (force push or unreachable history) — treating all tracked files as changed"
            CHANGED=$(git ls-files)
          fi

          # Central exclusion patterns. Tight by default: anything that doesn't
          # ship in the artifact (tests, lint configs, generated bundles, docs,
          # CI metadata) is excluded. To loosen, remove entries from this array.
          # The patterns use extended regex (grep -E).
          EXCLUDE_PATTERNS=(
            # Editor / formatter / linter configs
            '(^|/)\.editorconfig$'
            '(^|/)\.gitignore$'
            '(^|/)\.gitattributes$'
            '(^|/)\.dockerignore$'
            '(^|/)\.prettierrc(\.json|\.yaml|\.toml)?$'
            '(^|/)\.prettierignore$'
            '(^|/)\.htmlvalidate\.json$'
            '(^|/)\.stylelintrc\.json$'
            '(^|/)eslint\.config\.(mjs|js|cjs)$'
            '(^|/)eslint\.config\.base\.mjs$'
            '(^|/)vitest\.config\.(ts|js)$'
            '(^|/)tsconfig\.(test|tests|node)\.json$'
            # Base tsconfig.json: root-anchored ONLY. In the Go+web docker repos
            # a nested static-src/tsconfig.json is a tsgo build input (it
            # compiles the web client that main.go then embeds), so it MUST
            # trigger a rebuild — do NOT broaden this to (^|/). Pure-TS libs
            # (actions, reactive) and TS subpackages keep their base tsconfig
            # at root.
            '^tsconfig\.json$'
            '(^|/)knip\.json$'
            '(^|/)stryker\.config\.json$'
            '(^|/)\.golangci\.(yaml|yml)$'
            # Gremlins (Go mutation testing) config — synced across the repos from
            # cplieger/ci into every Go repo, like .golangci. Dev-only; never
            # COPY'd/embedded into any artifact.
            '(^|/)\.gremlins\.(yaml|yml)$'
            # Ruff (Python lint/format) config, synced from cplieger/ci to the
            # Python repo (.kiro). Dev-only; never shipped.
            '(^|/)ruff\.toml$'

            # Docs and license
            '\.md$'
            '(^|/)LICENSE$'
            # Grafana dashboards — committed for manual UI import (per the
            # dashboards-imported-via-UI convention), never COPY'd/embedded
            # into any image or served from one.
            '(^|/)grafana-dashboard\.json$'

            # CI / security tooling configs
            '(^|/)cliff\.toml$'
            '(^|/)renovate\.json$'
            '(^|/)\.gitleaks\.toml$'
            '(^|/)\.codeql-suppressions\.yaml$'
            '(^|/)\.trivyignore$'
            '(^|/)\.syft\.yaml$'
            '^\.github/'

            # Go test code
            '_test\.go$'
            '(^|/)testdata/'
            '(^|/)testsupport/'
            '(^|/)testcerts/'
            '(^|/)authtest/'

            # TS test code
            '\.test\.ts$'
            '\.spec\.ts$'
            '\.fuzz\.test\.ts$'
            '\.property\.test\.ts$'
            '(^|/)__test-helpers__/'
            '(^|/)__snapshots__/'
            '(^|/)test-stubs/'
            '(^|/)fc-strict-setup\.ts$'

            # Generated / vendored output
            '(^|/)dist/'
            '(^|/)coverage/'
            '(^|/)node_modules/'
            '(^|/)static/[^/]+\.js$'
            '(^|/)static/[^/]+\.js\.map$'
            '(^|/)static/style\.css$'
            '(^|/)static/vendor/'

            # Dependency lockfiles — dev/build artifacts, never shipped to
            # npm/JSR consumers (npm publish omits the lockfile; consumers
            # resolve from package.json ranges). Verified not consumed by any
            # repo Dockerfile, so excluding them is safe across docker/go/ts
            # types. This stops Renovate "Lock File Maintenance"
            # (chore(deps): lock file maintenance) — which touches only the
            # lockfile — from flipping root_changed=true and triggering a
            # spurious npm/JSR publish or image rebuild. package.json itself
            # is NOT excluded here; it gets type-aware handling in the
            # "Refine package.json significance" step below (dev-only changes
            # never ship, so they must not trigger a build/release).
            '(^|/)package-lock\.json$'
            '(^|/)npm-shrinkwrap\.json$'
            '(^|/)yarn\.lock$'
            '(^|/)pnpm-lock\.yaml$'
            '(^|/)bun\.lockb$'
            '(^|/)bun\.lock$'

            # Dev convenience / manual test scripts
            '^compose\.yaml$'
            '^test-validate\.sh$'
            '(^|/)setup-tools\.test\.sh$'
            '^tests/'
          )

          # The array above is the authoritative exclusion list. It already
          # covers every file cplieger/ci syncs into consumer repos (editor,
          # lint, CI, and changelog configs), plus tests, generated output, and
          # lockfiles: shared, non-shipping config that a chore(sync): or
          # Renovate commit must not turn into a rebuild/republish. When a NEW
          # synced config type is added, add its path to the array above in the
          # same change. (Previously auto-derived by fetching cplieger/ci's
          # sync.yml at runtime; that manifest is no longer committed, the sync
          # workflow generates it on the fly, so the exclusions are kept
          # explicit here.)

          # Join patterns with | for a single grep -E invocation.
          EXCLUDE_RE=$(IFS='|'; echo "${EXCLUDE_PATTERNS[*]}")

          # Filter: keep only paths that DON'T match any exclude pattern.
          if [ -z "$CHANGED" ]; then
            SIGNIFICANT=""
          else
            SIGNIFICANT=$(echo "$CHANGED" | grep -Ev "$EXCLUDE_RE" || true)
          fi

          # Refine package.json significance (type-aware). package.json is the
          # one file that is both a dev artifact (devDependencies, scripts) and,
          # for TS libs, the published manifest. A blanket exclude would let a
          # real runtime-dep / exports / files change ship without republishing;
          # leaving it fully significant lets a devDependency bump mint a
          # spurious release (the bug this fixes). So:
          #
          #   docker / go : NO build artifact reads package.json (web-UI images
          #                 pin TS deps as Dockerfile ARGs + tsgo; verified no
          #                 Dockerfile references package.json). Drop every
          #                 package.json from the significant set outright.
          #   ts          : package.json IS the published tarball manifest, but
          #                 devDependencies never ship. Keep it significant only
          #                 when a non-devDependencies field changed. Compare
          #                 before/after with devDependencies stripped; if equal,
          #                 the change was dev-only — drop it. Applies to root
          #                 and subpackage package.json alike.
          if [ -n "$SIGNIFICANT" ] && echo "$SIGNIFICANT" | grep -qE '(^|/)package\.json$'; then
            if [ "$REPO_TYPE" = "docker" ] || [ "$REPO_TYPE" = "go" ]; then
              SIGNIFICANT=$(echo "$SIGNIFICANT" | grep -Ev '(^|/)package\.json$' || true)
              echo "::notice::$REPO_TYPE repo — package.json is dev-only here, dropped from significance"
            elif [ "$REPO_TYPE" = "ts" ] && [ -n "$BEFORE" ] \
                 && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              while IFS= read -r pj; do
                [ -z "$pj" ] && continue
                b=$(git show "$BEFORE:$pj" 2>/dev/null | jq -S 'del(.devDependencies)' 2>/dev/null || echo "")
                h=$(git show "$HEAD:$pj"   2>/dev/null | jq -S 'del(.devDependencies)' 2>/dev/null || echo "")
                if [ -n "$b" ] && [ "$b" = "$h" ]; then
                  SIGNIFICANT=$(echo "$SIGNIFICANT" | grep -vxF "$pj" || true)
                  echo "::notice::$pj changed only in devDependencies — not significant"
                fi
              done < <(echo "$SIGNIFICANT" | grep -E '(^|/)package\.json$')
            fi
          fi

          # Determine root_changed (any significant file outside all subpackage
          # dirs) and which subpackages changed.
          ROOT_CHANGED=false
          declare -A SUBPKG_CHANGED
          mapfile -t SUBPACKAGES < <(echo "$SUBPACKAGES_JSON" | jq -r '.[]')
          for s in "${SUBPACKAGES[@]}"; do
            SUBPKG_CHANGED["$s"]=false
          done

          if [ -n "$SIGNIFICANT" ]; then
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              in_subpkg=false
              for s in "${SUBPACKAGES[@]}"; do
                if [[ "$f" == "$s/"* ]]; then
                  SUBPKG_CHANGED["$s"]=true
                  in_subpkg=true
                  break
                fi
              done
              if ! $in_subpkg; then
                ROOT_CHANGED=true
              fi
            done <<< "$SIGNIFICANT"
          fi

          SUBS_TO_PUBLISH="[]"
          for s in "${SUBPACKAGES[@]}"; do
            if [ "${SUBPKG_CHANGED[$s]}" = "true" ]; then
              SUBS_TO_PUBLISH=$(echo "$SUBS_TO_PUBLISH" | jq -c --arg v "$s" '. + [$v]')
            fi
          done

          {
            echo "root_changed=$ROOT_CHANGED"
            echo "subpackages_to_publish=$SUBS_TO_PUBLISH"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Change detection summary"
            echo ""
            echo "**Before:** \`$BEFORE\`"
            echo "**Head:** \`$HEAD\`"
            echo ""
            echo "**Significant paths:**"
            echo '```'
            echo "${SIGNIFICANT:-(none — only excluded paths changed)}"
            echo '```'
            echo ""
            echo "**Outputs:**"
            echo "- root_changed: $ROOT_CHANGED"
            echo "- subpackages_to_publish: $SUBS_TO_PUBLISH"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve repo policy
        id: policy
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # Per-repo policy overrides. Centralized here, NOT per-repo config.
          # When you need to change a repo's release behavior, edit this step.
          #
          # Defaults:
          #   registries  = "ghcr,dockerhub" (push to both)
          #   platforms   = "linux/amd64,linux/arm64" (multi-arch)
          #   sbom_from   = "image" (scan published image)
          #   syft_config = ".syft.yaml" if file exists at root, else ""
          REGISTRIES="ghcr,dockerhub"
          PLATFORMS="linux/amd64,linux/arm64"
          SBOM_FROM="image"

          case "$REPO_NAME" in
            # GHCR-only (no Docker Hub mirror). Pre-1.0 apps not yet mirrored
            # to Docker Hub. The docker-* infra images (caddy, age, keepalived,
            # static-web, radvd) graduated to dual-publish once they hit 1.0.
            subflux|vibecli|vibekit)
              REGISTRIES="ghcr" ;;
          esac

          case "$REPO_NAME" in
            # SBOM from extracted binary path (image-level scan misses static
            # Go deps for these builds).
            vibecli|vibekit)
              SBOM_FROM="path" ;;
          esac

          # Auto-detect a checked-in syft config at repo root.
          if [ -f .syft.yaml ]; then
            SYFT_CONFIG=".syft.yaml"
          else
            SYFT_CONFIG=""
          fi

          {
            echo "registries=$REGISTRIES"
            echo "platforms=$PLATFORMS"
            echo "sbom_from=$SBOM_FROM"
            echo "syft_config=$SYFT_CONFIG"
          } >> "$GITHUB_OUTPUT"

          echo "Policy: registries=$REGISTRIES platforms=$PLATFORMS sbom_from=$SBOM_FROM syft_config='$SYFT_CONFIG'"

  # ─── Docker image build + sign + SBOM + release (delegated) ────────────────
  docker:
    needs: detect
    if: ${{ needs.detect.outputs.type == 'docker' && needs.detect.outputs.root_changed == 'true' }}
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    # Local ref (not an @sha pin): docker-release.yaml resolves to the SAME
    # commit a consumer pinned this release.yaml to, so a fix to
    # docker-release.yaml reaches consumers on the next release.yaml bump
    # without a second internal-pin bump + tag cycle.
    uses: ./.github/workflows/docker-release.yaml
    with:
      version: ${{ needs.detect.outputs.version }}
      release-needed: ${{ needs.detect.outputs.release }}
      registries: ${{ needs.detect.outputs.registries }}
      platforms: ${{ needs.detect.outputs.platforms }}
      sbom-from: ${{ needs.detect.outputs.sbom_from }}
      syft-config: ${{ needs.detect.outputs.syft_config }}
    secrets: inherit

  # ─── Go module release (tag + GitHub Release; `go install` fetches by tag) ─
  go:
    needs: detect
    if: ${{ needs.detect.outputs.type == 'go' && needs.detect.outputs.root_changed == 'true' && needs.detect.outputs.release == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Tag + GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          # Install git-cliff (version compute already happened in detect, but
          # we need the binary here to render the release notes).
          # renovate: datasource=github-releases depName=orhun/git-cliff
          CLIFF_VERSION=v2.13.1
          curl -fsSL --retry 3 \
            "https://github.com/orhun/git-cliff/releases/download/${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION#v}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin --strip-components=1 "git-cliff-${CLIFF_VERSION#v}/git-cliff"
          # --unreleased --tag renders the commits since the last tag as
          # $VERSION. The new tag does NOT exist yet (the gh release create
          # below creates it), so a bare `--latest` would render the PREVIOUS
          # release's notes instead of this one's.
          git cliff --unreleased --tag "$VERSION" --strip header > NOTES.md
          # --target pins the tag to the commit that triggered this run, not the
          # branch tip. Without it, gh creates the tag at the default branch's
          # current HEAD, which races a push landing during the run and can
          # attach the release to an unrelated later commit.
          gh release create "$VERSION" --target "$GITHUB_SHA" --title "$VERSION" --notes-file NOTES.md

  # ─── TypeScript library release (npm + JSR + tag + GitHub Release) ─────────
  ts:
    needs: detect
    if: ${{ needs.detect.outputs.type == 'ts' && needs.detect.outputs.root_changed == 'true' && needs.detect.outputs.release == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm + JSR
        env:
          # No NODE_AUTH_TOKEN — both NPM and JSR publish via GitHub OIDC.
          # NPM: trusted publisher configured at npmjs.com pointing to this
          #      workflow + repo (auto-attaches provenance attestation).
          # JSR: trusted publisher configured at jsr.io at the scope level.
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          ver="${VERSION#v}"
          pkg="$(npm pkg get name | tr -d '\"')"
          npm pkg set version="$ver"
          node -e "const fs=require('fs'),f='jsr.json',j=JSON.parse(fs.readFileSync(f));j.version='${ver}';fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          # Skip NPM if version already exists (bootstrap-friendly).
          if npm view "$pkg@$ver" version >/dev/null 2>&1; then
            echo "::notice::npm: $pkg@$ver already published — skipping"
          else
            npm publish --access public
          fi
          # Skip JSR if the version already exists. JSR has no overwrite and
          # `jsr publish` errors on a duplicate, which would wedge a re-run
          # after a partial/cancelled release (npm can publish but the run
          # dies before tagging). Mirror of the npm guard above.
          if curl -fsSL "https://jsr.io/${pkg}/meta.json" \
               | jq -e --arg v "$ver" '.versions[$v]' >/dev/null 2>&1; then
            echo "::notice::jsr: $pkg@$ver already published — skipping"
          else
            # deno's `jsr publish` uses BYONM, so runtime deps (e.g.
            # @cplieger/actions -> @cplieger/reactive) must already be in
            # node_modules; the npm publish above does not install them.
            # Install (without touching the lockfile) before publishing to JSR.
            npm install --no-save
            npx jsr publish --allow-dirty
          fi

      - name: Tag + GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          # renovate: datasource=github-releases depName=orhun/git-cliff
          CLIFF_VERSION=v2.13.1
          curl -fsSL --retry 3 \
            "https://github.com/orhun/git-cliff/releases/download/${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION#v}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin --strip-components=1 "git-cliff-${CLIFF_VERSION#v}/git-cliff"
          # --unreleased --tag renders the commits since the last tag as
          # $VERSION. The new tag does NOT exist yet (the gh release create
          # below creates it), so a bare `--latest` would render the PREVIOUS
          # release's notes instead of this one's.
          git cliff --unreleased --tag "$VERSION" --strip header > NOTES.md
          # --target pins the tag to the commit that triggered this run, not the
          # branch tip. Without it, gh creates the tag at the default branch's
          # current HEAD, which races a push landing during the run and can
          # attach the release to an unrelated later commit.
          gh release create "$VERSION" --target "$GITHUB_SHA" --title "$VERSION" --notes-file NOTES.md

  # ─── Subpackage publish (matrix over `*/jsr.json` dirs that changed) ───────
  subpackage:
    needs: [detect, docker, ts, go]
    if: |
      always()
      && needs.detect.outputs.subpackages_to_publish != '[]'
      && needs.detect.outputs.release == 'true'
      && (needs.docker.result == 'success' || needs.docker.result == 'skipped')
      && (needs.ts.result == 'success' || needs.ts.result == 'skipped')
      && (needs.go.result == 'success' || needs.go.result == 'skipped')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        dir: ${{ fromJSON(needs.detect.outputs.subpackages_to_publish) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish subpackage to npm + JSR
        working-directory: ${{ matrix.dir }}
        env:
          # OIDC-only: trusted publishers configured at npmjs.com + jsr.io.
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          ver="${VERSION#v}"
          pkg="$(npm pkg get name | tr -d '\"')"
          npm pkg set version="$ver"
          node -e "const fs=require('fs'),f='jsr.json',j=JSON.parse(fs.readFileSync(f));j.version='${ver}';fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          if npm view "$pkg@$ver" version >/dev/null 2>&1; then
            echo "::notice::npm: $pkg@$ver already published — skipping"
          else
            npm publish --access public
          fi
          # Skip JSR if the version already exists (mirror of the npm guard);
          # keeps a re-run after a partial/cancelled release from wedging on
          # a duplicate `jsr publish`.
          if curl -fsSL "https://jsr.io/${pkg}/meta.json" \
               | jq -e --arg v "$ver" '.versions[$v]' >/dev/null 2>&1; then
            echo "::notice::jsr: $pkg@$ver already published — skipping"
          else
            # deno's `jsr publish` uses BYONM, so runtime deps (e.g.
            # @cplieger/actions -> @cplieger/reactive) must already be in
            # node_modules; the npm publish above does not install them.
            # Install (without touching the lockfile) before publishing to JSR.
            npm install --no-save
            npx jsr publish --allow-dirty
          fi
