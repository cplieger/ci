# OpenSSF Scorecard for cplieger/ci itself. (classify-repos.sh skips this repo
# when generating sync.yml, so the consumer-side scorecard.yml is not synced
# here — this is ci's own copy. Keep in step with
# .github/workflow-templates/scorecard.yml.)
name: Scorecard

on:
  push:
    branches: [main]
  branch_protection_rule:
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    if: github.event.repository.private == false
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
