name: Weekly central CI

# Single weekly coordinator — no per-repo schedules.
# * Security: dispatched for ALL repos. Public -> Trivy + SARIF code-scanning
#   alerts; private -> Trivy gate only (SARIF auto-skipped, see security-scan.yaml).
# * Full validate + fuzz: dispatched for PRIVATE repos (public already runs the
#   full CI on push/PR). CodeQL is public-only (runs on PR) so it is not dispatched.
#
# Requires the CI_SCHEDULE secret on this repo: the fine-grained "CI-schedule"
# PAT with Actions: read & write on all repos (the job's GITHUB_TOKEN cannot
# dispatch workflows in other repositories).

on:
  schedule:
    - cron: "0 3 * * 1" # Mondays 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coordinate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.CI_SCHEDULE }}
    steps:
      - name: Guard token
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::CI_SCHEDULE secret not set — cannot dispatch cross-repo workflows."
            exit 1
          fi

      - name: Weekly security scan — every repo
        run: |
          gh repo list cplieger --limit 300 --json name,isArchived \
            --jq '.[] | select(.isArchived == false) | .name' \
          | while read -r repo; do
              if gh workflow view security.yml -R "cplieger/${repo}" >/dev/null 2>&1; then
                echo "→ security: ${repo}"
                gh workflow run security.yml -R "cplieger/${repo}" \
                  || echo "::warning::security dispatch failed for ${repo}"
              fi
            done

      - name: Weekly full CI (validate + fuzz) — private repos
        run: |
          gh repo list cplieger --visibility private --limit 300 --json name,isArchived \
            --jq '.[] | select(.isArchived == false) | .name' \
          | while read -r repo; do
              if gh workflow view ci.yaml -R "cplieger/${repo}" >/dev/null 2>&1; then
                echo "→ full ci: ${repo}"
                gh workflow run ci.yaml -R "cplieger/${repo}" \
                  || echo "::warning::ci dispatch failed for ${repo}"
              fi
            done
