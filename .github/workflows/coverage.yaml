name: Coverage

# Reusable coverage workflow. A consumer's synced `coverage.yml` calls this on
# push to main (+ manual dispatch). It measures real statement coverage and
# publishes a shields `endpoint` badge JSON to an orphan `badges` branch using
# the built-in GITHUB_TOKEN — no external service and no per-repo secret. The
# README badge reads it via:
#   https://img.shields.io/endpoint?url=https://raw.githubusercontent.com/cplieger/REPO/badges/coverage.json
#
# Go:  go test -coverpkg=./...  (cross-package attribution; includes classic,
#      rapid property, and fuzz-seed tests — everything `go test` runs).
# TS:  vitest v8 coverage (statements).
# Only synced to Go/TS repos (the sync group excludes shell/Dockerfile-only
# repos), so there is always a measurable surface.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write # push the badge JSON to the orphan `badges` branch
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - name: Detect surface
        id: d
        run: |
          if [ -f go.mod ]; then
            echo 'kind=go' >> "$GITHUB_OUTPUT"
          elif [ -f jsr.json ] || [ -f package.json ]; then
            echo 'kind=ts' >> "$GITHUB_OUTPUT"
          else
            echo 'kind=none' >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        if: ${{ steps.d.outputs.kind == 'go' }}
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Measure Go coverage
        if: ${{ steps.d.outputs.kind == 'go' }}
        run: |
          # -coverpkg=./... attributes coverage across packages (so integration
          # tests that exercise internal packages count). atomic mode is needed
          # with -coverpkg under -race-style instrumentation.
          go test -covermode=atomic -coverpkg=./... -coverprofile=cover.out -timeout 600s ./...
          pct=$(go tool cover -func=cover.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          echo "PCT=${pct}" >> "$GITHUB_ENV"

      - name: Measure TS coverage
        if: ${{ steps.d.outputs.kind == 'ts' }}
        run: |
          # Strict npm ci (no npm-install fallback): a drifted lockfile should
          # fail loudly here exactly as it does in ts-ci.yaml.
          npm ci
          npx vitest run --coverage --coverage.provider=v8 --coverage.reporter=json-summary
          pct=$(node -e "process.stdout.write(String(require('./coverage/coverage-summary.json').total.statements.pct))")
          echo "PCT=${pct}" >> "$GITHUB_ENV"

      - name: Render badge JSON
        id: badge
        if: ${{ steps.d.outputs.kind != 'none' }}
        env:
          PCT: ${{ env.PCT }}
        run: |
          # Color thresholds (integer part only).
          pct_int=${PCT%.*}
          : "${pct_int:=0}"
          if [ "$pct_int" -ge 90 ]; then color=brightgreen
          elif [ "$pct_int" -ge 80 ]; then color=green
          elif [ "$pct_int" -ge 60 ]; then color=yellow
          elif [ "$pct_int" -ge 40 ]; then color=orange
          else color=red
          fi

          # Single-line printf (NOT a heredoc): heredocs in GHA run blocks break
          # when YAML dedent shifts the terminator. JSON on one line is safe.
          # Label is lowercase "test coverage" to match the other shields
          # badges (e.g. the "mutation" endpoint), which render lowercase labels.
          printf 'json={"schemaVersion":1,"label":"test coverage","message":"%s%%","color":"%s"}\n' \
            "$PCT" "$color" >> "$GITHUB_OUTPUT"
          echo "coverage badge: ${PCT}% (${color})"

      # Publish via the shared sibling-preserving composite action so
      # coverage.json and mutation.json coexist on the orphan `badges` branch
      # instead of clobbering each other. GITHUB_TOKEN (contents: write) can
      # push to the same repo. Renovate bumps the SHA pin after each tag
      # move.
      - name: Publish coverage badge
        if: ${{ steps.d.outputs.kind != 'none' }}
        uses: cplieger/ci/actions/publish-badge@7e58beddca56dba0377c28bb6f76cb3d9a983960 # v2
        with:
          repo: ${{ github.repository }}
          token: ${{ github.token }}
          filename: coverage.json
          json: ${{ steps.badge.outputs.json }}
