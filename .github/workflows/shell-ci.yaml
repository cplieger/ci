name: Shell CI

# Reusable shell/Docker CI. Called by the meta ci.yaml's `shell` job for every
# repo with a Dockerfile (the single home of hadolint — go-ci deliberately does
# not duplicate it); consumers pin the meta workflow via `@<sha> # v2`.

on:
  workflow_call:
    inputs:
      shellcheck-paths:
        description: >-
          Shell files to lint. "auto" (default) discovers every *.sh in the repo
          (nested included) via find, matching the ci.yaml `scripts` job. Pass an
          explicit glob to override, or "/dev/null" to skip shellcheck.
        type: string
        default: "auto"
      hadolint-ignores:
        description: Comma-separated hadolint rules to ignore (each passed as --ignore).
        type: string
        default: "DL3018"
      dockerfile:
        description: Path to the Dockerfile to lint.
        type: string
        default: "./Dockerfile"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false
          fetch-depth: 0

      - name: Install actionlint
        run: |
          # renovate: datasource=github-releases depName=rhysd/actionlint
          VERSION=v1.7.12
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/${VERSION}/actionlint_${VERSION#v}_linux_amd64.tar.gz" \
            | tar -xzf - -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/actionlint

      - name: Install shfmt
        run: |
          # renovate: datasource=github-releases depName=mvdan/sh
          VERSION=v3.13.1
          sudo curl -fsSL -o /usr/local/bin/shfmt \
            "https://github.com/mvdan/sh/releases/download/${VERSION}/shfmt_${VERSION}_linux_amd64"
          sudo chmod +x /usr/local/bin/shfmt

      - name: Install shellcheck
        run: |
          # The runner's preinstalled shellcheck false-positives SC2317 on
          # trap-invoked functions (fixed in 0.11.0: SC2317 is "less spammy for
          # nested ones"). Pin it like the linters above so the gate matches
          # local tooling and stays reproducible.
          # renovate: datasource=github-releases depName=koalaman/shellcheck
          VERSION=v0.11.0
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/${VERSION}/shellcheck-${VERSION}.linux.x86_64.tar.gz" \
            | tar -xzf - -C /tmp "shellcheck-${VERSION}/shellcheck"
          sudo mv "/tmp/shellcheck-${VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      # Soft-gate block: each step below runs to completion (continue-on-error)
      # and records its own name to /tmp/_ci_failures on failure; the final
      # "Check results" step fails the job if that file exists. CONTRACT: any
      # step added to this block MUST end with
      #   || { echo "<step name>" >> /tmp/_ci_failures; exit 1; }
      # or its failure is silently tolerated by continue-on-error.
      - name: Lint workflows (actionlint)
        continue-on-error: true
        run: |
          (
            actionlint -color
          ) || { echo "Lint workflows (actionlint)" >> /tmp/_ci_failures; exit 1; }

      - name: Lint shell scripts
        continue-on-error: true
        env:
          # Via env, never inline ${{ }} in the script body, so the input can't
          # expand into shell code (template injection).
          SHELLCHECK_PATHS: ${{ inputs.shellcheck-paths }}
        run: |
          (
            if [ "$SHELLCHECK_PATHS" = "/dev/null" ]; then
              echo "shellcheck: skipped (no shell scripts)"
            elif [ "$SHELLCHECK_PATHS" = "auto" ]; then
              # Discover every *.sh in the repo (nested included), matching the
              # ci.yaml `scripts` job. -x follows `source`d files.
              files=$(find . -name '*.sh' -not -path './.git/*')
              if [ -z "$files" ]; then
                echo "shellcheck: no *.sh found — skipping"
              else
                # shellcheck disable=SC2086
                shellcheck -x -S info $files
              fi
            else
              # Explicit override glob. Expand safely (deliberate word-split +
              # glob); if it matches no real files, skip (avoids
              # 'openBinaryFile: does not exist').
              shopt -s nullglob
              # shellcheck disable=SC2206
              files=( $SHELLCHECK_PATHS )
              shopt -u nullglob
              if [ ${#files[@]} -eq 0 ]; then
                echo "shellcheck: no files matched ${SHELLCHECK_PATHS} — skipping"
              else
                shellcheck -x -S info "${files[@]}"
              fi
            fi
          ) || { echo "Lint shell scripts" >> /tmp/_ci_failures; exit 1; }

      - name: Format check shell scripts (shfmt)
        continue-on-error: true
        run: |
          (
            # Every *.sh (nested included), matching the ci.yaml `scripts` job.
            # Flags per shell.md: 2-space indent, indent switch cases, binary
            # ops may start a line. NOT -sr (the gate does not enforce it).
            files=$(find . -name '*.sh' -not -path './.git/*')
            if [ -z "$files" ]; then
              echo "shfmt: no *.sh found — skipping"
            else
              # shellcheck disable=SC2086
              shfmt -d -i 2 -ci -bn $files
            fi
          ) || { echo "Format check shell scripts (shfmt)" >> /tmp/_ci_failures; exit 1; }

      - name: Validate Dockerfile
        continue-on-error: true
        env:
          # Via env, never inline ${{ }} in the script body (template injection).
          HADOLINT_IGNORES: ${{ inputs.hadolint-ignores }}
          DOCKERFILE: ${{ inputs.dockerfile }}
        run: |
          (
            # renovate: datasource=docker depName=hadolint/hadolint
            HADOLINT_VERSION=v2.14.0
            IGNORE_FLAGS=""
            IFS=',' read -ra RULES <<< "$HADOLINT_IGNORES"
            for rule in "${RULES[@]}"; do
              IGNORE_FLAGS="${IGNORE_FLAGS} --ignore ${rule}"
            done
            # Pre-pull with retry: anonymous Docker Hub pulls on shared runner
            # IPs intermittently time out ("context deadline exceeded").
            for attempt in 1 2 3; do
              docker pull -q "hadolint/hadolint:${HADOLINT_VERSION}" && break
              echo "hadolint pull ${attempt}/3 failed; retrying" >&2; sleep $((attempt * 5))
            done
            # shellcheck disable=SC2086
            docker run --rm -i "hadolint/hadolint:${HADOLINT_VERSION}" \
              hadolint ${IGNORE_FLAGS} - < "$DOCKERFILE"
          ) || { echo "Validate Dockerfile" >> /tmp/_ci_failures; exit 1; }

      - name: Scan for secrets
        continue-on-error: true
        run: |
          (
            # renovate: datasource=github-releases depName=gitleaks/gitleaks
            VERSION=v8.30.1
            curl -fsSL --retry 3 "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" | tar -xzf - -C /tmp gitleaks
            /tmp/gitleaks dir . --no-banner --redact --exit-code 1
          ) || { echo "Scan for secrets" >> /tmp/_ci_failures; exit 1; }

      - name: Check results
        if: always()
        run: |
          if [ -f /tmp/_ci_failures ]; then
            echo "::error::Failed validation steps:"
            sort -u /tmp/_ci_failures >&2
            exit 1
          fi
          echo "All validation steps passed"
