name: TS CI

# Reusable TypeScript-library CI for build-less ESM packages. Called by the
# meta ci.yaml (`ts` job at the root, `web` job at a nested frontend dir with
# web-lint: true); consumers pin the meta workflow via `@<sha> # v2`.
# Node is pinned below to the same major release.yaml publishes with, so the
# tested and published environments match (and the version doesn't drift
# silently with runner-image updates). `tsc` comes from each repo's own
# `@typescript/native` devDependency (matches the apps' build-less pipeline).

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory holding package.json / tsconfig.
        type: string
        default: "."
      web-lint:
        description: Run stylelint + html-validate (libraries shipping CSS/HTML).
        type: boolean
        default: false

permissions:
  contents: read


jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # Keep in step with release.yaml's Setup Node.js (same major), so CI
          # tests on the Node that publishes.
          node-version: '24'
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      # Strict `npm ci` — no `npm install` fallback. The fallback silently
      # papered over a package.json/package-lock.json drift, so lockfile
      # integrity was never actually asserted; a drifted lockfile should fail
      # here and be regenerated in the PR.
      - name: Install deps
        run: npm ci

      # Soft-gate block: each step below runs to completion (continue-on-error)
      # and records its own name to /tmp/_ci_failures on failure; the final
      # "Check results" step fails the job if that file exists. CONTRACT: any
      # step added to this block MUST end with
      #   || { echo "<step name>" >> /tmp/_ci_failures; exit 1; }
      # or its failure is silently tolerated by continue-on-error.
      - name: Lint (eslint)
        continue-on-error: true
        run: ( npx eslint . ) || { echo "eslint" >> /tmp/_ci_failures; exit 1; }

      - name: Typecheck (tsc)
        continue-on-error: true
        run: ( npm run typecheck && npm run typecheck:tests ) || { echo "typecheck" >> /tmp/_ci_failures; exit 1; }

      # Unused dependencies / exports / files (knip). Config-gated: runs only
      # where a knip config is committed (the repo opts in), via the repo's own
      # pinned knip devDependency — no network install, no floating version.
      - name: Unused deps/exports (knip)
        continue-on-error: true
        run: |
          (
            if [ -f knip.json ] || [ -f knip.jsonc ] || [ -f knip.config.ts ] || [ -f knip.config.js ]; then
              npx --no-install knip
            else
              echo "no knip config; skipping"
            fi
          ) || { echo "knip" >> /tmp/_ci_failures; exit 1; }

      - name: Test (vitest)
        continue-on-error: true
        run: ( npm test ) || { echo "test" >> /tmp/_ci_failures; exit 1; }

      - name: Fuzz (fast-check)
        # Fuzzing is intentionally non-deterministic: a push/PR failing because
        # the fuzzer found a new input is a real bug caught early. Public repos
        # fuzz on push/PR (shift-left) at the budget configured in each test;
        # private repos only on manual dispatch. (The central weekly-fuzz.yaml
        # is Go-only — there is no deep weekly TS fuzz run.)
        if: ${{ github.event.repository.private == false || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        continue-on-error: true
        run: |
          (
            mapfile -t files < <(git ls-files '*.fuzz.test.ts' '*.fuzz.test.js')
            if [ "${#files[@]}" -gt 0 ]; then
              npx vitest run "${files[@]}"
            else
              echo "No *.fuzz.test.ts targets; fast-check property tests already ran in the test step."
            fi
          ) || { echo "fuzz" >> /tmp/_ci_failures; exit 1; }

      - name: Format (prettier)
        continue-on-error: true
        run: ( npx prettier --check . ) || { echo "prettier" >> /tmp/_ci_failures; exit 1; }

      # Version parity: the committed `version` in package.json and its sibling
      # jsr.json are placeholders that the release pipeline overwrites from the
      # git tag at publish time (see release.yaml), so the value never reaches
      # consumers; the two must still agree in-repo. A drift (e.g. package.json
      # 1.0.0 vs jsr.json 0.1.0) is a committed-state defect: it misleads a
      # reader about the package version and signals a manifest edit that
      # touched one file but not the other. Scans from the git root (independent
      # of working-directory) so it covers a root-level library and a subpackage
      # layout alike (e.g. web-terminal-engine's web/). No jsr.json => no-op.
      - name: Version parity (package.json == jsr.json)
        continue-on-error: true
        run: |
          (
            cd "$(git rev-parse --show-toplevel)"
            rc=0
            while IFS= read -r jsr; do
              pkg="${jsr%jsr.json}package.json"
              [ -f "$pkg" ] || continue
              jv=$(jq -r '.version // ""' "$jsr")
              pv=$(jq -r '.version // ""' "$pkg")
              if [ "$jv" != "$pv" ]; then
                echo "::error file=${jsr}::version mismatch: ${pkg}=${pv:-<none>} vs ${jsr}=${jv:-<none>}. The two manifests must carry the same version (it is overwritten from the git tag at publish, but must agree in-repo)."
                rc=1
              fi
            done < <(git ls-files | grep -E '(^|/)jsr\.json$')
            exit $rc
          ) || { echo "version parity" >> /tmp/_ci_failures; exit 1; }

      # Workflow lint + secret scan for pure-TS repos. Root-gated: hybrid repos
      # (Go + web frontend) already run both via their go job at the repo root,
      # so the nested `web` invocation skips them instead of duplicating.
      - name: Install actionlint
        if: ${{ inputs.working-directory == '.' }}
        run: |
          # renovate: datasource=github-releases depName=rhysd/actionlint
          VERSION=v1.7.12
          curl -fsSL --retry 3 "https://github.com/rhysd/actionlint/releases/download/${VERSION}/actionlint_${VERSION#v}_linux_amd64.tar.gz" \
            | tar -xzf - -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/actionlint

      - name: Workflows (actionlint)
        if: ${{ inputs.working-directory == '.' }}
        continue-on-error: true
        run: ( actionlint -color ) || { echo "actionlint" >> /tmp/_ci_failures; exit 1; }

      - name: Scan for secrets
        if: ${{ inputs.working-directory == '.' }}
        continue-on-error: true
        run: |
          (
            # renovate: datasource=github-releases depName=gitleaks/gitleaks
            VERSION=v8.30.1
            curl -fsSL --retry 3 "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" | tar -xzf - -C /tmp gitleaks
            /tmp/gitleaks dir . --no-banner --redact --exit-code 1
          ) || { echo "Scan for secrets" >> /tmp/_ci_failures; exit 1; }

      # Verify every bare-specifier value-import in the shippable front-end
      # source has a key in the page's <script type="importmap">. The browser
      # resolves bare specifiers only via that map, so an unmapped one aborts
      # module loading at runtime (blank / stuck-loading UI) while tsc + eslint
      # stay green — they resolve against node_modules, not the map. Scans from
      # the git root (independent of this job's working-directory); a detected
      # frontend with no importmap just no-ops. Gated on web-lint so it runs for
      # the meta CI `web` job (app frontends) only — root-level TS libraries are
      # excluded, since their only importmap is a dev scaffold, not a shipped
      # page contract.
      - name: Import map coverage
        if: ${{ inputs.web-lint }}
        continue-on-error: true
        env:
          IMPORTMAP_CHECK: |
            const { readFileSync, readdirSync } = require("node:fs");
            const { join, relative } = require("node:path");
            const { execSync } = require("node:child_process");
            let root;
            try {
              root = execSync("git rev-parse --show-toplevel", { encoding: "utf8" }).trim();
            } catch {
              root = process.cwd();
            }
            const SKIP = new Set([
              "node_modules", ".git", "dist", "coverage", ".vitest-cache",
              "vendor", "__test-helpers__", "__snapshots__", "testdata", "test-stubs",
            ]);
            const walk = (dir, test, out = []) => {
              let entries;
              try { entries = readdirSync(dir, { withFileTypes: true }); } catch { return out; }
              for (const e of entries) {
                const p = join(dir, e.name);
                if (e.isDirectory()) { if (!SKIP.has(e.name)) walk(p, test, out); }
                else if (test(e.name)) out.push(p);
              }
              return out;
            };
            const keys = new Set();
            let mapCount = 0;
            for (const f of walk(root, (n) => n.endsWith(".html"))) {
              const m = readFileSync(f, "utf8").match(/<script type="importmap">(.*?)<\/script>/s);
              if (!m) continue;
              let parsed;
              try { parsed = JSON.parse(m[1]); }
              catch (err) {
                console.error(`::error file=${relative(root, f)}::invalid importmap JSON: ${err.message}`);
                process.exit(1);
              }
              for (const k of Object.keys(parsed.imports || {})) keys.add(k);
              mapCount++;
            }
            if (mapCount === 0) {
              console.log('No <script type="importmap"> found; skipping import-map coverage check.');
              process.exit(0);
            }
            const RELATIVE = /^[./]/;
            const bareSpecs = (src) => {
              const specs = new Set();
              const patterns = [
                /\b(?:import|export)\b(?!\s+type\b)[^'";]*?\bfrom\s*["']([^"']+)["']/g,
                /\bimport\s+["']([^"']+)["']/g,
                /\bimport\s*\(\s*["']([^"']+)["']/g,
              ];
              for (const re of patterns) {
                for (const m of src.matchAll(re)) {
                  const s = m[1];
                  if (s && !RELATIVE.test(s) && !s.endsWith(".css")) specs.add(s);
                }
              }
              return specs;
            };
            const shippable = (n) =>
              n.endsWith(".ts") && !n.endsWith(".d.ts") && !n.endsWith(".test.ts") &&
              !n.endsWith(".spec.ts") && n !== "vitest.config.ts" && n !== "fc-strict-setup.ts";
            const tsFiles = walk(root, shippable);
            const violations = [];
            for (const f of tsFiles) {
              const src = readFileSync(f, "utf8");
              for (const spec of bareSpecs(src)) {
                if (!keys.has(spec)) {
                  const idx = src.indexOf(spec);
                  const line = idx >= 0 ? src.slice(0, idx).split("\n").length : 0;
                  violations.push(`${relative(root, f)}:${line}: "${spec}" not in any import map`);
                }
              }
            }
            if (violations.length) {
              console.error("::error::Bare import(s) missing from the page import map(s):");
              for (const v of violations) console.error("  " + v);
              console.error('Add the key to the served HTML <script type="importmap"> (and vendor the target at build).');
              process.exit(1);
            }
            console.log(`import-map coverage OK (${keys.size} keys / ${mapCount} map(s), ${tsFiles.length} source files).`);
        run: |
          (
            printf '%s' "$IMPORTMAP_CHECK" > "${RUNNER_TEMP:-/tmp}/importmap-check.cjs"
            node "${RUNNER_TEMP:-/tmp}/importmap-check.cjs"
          ) || { echo "Import map coverage" >> /tmp/_ci_failures; exit 1; }

      - name: Lint web (CSS/HTML)
        if: ${{ inputs.web-lint }}
        continue-on-error: true
        run: |
          (
            # The stylelint config is synced to the repo root (.stylelintrc.json),
            # but this job runs in the web dir (inputs.working-directory), so
            # resolve it by absolute path and set --config-basedir to the cwd so
            # `extends: stylelint-config-standard` resolves from the web dir's
            # node_modules. --allow-empty-input lets a web dir with no source CSS
            # (a thin consumer whose styles come from a shared package, e.g.
            # web-terminal-kiro) pass instead of erroring on no match. Cross-file rules
            # (custom properties, animations) resolve via the config's
            # `referenceFiles` glob.
            npx stylelint "**/*.css" \
              --config "${GITHUB_WORKSPACE}/.stylelintrc.json" \
              --config-basedir . \
              --allow-empty-input
            find . -name "*.html" -not -path "./node_modules/*" -print0 \
              | xargs -0 --no-run-if-empty npx html-validate
          ) || { echo "web-lint" >> /tmp/_ci_failures; exit 1; }

      # PR-time dependency vulnerability review (npm manifests). Hard step (no
      # continue-on-error): a `uses:` step can't append to /tmp/_ci_failures,
      # so soft-gating it would silently tolerate its failure. Public repos
      # only — the dependency-review API needs the dependency graph, which
      # private repos on the free plan don't expose.
      - name: Dependency review
        if: ${{ inputs.working-directory == '.' && github.event_name == 'pull_request' && github.event.repository.private == false }}
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

      - name: Check results
        if: always()
        run: |
          if [ -f /tmp/_ci_failures ]; then
            echo "::error::Failed validation steps:"
            sort -u /tmp/_ci_failures >&2
            exit 1
          fi
          echo "All validation steps passed"
