name: TS CI

# Reusable TypeScript-library CI for build-less ESM packages. Call with:
#   jobs: { ci: { uses: cplieger/ci/.github/workflows/ts-ci.yaml@v1, with: { working-directory: "." } } }
# Uses the runner's Node + tsgo (matches the apps' build-less pipeline).

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory holding package.json / tsconfig.
        type: string
        default: "."
      web-lint:
        description: Run stylelint + html-validate (libraries shipping CSS/HTML).
        type: boolean
        default: false

permissions:
  contents: read


jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install deps
        run: npm ci || npm install --no-save --loglevel=warn

      - name: Install tsgo
        run: |
          # renovate: datasource=npm depName=@typescript/native-preview
          TSGO_VERSION=7.0.0-dev.20260527.2
          curl -fsSL \
            "https://registry.npmjs.org/@typescript/native-preview-linux-x64/-/native-preview-linux-x64-${TSGO_VERSION}.tgz" \
            | tar -xz -C /tmp
          echo "/tmp/package/lib" >> "$GITHUB_PATH"

      - name: Lint (eslint)
        continue-on-error: true
        run: ( npx eslint . ) || { echo "eslint" >> /tmp/_ci_failures; exit 1; }

      - name: Typecheck (tsgo)
        continue-on-error: true
        run: ( npm run typecheck && npm run typecheck:tests ) || { echo "typecheck" >> /tmp/_ci_failures; exit 1; }

      - name: Test (vitest)
        continue-on-error: true
        run: ( npm test ) || { echo "test" >> /tmp/_ci_failures; exit 1; }

      - name: Fuzz (fast-check)
        # fast-check property tests run in the test step above; *.fuzz.test.ts are
        # the deep targets. Light CI fuzzes public repos only; the weekly
        # scheduled run fuzzes every repo, including private. FUZZ_RUNS is honored
        # by repos whose fast-check setup reads it (deeper exploration weekly).
        if: ${{ github.event_name == 'schedule' || github.event.repository.private == false }}
        continue-on-error: true
        env:
          FUZZ_RUNS: ${{ github.event_name == 'schedule' && '10000' || '1000' }}
        run: |
          (
            files=$(git ls-files '*.fuzz.test.ts' '*.fuzz.test.js')
            if [ -n "$files" ]; then
              npx vitest run $files
            else
              echo "No *.fuzz.test.ts targets; fast-check property tests already ran in the test step."
            fi
          ) || { echo "fuzz" >> /tmp/_ci_failures; exit 1; }

      - name: Format (prettier)
        continue-on-error: true
        run: ( npx prettier --check . ) || { echo "prettier" >> /tmp/_ci_failures; exit 1; }

      - name: Lint web (CSS/HTML)
        if: ${{ inputs.web-lint }}
        continue-on-error: true
        run: |
          (
            npx stylelint "**/*.css" --config .stylelintrc.json
            find . -name "*.html" -not -path "./node_modules/*" -print0 \
              | xargs -0 --no-run-if-empty npx html-validate
          ) || { echo "web-lint" >> /tmp/_ci_failures; exit 1; }

      - name: Check results
        if: always()
        run: |
          if [ -f /tmp/_ci_failures ]; then
            echo "::error::Failed validation steps:"
            sort -u /tmp/_ci_failures >&2
            exit 1
          fi
          echo "All validation steps passed"
