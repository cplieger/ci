name: TS CI

# Reusable TypeScript-library CI for build-less ESM packages. Call with:
#   jobs: { ci: { uses: cplieger/ci/.github/workflows/ts-ci.yaml@v1, with: { working-directory: "." } } }
# Uses the runner's Node + tsgo (matches the apps' build-less pipeline).

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory holding package.json / tsconfig.
        type: string
        default: "."
      web-lint:
        description: Run stylelint + html-validate (libraries shipping CSS/HTML).
        type: boolean
        default: false

permissions:
  contents: read


jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install deps
        run: npm ci || npm install --no-save --loglevel=warn

      - name: Install tsgo
        run: |
          # renovate: datasource=npm depName=@typescript/native-preview
          TSGO_VERSION=7.0.0-dev.20260527.2
          curl -fsSL \
            "https://registry.npmjs.org/@typescript/native-preview-linux-x64/-/native-preview-linux-x64-${TSGO_VERSION}.tgz" \
            | tar -xz -C /tmp
          echo "/tmp/package/lib" >> "$GITHUB_PATH"

      - name: Lint (eslint)
        continue-on-error: true
        run: ( npx eslint . ) || { echo "eslint" >> /tmp/_ci_failures; exit 1; }

      - name: Typecheck (tsgo)
        continue-on-error: true
        run: ( npm run typecheck && npm run typecheck:tests ) || { echo "typecheck" >> /tmp/_ci_failures; exit 1; }

      - name: Test (vitest)
        continue-on-error: true
        run: ( npm test ) || { echo "test" >> /tmp/_ci_failures; exit 1; }

      - name: Fuzz (fast-check)
        # Fuzzing is intentionally non-deterministic: a push/PR failing because
        # the fuzzer found a new input is a real bug caught early. Public repos
        # fuzz on push/PR (shift-left); the central weekly dispatch fuzzes every
        # repo for deeper exploration. *.fuzz.test.ts are the deep targets.
        if: ${{ github.event.repository.private == false || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        continue-on-error: true
        run: |
          (
            mapfile -t files < <(git ls-files '*.fuzz.test.ts' '*.fuzz.test.js')
            if [ "${#files[@]}" -gt 0 ]; then
              npx vitest run "${files[@]}"
            else
              echo "No *.fuzz.test.ts targets; fast-check property tests already ran in the test step."
            fi
          ) || { echo "fuzz" >> /tmp/_ci_failures; exit 1; }

      - name: Format (prettier)
        continue-on-error: true
        run: ( npx prettier --check . ) || { echo "prettier" >> /tmp/_ci_failures; exit 1; }

      - name: Lint web (CSS/HTML)
        if: ${{ inputs.web-lint }}
        continue-on-error: true
        run: |
          (
            # Make stylelint cross-file aware: add importFrom for every CSS file
            # so rules like no-unknown-custom-properties and no-unknown-animations
            # can see :root vars and @keyframes defined in sibling files (the
            # browser merges them at runtime; stylelint otherwise treats each
            # file in isolation).
            mapfile -t css_files < <(find . -name "*.css" -not -path "./node_modules/*" -not -path "./.git/*" -not -path "./dist/*" | sort)
            if [ ${#css_files[@]} -gt 0 ]; then
              import_json=$(printf '%s\0' "${css_files[@]}" | jq -Rs 'split("\u0000") | map(select(length > 0))')
              jq --argjson imp "$import_json" '. + {
                rules: ((.rules // {}) + {
                  "no-unknown-custom-properties": [true, {"importFrom": $imp}],
                  "no-unknown-animations": [true, {"importFrom": $imp}]
                })
              }' .stylelintrc.json > /tmp/stylelintrc.combined.json
              npx stylelint "**/*.css" --config /tmp/stylelintrc.combined.json
            fi
            find . -name "*.html" -not -path "./node_modules/*" -print0 \
              | xargs -0 --no-run-if-empty npx html-validate
          ) || { echo "web-lint" >> /tmp/_ci_failures; exit 1; }

      - name: Check results
        if: always()
        run: |
          if [ -f /tmp/_ci_failures ]; then
            echo "::error::Failed validation steps:"
            sort -u /tmp/_ci_failures >&2
            exit 1
          fi
          echo "All validation steps passed"
