name: Trigger Renovate

# Fires the Komodo "Trigger Renovate" procedure by asking GitHub to REDELIVER
# this repo's GitHub->Komodo push webhook through GitHub's own delivery
# infrastructure (Hookshot).
#
# Why not curl the Komodo endpoint from the runner? Cloudflare blocks
# Actions-runner egress to komodo.cplieger.com (observed: HTTP 403 on every
# attempt) while allowing GitHub Hookshot source ranges. The previous curl
# implementation therefore never reached Komodo. This mirrors how build
# releases reach Komodo: `gh release create` fires the native `release`
# webhook, delivered by Hookshot, authenticated by the secret configured on
# the GitHub webhook itself. We reuse the same model — the webhook secret
# stays on the GitHub webhook config (GitHub signs + delivers); this workflow
# only asks GitHub to resend the most recent main-branch push delivery.
#
# Two ways to fire:
#   * workflow_dispatch  — manual launch button in this repo's Actions tab.
#   * cross-repo dispatch — every cplieger/* docker build pipeline runs
#     `gh workflow run trigger-renovate.yaml -R cplieger/ci -f reason=...`
#     after a successful main-branch image push (see docker-release.yaml).
#
# Komodo procedure on the receiving end runs StartStack borgcube-renovate
# (the one-shot Renovate container) which scans cplieger/* and opens
# digest-bump PRs against the consumer repos.
#
# Token: GH_TOKEN below is RENOVATE_HOOK_PAT, a fine-grained PAT scoped to
# ONLY cplieger/ci with Metadata: Read + Webhooks: Read and write — the hooks,
# deliveries, and redeliver endpoints all require Webhooks access. The default
# GITHUB_TOKEN cannot be granted this scope, so a dedicated PAT secret is
# mandatory. Kept separate from CI_SCHEDULE so webhook-admin is confined to one
# repo rather than the whole fleet that CI_SCHEDULE can reach.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason / source repo (logged for traceability)"
        type: string
        default: "manual"

permissions:
  contents: read

concurrency:
  # Coalesce concurrent triggers — a single Renovate run picks up everything
  # already pushed by the time it scans, so back-to-back image pushes don't
  # need to fan out to back-to-back Renovate runs.
  group: trigger-renovate
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Redeliver Komodo push webhook (GitHub-native, via Hookshot)
        env:
          GH_TOKEN: ${{ secrets.RENOVATE_HOOK_PAT }}
          REPO: ${{ github.repository }}
          REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail
          echo "Reason: ${REASON}"

          # Locate the active push webhook that targets the Komodo procedure
          # listener. There is exactly one today, but match by URL so a future
          # extra webhook can't be picked by accident.
          hook_id=$(gh api "repos/${REPO}/hooks" --jq \
            '[.[] | select(.active and (.events | index("push")) and (.config.url | test("/listener/github/procedure/")))][0].id // empty')
          if [ -z "${hook_id}" ]; then
            echo "::error::No active Komodo push webhook found on ${REPO}."
            exit 1
          fi
          echo "hook_id=${hook_id}"

          # Redeliver the most recent main-branch push delivery. Skip tag-push
          # deliveries (move-major-tag emits refs/tags/*), which the listener's
          # /main branch guard would reject.
          delivery_id=""
          for id in $(gh api "repos/${REPO}/hooks/${hook_id}/deliveries?per_page=30" \
              --jq '.[] | select(.event=="push") | .id'); do
            ref=$(gh api "repos/${REPO}/hooks/${hook_id}/deliveries/${id}" \
              --jq '.request.payload.ref // empty')
            if [ "${ref}" = "refs/heads/main" ]; then
              delivery_id="${id}"
              break
            fi
          done
          if [ -z "${delivery_id}" ]; then
            echo "::error::No recent main-branch push delivery available to redeliver."
            exit 1
          fi
          echo "Redelivering delivery_id=${delivery_id}"

          gh api --method POST \
            "repos/${REPO}/hooks/${hook_id}/deliveries/${delivery_id}/attempts"
          echo "::notice::Requested GitHub redelivery of delivery ${delivery_id} (reason=${REASON})"
