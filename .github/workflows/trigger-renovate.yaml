name: Trigger Renovate

# Single, central place that knows the Komodo "Trigger Renovate" webhook.
# Two ways to fire:
#   * workflow_dispatch  — manual launch button in this repo's Actions tab.
#   * cross-repo dispatch — every cplieger/* docker build pipeline runs
#     `gh workflow run trigger-renovate.yaml -R cplieger/ci -f reason=...`
#     after a successful main-branch image push (see docker-release.yaml).
#
# The webhook secret lives ONLY in this repo, so consumer repos do not need
# (and never see) the Komodo credentials. The cross-repo dispatch token is
# separate (CI_SCHEDULE PAT, scoped to Actions:write) — much smaller blast
# radius than the Komodo secret.
#
# Komodo procedure on the receiving end runs StartStack borgcube-renovate
# (the one-shot Renovate container) which scans cplieger/* and opens
# digest-bump PRs against homelab. Replaces the previous direct-push flow
# (homelab/update-image.yaml) that hit branch-protection on main.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason / source repo (logged for traceability)"
        type: string
        default: "manual"

permissions:
  contents: read

concurrency:
  # Coalesce concurrent triggers — a single Renovate run picks up everything
  # already pushed by the time it scans, so back-to-back image pushes don't
  # need to fan out to back-to-back Renovate runs.
  group: trigger-renovate
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: POST to Komodo
        # Komodo's /listener/github/... endpoint authenticates like a GitHub
        # webhook: HMAC-SHA256 of the raw body with the Komodo Core webhook
        # secret, sent as `X-Hub-Signature-256: sha256=<hex>`. The body must be
        # a GitHub push payload whose `ref` matches the branch in the URL
        # (.../procedure/<id>/main), so the procedure's branch guard passes.
        env:
          URL: ${{ secrets.KOMODO_RENOVATE_WEBHOOK_URL }}
          SECRET: ${{ secrets.KOMODO_RENOVATE_WEBHOOK_SECRET }}
          REASON: ${{ inputs.reason }}
        run: |
          set -euo pipefail
          if [ -z "${URL:-}" ]; then
            echo "::error::KOMODO_RENOVATE_WEBHOOK_URL must be set as repo secrets on cplieger/ci."
            exit 1
          fi
          body=$(jq -nc --arg r "${REASON}" '{ref:"refs/heads/main",reason:$r}')
          sig="sha256=$(printf '%s' "${body}" | openssl dgst -sha256 -hmac "${SECRET}" | sed 's/^.*= *//')"
          echo "debug-sig: ${sig}"
          for n in 1 2 3; do
            code=$(curl -sS -o /tmp/body -w '%{http_code}' \
              -X POST \
              -H "X-Hub-Signature-256: ${sig}" \
              -H 'X-GitHub-Event: push' \
              -H 'Content-Type: application/json' \
              -d "${body}" \
              --max-time 20 "${URL}" || true)
            echo "attempt=${n} http=${code}"
            case "${code}" in
              2*) echo "::notice::Komodo webhook accepted (reason=${REASON})"; exit 0 ;;
            esac
            sleep $((n * 5))
          done
          echo "::error::Komodo webhook failed after 3 attempts (last http=${code:-unknown})"
          cat /tmp/body 2>/dev/null; echo
          cat /tmp/body 2>/dev/null || true
          exit 1
