name: CodeQL

# Reusable CodeQL analysis. Uses build-mode: none (source extraction) so it
# works regardless of where go.mod lives (root or a subdir like web/) and
# without needing the project to build (avoids go:embed/build prerequisites).

on:
  workflow_call:
    inputs:
      languages:
        type: string
        default: 'go'
        description: 'Languages to analyze'
      queries:
        type: string
        default: 'security-extended,security-and-quality'
        description: 'CodeQL query suites'

jobs:
  analyze:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          languages: ${{ inputs.languages }}
          build-mode: none
          queries: ${{ inputs.queries }}

      - name: Analyze
        uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        with:
          category: "/language:${{ inputs.languages }}"
