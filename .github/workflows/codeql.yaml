name: CodeQL

on:
  workflow_call:
    inputs:
      queries:
        type: string
        default: 'security-extended,security-and-quality'
        description: 'CodeQL query suites'
      languages:
        type: string
        default: ''
        description: 'Optional comma-separated override; empty = auto-detect'

permissions:
  contents: read

jobs:
  detect:
    if: github.event.repository.private == false
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      languages: ${{ steps.langs.outputs.languages }}
    steps:
      - name: Detect languages
        id: langs
        env:
          GH_TOKEN: ${{ github.token }}
          EXPLICIT: ${{ inputs.languages }}
        run: |
          set -euo pipefail
          if [ -n "${EXPLICIT}" ]; then langs=$(printf '%s' "${EXPLICIT}" | jq -R 'split(",")|map(gsub("^ +| +$";""))|unique'); else langs=$(gh api "repos/${GITHUB_REPOSITORY}/languages" --jq '[ keys[] | {Go:"go",JavaScript:"javascript-typescript",TypeScript:"javascript-typescript",Python:"python",Ruby:"ruby"}[.] // empty ] + ["actions"] | unique'); fi
          echo "languages=${langs}" >> "$GITHUB_OUTPUT"; echo "detected: ${langs}"

  analyze:
    needs: detect
    if: needs.detect.outputs.languages != '' && needs.detect.outputs.languages != '[]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect.outputs.languages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.language == 'go' && 'autobuild' || 'none' }}
          queries: ${{ inputs.queries }}

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
