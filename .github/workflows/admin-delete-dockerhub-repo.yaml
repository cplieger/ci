# One-time admin workflow: delete a Docker Hub repository.
# Used when resetting a package's version history (rare; e.g., after a
# botched bootstrapping cycle). Will be removed once the cleanup is done —
# this is NOT meant to live long-term.
name: Admin Delete Docker Hub Repo

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Docker Hub repo name (without owner) to delete"
        required: true
        type: string

permissions:
  contents: read

jobs:
  delete:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Delete Docker Hub repo
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_PAT: ${{ secrets.DOCKERHUB_TOKEN }}
          REPO: ${{ inputs.repo }}
        run: |
          JWT=$(curl -fsSL -X POST "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg u "$DH_USER" --arg p "$DH_PAT" '{username: $u, password: $p}')" \
            | jq -r .token)
          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
            echo "::error::Failed to authenticate to Docker Hub"; exit 1
          fi
          status=$(curl -sL -X DELETE "https://hub.docker.com/v2/repositories/${DH_USER}/${REPO}/" \
            -H "Authorization: JWT ${JWT}" -o /tmp/resp -w "%{http_code}")
          echo "HTTP ${status}"
          [ -s /tmp/resp ] && cat /tmp/resp || true
          if [ "$status" != "202" ] && [ "$status" != "204" ]; then
            echo "::error::Delete failed (HTTP $status)"; exit 1
          fi
          echo "::notice::Deleted ${DH_USER}/${REPO}"
