# Auto-recover the Weekly fuzz run from transient GitHub-hosted runner
# reclamation ("The runner has received a shutdown signal"), which cancels a
# long fuzz shard mid-flight through no fault of the code. A reclaimed shard
# dies before its upload-artifact step, so re-running ONLY the failed jobs
# produces fresh findings artifacts with no name collision, and the per-repo
# `report` job (which `needs: fuzz`) re-runs afterward and re-consolidates the
# complete set of shard findings.
#
# Capped at 3 total run attempts via run_attempt so a genuinely-broken run
# (compile error, bad target) retries twice then stays red instead of looping.
# User-cancelled runs report conclusion 'cancelled', not 'failure', so this
# never fights a manual cancel.
name: Weekly fuzz auto-rerun

on:
  workflow_run:
    workflows: ["Weekly fuzz"]
    types: [completed]

permissions:
  actions: write   # GITHUB_TOKEN can re-run workflows in this repo

jobs:
  rerun:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-24.04
    steps:
      - name: Re-run failed jobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Run ${{ github.event.workflow_run.id }} failed on attempt \
            ${{ github.event.workflow_run.run_attempt }} — re-running failed jobs."
          gh run rerun "${{ github.event.workflow_run.id }}" --failed \
            -R "${{ github.repository }}"
