name: Go CI

# Reusable Go CI. Called by the meta ci.yaml's `go` job; consumers pin the
# meta workflow via `@<sha> # v2`.
# Profile is auto-detected: app-mode (deadcode, punused) activates when a
# `main` package exists. Dockerfile lint (hadolint) is NOT here: the meta
# ci.yaml dispatches shell-ci.yaml for every repo with a Dockerfile, and that
# is where hadolint runs. (fieldalignment is enforced by golangci-lint via
# `govet: enable-all` on non-test code — the synced .golangci.yaml excludes
# _test.go — not a standalone step.)

on:
  workflow_call:
    inputs:
      go-version-file:
        description: Path to the go.mod that pins the Go version.
        type: string
        default: go.mod
      working-directory:
        description: Working directory for Go commands (e.g. 'web' for monorepos).
        type: string
        default: '.'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Resolve profile
        id: profile
        run: |
          set -euo pipefail
          if go list -f '{{.Name}}' ./... 2>/dev/null | grep -qx main; then echo 'app=true' >> "$GITHUB_OUTPUT"; else echo 'app=false' >> "$GITHUB_OUTPUT"; fi

      - name: Install golangci-lint
        run: |
          set -euo pipefail
          # renovate: datasource=github-releases depName=golangci/golangci-lint
          VERSION=v2.12.2
          # install.sh downloads the release tarball from GitHub internally,
          # and that fetch intermittently returns HTTP 504. `curl --retry` only
          # covers downloading install.sh itself, not install.sh's own internal
          # download — so retry the whole install with exponential backoff.
          attempt=1
          max=5
          delay=5
          until curl -fsSL --retry 3 \
                  "https://raw.githubusercontent.com/golangci/golangci-lint/${VERSION}/install.sh" \
                | sh -s -- -b /usr/local/bin "${VERSION}"; do
            if [ "${attempt}" -ge "${max}" ]; then
              echo "::error::golangci-lint install failed after ${max} attempts"
              exit 1
            fi
            echo "::warning::golangci-lint install attempt ${attempt}/${max} failed; retrying in ${delay}s"
            sleep "${delay}"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
          done

      - name: Install tools
        run: |
          set -euo pipefail
          # renovate: datasource=go depName=golang.org/x/vuln
          GOVULNCHECK_VERSION=v1.6.0
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          # renovate: datasource=go depName=github.com/rhysd/actionlint
          ACTIONLINT_VERSION=v1.7.12
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"

      - name: Install app tools
        if: ${{ steps.profile.outputs.app == 'true' }}
        run: |
          set -euo pipefail
          # renovate: datasource=go depName=golang.org/x/tools
          XTOOLS_VERSION=v0.48.0
          go install "golang.org/x/tools/cmd/deadcode@${XTOOLS_VERSION}"
          # renovate: datasource=go depName=github.com/bep/punused
          PUNUSED_VERSION=v0.5.0
          go install "github.com/bep/punused@${PUNUSED_VERSION}"

      # Soft-gate block: each step below runs to completion (continue-on-error)
      # and records its own name to /tmp/_ci_failures on failure; the final
      # "Check results" step fails the job if that file exists. CONTRACT: any
      # step added to this block MUST end with
      #   || { echo "<step name>" >> /tmp/_ci_failures; exit 1; }
      # or its failure is silently tolerated by continue-on-error.
      - name: Workflows (actionlint)
        continue-on-error: true
        working-directory: .
        run: ( actionlint -color ) || { echo "actionlint" >> /tmp/_ci_failures; exit 1; }

      - name: Vet
        continue-on-error: true
        run: ( go vet ./... ) || { echo "vet" >> /tmp/_ci_failures; exit 1; }

      - name: Lint (golangci-lint)
        continue-on-error: true
        run: ( golangci-lint run --allow-parallel-runners --timeout=5m ./... ) || { echo "golangci-lint" >> /tmp/_ci_failures; exit 1; }

      - name: Test (race)
        continue-on-error: true
        run: ( go test -count=1 -race ./... ) || { echo "test" >> /tmp/_ci_failures; exit 1; }

      - name: Govulncheck
        continue-on-error: true
        run: ( govulncheck ./... ) || { echo "govulncheck" >> /tmp/_ci_failures; exit 1; }

      - name: Verify modules
        continue-on-error: true
        run: ( go mod verify ) || { echo "go mod verify" >> /tmp/_ci_failures; exit 1; }

      # Drift guard for wiregen-generated files (committed TS/Go emitted by a
      # `go run ./<gen>` command). Self-configuring: no-op unless the repo
      # actually has a generator that imports github.com/cplieger/wiregen.
      # Report-only: it regenerates into the runner's ephemeral tree and
      # fails if the committed output differs; it never writes back.
      - name: Wiregen drift
        continue-on-error: true
        run: |
          (
            # 1+3. Detect + dynamically discover generator entrypoints: any
            # `package main` directory that imports cplieger/wiregen.
            gens=$(grep -rlZ --include='*.go' 'cplieger/wiregen' . 2>/dev/null \
              | xargs -0 -r -n1 dirname | sort -u \
              | while IFS= read -r d; do
                  grep -qE '^package main$' "$d"/*.go 2>/dev/null && echo "$d" || true
                done) || true
            if [ -z "$gens" ]; then
              echo "wiregen: no generator command imports the library; skipping"
              exit 0
            fi
            # 2. Regenerate from the Go source of truth.
            for d in $gens; do
              echo "wiregen: go run ./$d"
              go run "./$d"
            done
            # Compare regenerated output against the committed tree
            # (catches modified + added files via the staged index).
            git add -A
            if ! git diff --cached --quiet; then
              echo "::error::wiregen output is stale; re-run the generator(s) above and commit the result"
              git --no-pager diff --cached --stat
              exit 1
            fi
            echo "wiregen: generated files up to date"
          ) || { echo "wiregen drift" >> /tmp/_ci_failures; exit 1; }

      - name: Dead code (deadcode)
        if: ${{ steps.profile.outputs.app == 'true' }}
        continue-on-error: true
        run: |
          (
            deadcode -test ./...
          ) || { echo "deadcode" >> /tmp/_ci_failures; exit 1; }

      - name: Unused exported symbols (punused)
        if: ${{ steps.profile.outputs.app == 'true' }}
        continue-on-error: true
        run: |
          (
            output=$(punused ./... 2>&1 | grep -v "file already closed" || true)
            if [ -n "$output" ]; then echo "$output"; exit 1; fi
          ) || { echo "punused" >> /tmp/_ci_failures; exit 1; }

      - name: Scan for secrets
        continue-on-error: true
        run: |
          (
            # renovate: datasource=github-releases depName=gitleaks/gitleaks
            VERSION=v8.30.1
            curl -fsSL --retry 3 "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" | tar -xzf - -C /tmp gitleaks
            /tmp/gitleaks dir . --no-banner --redact --exit-code 1
          ) || { echo "Scan for secrets" >> /tmp/_ci_failures; exit 1; }

      # PR-time dependency vulnerability review. Runs for libraries and apps
      # alike (a vulnerable dep in a library propagates to every consumer).
      # Hard step (no continue-on-error): a `uses:` step can't append to
      # /tmp/_ci_failures, so soft-gating it would silently tolerate its
      # failure. Public repos only — the dependency-review API needs the
      # dependency graph, which private repos on the free plan don't expose.
      - name: Dependency review
        if: ${{ github.event_name == 'pull_request' && github.event.repository.private == false }}
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

      - name: Check results
        if: always()
        run: |
          if [ -f /tmp/_ci_failures ]; then
            echo "::error::Failed validation steps:"
            sort -u /tmp/_ci_failures >&2
            exit 1
          fi
          echo "All validation steps passed"
