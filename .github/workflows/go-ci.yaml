name: Go CI

# Reusable Go CI. Call from a repo with:
#   jobs: { ci: { uses: cplieger/ci/.github/workflows/go-ci.yaml@v1 } }
# Profile is auto-detected: app-mode (deadcode, punused, fieldalignment,
# dependency-review) activates when a `main` package exists; hadolint runs
# when a Dockerfile is present.

on:
  workflow_call:
    inputs:
      go-version-file:
        description: Path to the go.mod that pins the Go version.
        type: string
        default: go.mod
      working-directory:
        description: Working directory for Go commands (e.g. 'web' for monorepos).
        type: string
        default: '.'

permissions:
  contents: read
  issues: write  # needed by the weekly fuzz run to open/comment/close GitHub issues
                 # for fuzz findings — see "Report fuzz findings as GitHub issues" step.

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Resolve profile
        id: profile
        run: |
          set -euo pipefail
          if go list -f '{{.Name}}' ./... 2>/dev/null | grep -qx main; then echo 'app=true' >> "$GITHUB_OUTPUT"; else echo 'app=false' >> "$GITHUB_OUTPUT"; fi
          if [ -f Dockerfile ]; then echo 'dockerfile=true' >> "$GITHUB_OUTPUT"; else echo 'dockerfile=false' >> "$GITHUB_OUTPUT"; fi

      - name: Install golangci-lint
        run: |
          # renovate: datasource=github-releases depName=golangci/golangci-lint
          VERSION=v2.12.2
          curl -fsSL --retry 3 \
            "https://raw.githubusercontent.com/golangci/golangci-lint/${VERSION}/install.sh" \
            | sh -s -- -b /usr/local/bin "${VERSION}"

      - name: Install tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Install app tools
        if: ${{ steps.profile.outputs.app == 'true' }}
        run: |
          go install golang.org/x/tools/cmd/deadcode@latest
          go install golang.org/x/tools/go/analysis/passes/fieldalignment/cmd/fieldalignment@latest
          go install github.com/bep/punused@latest

      - name: Workflows (actionlint)
        continue-on-error: true
        working-directory: .
        run: ( actionlint -color ) || { echo "actionlint" >> /tmp/_ci_failures; exit 1; }

      - name: Vet
        continue-on-error: true
        run: ( go vet ./... ) || { echo "vet" >> /tmp/_ci_failures; exit 1; }

      - name: Lint (golangci-lint)
        continue-on-error: true
        run: ( golangci-lint run --timeout=5m ./... ) || { echo "golangci-lint" >> /tmp/_ci_failures; exit 1; }

      - name: Test (race)
        continue-on-error: true
        run: ( go test -count=1 -race ./... ) || { echo "test" >> /tmp/_ci_failures; exit 1; }

      - name: Fuzz (go test -fuzz)
        # Fuzzing is intentionally non-deterministic. To keep PR/push CI fast
        # and deterministic, fuzz runs ONLY on the weekly central scheduler
        # (cplieger/ci/.github/workflows/weekly-full-ci.yaml dispatches ci.yaml
        # on every repo Mondays 03:30 UTC) and on manual workflow_dispatch.
        # Find a counterexample? `go test -fuzz` writes the minimized input
        # to testdata/fuzz/ — commit it as a deterministic seed; the regular
        # `Test (race)` step exercises the seed corpus on every PR.
        # Targets auto-detected — a no-op when nothing to fuzz.
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        continue-on-error: true
        env:
          FUZZ_TIME: 2m
        run: |
          (
            rc=0
            echo "fuzz budget per target: ${FUZZ_TIME}"
            : > /tmp/fuzz-output.log
            for pkg in $(go list ./...); do
              for fn in $(go test -list '^Fuzz' "$pkg" 2>/dev/null | grep -E '^Fuzz' || true); do
                echo "::group::fuzz ${fn} (${pkg})"
                go test -run='^$' -fuzz="^${fn}$" -fuzztime="${FUZZ_TIME}" "$pkg" 2>&1 | tee -a /tmp/fuzz-output.log || rc=1
                echo "::endgroup::"
              done
            done
            exit $rc
          ) || { echo "fuzz" >> /tmp/_ci_failures; exit 1; }

      - name: Report fuzz findings as GitHub issues
        # Idempotent: open a GitHub issue per (target, hash) finding, comment on
        # recurrence, no-op if no findings or if a matching issue is already open.
        # Only "Failing input written to testdata/fuzz/..." entries are reported
        # (those are reproducible bugs); transient "context deadline exceeded"
        # timeouts are skipped (they're flaky inputs that don't get a seed file).
        if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -s /tmp/fuzz-output.log ] || { echo "no fuzz output captured"; exit 0; }

          # Extract (target, hash, path) tuples for findings that wrote a seed file.
          findings=$(awk '
            /Failing input written to testdata\/fuzz\// {
              match($0, /testdata\/fuzz\/[^[:space:]]+/);
              path = substr($0, RSTART, RLENGTH);
              n = split(path, parts, "/");
              hash = parts[n];
              target = parts[n-1];
              printf "%s|%s|%s\n", target, hash, path;
            }
          ' /tmp/fuzz-output.log | sort -u)

          if [ -z "$findings" ]; then
            echo "no committable fuzz findings (any FAILs were transient deadline-exceeded timeouts)"
            exit 0
          fi

          echo "$findings" | while IFS='|' read -r target hash path; do
            title="[fuzz] ${target} regression — ${hash}"
            existing=$(gh issue list --repo "$REPO" --state open --search "${title} in:title" --json number,title \
              --jq '.[] | select(.title == "'"$title"'") | .number' | head -1)

            seed_size=$(wc -c < "$path" 2>/dev/null || echo 0)
            seed_preview=$(head -c 500 "$path" 2>/dev/null | base64 | head -c 800)

            body=$(cat <<BODY
          **Target**: \`${target}\`
          **Reproducer hash**: \`${hash}\`
          **Found in**: ${RUN_URL}

          **Reproduce locally:**

          \`\`\`bash
          go test -run='^${target}\$/${hash}' ./...
          \`\`\`

          **Seed file**: \`${path}\` (${seed_size} bytes, base64 preview):

          \`\`\`
          ${seed_preview}
          \`\`\`

          ---

          This issue is auto-created by the weekly fuzz run. It will be auto-closed by a
          subsequent weekly run when:

          - the seed file at \`${path}\` is committed to the repo (the input becomes a
            deterministic regression test in the seed corpus → PR's \`Test (race)\` step
            will catch it on every push), OR
          - the failure no longer reproduces.
          BODY
          )

            if [ -n "$existing" ]; then
              gh issue comment "$existing" --repo "$REPO" --body "Recurred in ${RUN_URL}" >/dev/null
              echo "  updated existing issue #${existing}: ${title}"
            else
              gh issue create --repo "$REPO" --title "$title" --body "$body" \
                --label fuzz-finding,auto-generated >/dev/null
              echo "  created new issue: ${title}"
            fi
          done

      - name: Auto-close fuzz issues whose seed has been committed
        # Each weekly run, list open fuzz-finding issues; for each, parse the
        # seed path from the title (hash portion) and check the repo for that
        # file at HEAD. If present, the seed is now in the deterministic corpus
        # and the issue can be closed.
        if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh issue list --repo "$REPO" --state open --label fuzz-finding --limit 100 \
            --json number,title --jq '.[] | "\(.number)|\(.title)"' | while IFS='|' read -r n title; do
            # title format: "[fuzz] <target> regression — <hash>"
            target=$(echo "$title" | sed -nE 's|^\[fuzz\] ([A-Za-z][A-Za-z0-9_]*) regression .+$|\1|p')
            hash=$(echo "$title" | sed -nE 's|^.+ — ([a-f0-9]+)$|\1|p')
            [ -z "$target" ] || [ -z "$hash" ] && continue

            # Find any testdata/fuzz/<target>/<hash> file (target may live under any package).
            if find testdata/fuzz -path "*/${target}/${hash}" -print -quit 2>/dev/null | grep -q .; then
              gh issue close "$n" --repo "$REPO" \
                --comment "Closed automatically: seed at \`testdata/fuzz/${target}/${hash}\` was committed and is now part of the deterministic regression corpus." >/dev/null
              echo "  closed #${n}: seed committed for ${target}/${hash}"
            fi
          done

      - name: Govulncheck
        continue-on-error: true
        run: ( govulncheck ./... ) || { echo "govulncheck" >> /tmp/_ci_failures; exit 1; }

      - name: Verify modules
        continue-on-error: true
        run: ( go mod verify ) || { echo "go mod verify" >> /tmp/_ci_failures; exit 1; }

      - name: Dead code (deadcode)
        if: ${{ steps.profile.outputs.app == 'true' }}
        continue-on-error: true
        run: |
          (
            deadcode -test ./...
          ) || { echo "deadcode" >> /tmp/_ci_failures; exit 1; }

      - name: Field alignment
        if: ${{ steps.profile.outputs.app == 'true' }}
        continue-on-error: true
        run: |
          (
            fieldalignment ./...
          ) || { echo "fieldalignment" >> /tmp/_ci_failures; exit 1; }

      - name: Unused exported symbols (punused)
        if: ${{ steps.profile.outputs.app == 'true' }}
        continue-on-error: true
        run: |
          (
            output=$(punused ./... 2>&1 | grep -v "file already closed" || true)
            if [ -n "$output" ]; then echo "$output"; exit 1; fi
          ) || { echo "punused" >> /tmp/_ci_failures; exit 1; }

      - name: Validate Dockerfile
        if: ${{ steps.profile.outputs.dockerfile == 'true' }}
        continue-on-error: true
        run: |
          (
            df="Dockerfile"
            [ -f "$df" ] || df="${GITHUB_WORKSPACE}/Dockerfile"
            docker run --rm -i hadolint/hadolint:2.12.0 \
              hadolint --ignore DL3018 - < "$df"
          ) || { echo "hadolint" >> /tmp/_ci_failures; exit 1; }

      - name: Scan for secrets
        continue-on-error: true
        run: |
          (
            # renovate: datasource=github-releases depName=gitleaks/gitleaks
            VERSION=v8.30.1
            curl -fsSL --retry 3 "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" | tar -xzf - -C /tmp gitleaks
            /tmp/gitleaks dir . --no-banner --redact --exit-code 1
          ) || { echo "Scan for secrets" >> /tmp/_ci_failures; exit 1; }

      - name: Dependency review
        if: ${{ steps.profile.outputs.app == 'true' && github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

      - name: Check results
        if: always()
        run: |
          if [ -f /tmp/_ci_failures ]; then
            echo "::error::Failed validation steps:"
            sort -u /tmp/_ci_failures >&2
            exit 1
          fi
          echo "All validation steps passed"
