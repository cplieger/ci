name: Go CI

# Reusable Go-library CI. Call from a repo with:
#   jobs: { ci: { uses: cplieger/ci/.github/workflows/go-ci.yaml@v1 } }
# Library-tuned: omits deadcode/punused (they flag a library's exported API
# as "unused") and Dockerfile/hadolint (libraries ship no image).

on:
  workflow_call:
    inputs:
      go-version-file:
        description: Path to the go.mod that pins the Go version.
        type: string
        default: go.mod

permissions:
  contents: read


jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Install golangci-lint
        run: |
          # renovate: datasource=github-releases depName=golangci/golangci-lint
          VERSION=v2.12.2
          curl -fsSL --retry 3 \
            "https://raw.githubusercontent.com/golangci/golangci-lint/${VERSION}/install.sh" \
            | sh -s -- -b /usr/local/bin "${VERSION}"

      - name: Install tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Workflows (actionlint)
        continue-on-error: true
        run: ( actionlint -color ) || { echo "actionlint" >> /tmp/_ci_failures; exit 1; }

      - name: Vet
        continue-on-error: true
        run: ( go vet ./... ) || { echo "vet" >> /tmp/_ci_failures; exit 1; }

      - name: Lint (golangci-lint)
        continue-on-error: true
        run: ( golangci-lint run --timeout=5m ./... ) || { echo "golangci-lint" >> /tmp/_ci_failures; exit 1; }

      - name: Test (race)
        continue-on-error: true
        run: ( go test -count=1 -race ./... ) || { echo "test" >> /tmp/_ci_failures; exit 1; }

      - name: Govulncheck
        continue-on-error: true
        run: ( govulncheck ./... ) || { echo "govulncheck" >> /tmp/_ci_failures; exit 1; }

      - name: Verify modules
        continue-on-error: true
        run: ( go mod verify ) || { echo "go mod verify" >> /tmp/_ci_failures; exit 1; }

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "false"

      - name: Check results
        if: always()
        run: |
          if [ -f /tmp/_ci_failures ]; then
            echo "::error::Failed validation steps:"
            sort -u /tmp/_ci_failures >&2
            exit 1
          fi
          echo "All validation steps passed"
