name: Go CI

# Reusable Go CI. Call from a repo with:
#   jobs: { ci: { uses: cplieger/ci/.github/workflows/go-ci.yaml@v1 } }
# Profile is auto-detected: app-mode (deadcode, punused, fieldalignment,
# dependency-review) activates when a `main` package exists; hadolint runs
# when a Dockerfile is present.

on:
  workflow_call:
    inputs:
      go-version-file:
        description: Path to the go.mod that pins the Go version.
        type: string
        default: go.mod
      working-directory:
        description: Working directory for Go commands (e.g. 'web' for monorepos).
        type: string
        default: '.'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Resolve profile
        id: profile
        run: |
          set -euo pipefail
          if go list -f '{{.Name}}' ./... 2>/dev/null | grep -qx main; then echo 'app=true' >> "$GITHUB_OUTPUT"; else echo 'app=false' >> "$GITHUB_OUTPUT"; fi
          if [ -f Dockerfile ]; then echo 'dockerfile=true' >> "$GITHUB_OUTPUT"; else echo 'dockerfile=false' >> "$GITHUB_OUTPUT"; fi

      - name: Install golangci-lint
        run: |
          # renovate: datasource=github-releases depName=golangci/golangci-lint
          VERSION=v2.12.2
          curl -fsSL --retry 3 \
            "https://raw.githubusercontent.com/golangci/golangci-lint/${VERSION}/install.sh" \
            | sh -s -- -b /usr/local/bin "${VERSION}"

      - name: Install tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Install app tools
        if: ${{ steps.profile.outputs.app == 'true' }}
        run: |
          go install golang.org/x/tools/cmd/deadcode@latest
          go install golang.org/x/tools/go/analysis/passes/fieldalignment/cmd/fieldalignment@latest
          go install github.com/bep/punused@latest

      - name: Workflows (actionlint)
        continue-on-error: true
        working-directory: .
        run: ( actionlint -color ) || { echo "actionlint" >> /tmp/_ci_failures; exit 1; }

      - name: Vet
        continue-on-error: true
        run: ( go vet ./... ) || { echo "vet" >> /tmp/_ci_failures; exit 1; }

      - name: Lint (golangci-lint)
        continue-on-error: true
        run: ( golangci-lint run --timeout=5m ./... ) || { echo "golangci-lint" >> /tmp/_ci_failures; exit 1; }

      - name: Test (race)
        continue-on-error: true
        run: ( go test -count=1 -race ./... ) || { echo "test" >> /tmp/_ci_failures; exit 1; }

      - name: Fuzz (go test -fuzz)
        # Fuzzing is intentionally non-deterministic: a push/PR failing because
        # the fuzzer found a new input is a real bug caught early. go test -fuzz
        # writes the minimized input to testdata/fuzz/, so the find isn't lost —
        # commit it as a seed and it becomes a deterministic regression. Public
        # repos fuzz on push/PR (shift-left); the central weekly dispatch fuzzes
        # every repo for deeper exploration. Targets auto-detected — a no-op when
        # nothing to fuzz.
        if: ${{ github.event.repository.private == false || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        continue-on-error: true
        run: |
          (
            rc=0
            for pkg in $(go list ./...); do
              for fn in $(go test -list '^Fuzz' "$pkg" 2>/dev/null | grep -E '^Fuzz' || true); do
                echo "::group::fuzz ${fn} (${pkg})"
                go test -run='^$' -fuzz="^${fn}$" -fuzztime=20s "$pkg" || rc=1
                echo "::endgroup::"
              done
            done
            exit $rc
          ) || { echo "fuzz" >> /tmp/_ci_failures; exit 1; }

      - name: Govulncheck
        continue-on-error: true
        run: ( govulncheck ./... ) || { echo "govulncheck" >> /tmp/_ci_failures; exit 1; }

      - name: Verify modules
        continue-on-error: true
        run: ( go mod verify ) || { echo "go mod verify" >> /tmp/_ci_failures; exit 1; }

      - name: Dead code (deadcode)
        if: ${{ steps.profile.outputs.app == 'true' }}
        continue-on-error: true
        run: |
          (
            deadcode -test ./...
          ) || { echo "deadcode" >> /tmp/_ci_failures; exit 1; }

      - name: Field alignment
        if: ${{ steps.profile.outputs.app == 'true' }}
        continue-on-error: true
        run: |
          (
            fieldalignment ./...
          ) || { echo "fieldalignment" >> /tmp/_ci_failures; exit 1; }

      - name: Unused exported symbols (punused)
        if: ${{ steps.profile.outputs.app == 'true' }}
        continue-on-error: true
        run: |
          (
            output=$(punused ./... 2>&1 | grep -v "file already closed" || true)
            if [ -n "$output" ]; then echo "$output"; exit 1; fi
          ) || { echo "punused" >> /tmp/_ci_failures; exit 1; }

      - name: Validate Dockerfile
        if: ${{ steps.profile.outputs.dockerfile == 'true' }}
        continue-on-error: true
        run: |
          (
            df="Dockerfile"
            [ -f "$df" ] || df="${GITHUB_WORKSPACE}/Dockerfile"
            docker run --rm -i hadolint/hadolint:2.12.0 \
              hadolint --ignore DL3018 - < "$df"
          ) || { echo "hadolint" >> /tmp/_ci_failures; exit 1; }

      - name: Scan for secrets
        continue-on-error: true
        run: |
          (
            # renovate: datasource=github-releases depName=gitleaks/gitleaks
            VERSION=v8.30.1
            curl -fsSL --retry 3 "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" | tar -xzf - -C /tmp gitleaks
            /tmp/gitleaks dir . --no-banner --redact --exit-code 1
          ) || { echo "Scan for secrets" >> /tmp/_ci_failures; exit 1; }

      - name: Dependency review
        if: ${{ steps.profile.outputs.app == 'true' && github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

      - name: Check results
        if: always()
        run: |
          if [ -f /tmp/_ci_failures ]; then
            echo "::error::Failed validation steps:"
            sort -u /tmp/_ci_failures >&2
            exit 1
          fi
          echo "All validation steps passed"
