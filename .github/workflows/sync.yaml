name: Sync shared files

# Propagates the canonical config files in this repo to consumer repos as PRs,
# for tools that have no native remote-config support (golangci-lint, git-cliff,
# editorconfig, eslint/prettier/stylelint bases). Renovate-extends handles
# renovate.json natively, so it is not synced here.
#
# Requires a SYNC_PAT secret: a fine-grained PAT with Contents:write +
# Pull-requests:write on the target repos.

on:
  push:
    branches: [main]
    paths:
      - ".golangci.yaml"
      - "cliff.toml"
      - ".editorconfig"
      - "configs/**"
      - ".github/sync.yml"
      - "scripts/classify-repos.sh"
      - ".github/workflow-templates/**"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Auto-classify repos
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: bash scripts/classify-repos.sh > .github/sync.yml
        timeout-minutes: 5

      - name: Sync files to consumer repos
        id: sync
        uses: BetaHuhn/repo-file-sync-action@8b92be3375cf1d1b0cd579af488a9255572e4619 # v1
        with:
          GH_PAT: ${{ secrets.SYNC_PAT }}
          CONFIG_PATH: .github/sync.yml
          COMMIT_PREFIX: "chore(sync):"
          PR_LABELS: dependencies

      - name: Enable auto-merge on sync PRs
        # Each sync PR is a routine SHA / config bump; once the consumer
        # repo's CI passes there's no human review needed. Use GitHub's
        # native auto-merge so PRs land as soon as required checks go
        # green (squash-merge to keep main history flat). If a consumer
        # repo has no required checks, the PR merges immediately.
        if: steps.sync.outputs.pull_request_urls != ''
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          # pull_request_urls is a JSON array string like '["url1","url2",...]'.
          urls='${{ steps.sync.outputs.pull_request_urls }}'
          echo "$urls" | python3 -c '
          import json, subprocess, sys
          for url in json.loads(sys.stdin.read()):
              print(f"Enabling auto-merge on: {url}")
              # --auto requires the PR to be in a state where auto-merge is
              # accepted (typically: branch protection enabled). If it errors,
              # log and continue rather than failing the whole sync run.
              r = subprocess.run(
                  ["gh", "pr", "merge", "--auto", "--squash", "--delete-branch", url],
                  capture_output=True, text=True
              )
              if r.returncode != 0:
                  print(f"  WARN: {r.stderr.strip()}", flush=True)
              else:
                  print(f"  ok: {r.stdout.strip()}", flush=True)
          '
