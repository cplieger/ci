name: Sync shared files

# Propagates the canonical config files in this repo to consumer repos as PRs,
# for tools that have no native remote-config support (golangci-lint, git-cliff,
# editorconfig, eslint/prettier/stylelint bases), plus the workflow templates
# and the one-liner renovate.json preset shim (configs/renovate.json).
#
# The sync engine is the in-house scripts/sync-files.py (it replaced
# BetaHuhn/repo-file-sync-action, unmaintained since 2024 — no third-party
# code holds the fleet-wide write PAT anymore). Same contract as before:
# branch repo-sync/ci/default, chore(sync) commits, `dependencies` label.
#
# Requires a SYNC_PAT secret: a fine-grained PAT with Contents:write +
# Pull-requests:write on the target repos.

on:
  push:
    branches: [main]
    paths:
      - ".golangci.yaml"
      - ".editorconfig"
      - ".gitattributes"
      - "LICENSE"
      - "configs/**"
      - "scripts/classify-repos.sh"
      - ".github/workflow-templates/**"
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

# The sync engine force-pushes the same repo-sync/ci/default branch across
# every consumer repo. Two overlapping runs (e.g. two pushes to main within
# seconds of each other) would race on that branch and duplicate PRs partway
# through the repo list. Queue instead of running in parallel;
# cancel-in-progress is unsafe here since a cancelled mid-loop run leaves
# partial state, so let each run finish before the next starts.
concurrency:
  group: sync-shared-files
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      # Regenerate the repo↔file manifest fresh on every run, then hand it
      # straight to the sync action below via CONFIG_PATH. The file is
      # gitignored and never committed: it's a build artifact, and a committed
      # copy only drifts against the live repo set (auto-discovered here via
      # gh repo list). classify-repos.sh is the source of truth.
      - name: Auto-classify repos
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: bash scripts/classify-repos.sh > .github/sync.yml
        timeout-minutes: 5

      # In-house engine: shallow-clones each target, copies the mapped files,
      # commits `chore(sync): …` on repo-sync/ci/default, force-pushes, and
      # ensures an open labelled PR (closing stale empty ones). Failure
      # isolation per repo; exits non-zero at the end if any repo failed.
      - name: Sync files to consumer repos
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: python3 scripts/sync-files.py --manifest .github/sync.yml
        timeout-minutes: 15

      - name: Enable auto-merge on sync PRs
        # Each sync PR is a routine SHA / config bump; once the consumer
        # repo's CI passes there's no human review needed. Use GitHub's
        # native auto-merge so PRs land as soon as required checks go
        # green (squash-merge to keep main history flat). If a consumer
        # repo has no required checks, the PR merges immediately.
        #
        # always() + a fresh `gh pr list` sweep (rather than trusting
        # steps.sync.outputs.pull_request_urls) so a partial failure in the
        # sync step (e.g. two overlapping runs racing on the shared
        # repo-sync/ci/default branch) doesn't strand the PRs that DID get
        # created without auto-merge enabled.
        if: always()
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          # .github/sync.yml (regenerated by the Auto-classify step above)
          # is a list of groups, each with a `repos: |`  newline-separated
          # "owner/repo" block. Flatten to a deduped repo-name list.
          repos=$(python3 -c "
          import yaml
          cfg = yaml.safe_load(open('.github/sync.yml'))
          names = set()
          for group in cfg.get('group', []):
              for line in group.get('repos', '').splitlines():
                  line = line.strip()
                  if line:
                      names.add(line.split('/')[-1])
          print('\n'.join(sorted(names)))
          ")
          for repo in ${repos}; do
            for pr in $(gh pr list --repo "cplieger/${repo}" --head repo-sync/ci/default \
                --state open --json number -q '.[].number'); do
              echo "Enabling auto-merge on cplieger/${repo}#${pr}"
              # gh pr merge needs --repo plus a bare PR number: it does NOT
              # accept the OWNER/REPO#NUMBER shorthand (it reads that as a
              # branch name and fails "no pull requests found for branch"),
              # which silently left every sync PR without auto-merge. Fall
              # back to a direct squash-merge when auto-merge can't be enabled
              # because the PR is already mergeable (GitHub refuses --auto on a
              # PR that is already in a clean, merge-ready state).
              gh pr merge --auto --squash --delete-branch --repo "cplieger/${repo}" "${pr}" || \
                gh pr merge --squash --delete-branch --repo "cplieger/${repo}" "${pr}" || \
                echo "  WARN: failed to merge cplieger/${repo}#${pr}"
            done
          done
