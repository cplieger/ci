# Unified CI pipeline. Single entry point for all releaseable consumer repos.
#
# Mirrors the unified release.yaml architecture: a thin caller in each consumer
# repo invokes this meta workflow, which auto-detects the repo's surfaces and
# dispatches to the right reusable workflow. No per-repo config files; no
# per-type templates.
#
# Detection (all independent — a hybrid repo runs multiple jobs in parallel):
#   - has go.mod              → `go` job:    go-ci.yaml at root
#   - has nested */go.mod     → `go-nested`: go-ci.yaml per module dir (matrix;
#                                            tracked files only, vendored trees
#                                            pruned — nested modules are
#                                            independent release lanes and
#                                            root `./...` never crosses them)
#   - has jsr.json at root    → `ts` job:    ts-ci.yaml at root (no web-lint)
#   - has Dockerfile          → `shell` job: shell-ci.yaml (actionlint + hadolint
#                                            + shellcheck nullglob-safe + gitleaks)
#   - has nested web frontend → `web` job:   ts-ci.yaml at the detected dir,
#                                            web-lint=true (HTML+CSS lints)
#   - has *.py                → `python` job: ruff check (inline canonical config)
#   - tooling/docs repo       → `scripts` job: actionlint + shellcheck (inline).
#     (no go.mod/jsr.json/      Targets pure tooling/docs repos (cplieger/ci,
#      Dockerfile) + *.sh or    cplieger/.github); Docker repos lint shell +
#      workflow files          workflows via shell-ci.yaml instead.
#
# Web-frontend nested directory probe order:
#   static-src/  →  web/  →  internal/server/static-src/
# First match (with package.json or jsr.json inside) wins. New patterns can be
# added to the array below — adding a path is centralized, not per-repo.
name: CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      run_go: ${{ steps.detect.outputs.run_go }}
      run_go_nested: ${{ steps.detect.outputs.run_go_nested }}
      go_nested_dirs: ${{ steps.detect.outputs.go_nested_dirs }}
      run_ts: ${{ steps.detect.outputs.run_ts }}
      run_web: ${{ steps.detect.outputs.run_web }}
      run_shell: ${{ steps.detect.outputs.run_shell }}
      run_docker: ${{ steps.detect.outputs.run_docker }}
      run_python: ${{ steps.detect.outputs.run_python }}
      run_scripts: ${{ steps.detect.outputs.run_scripts }}
      web_dir: ${{ steps.detect.outputs.web_dir }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false
          # Full history so we can diff against the PR base / previous push
          # tip to decide whether any code (non-docs) files changed.
          fetch-depth: 0

      - name: Detect repo surfaces
        id: detect
        run: |
          run_go=false
          run_go_nested=false
          go_nested_dirs="[]"
          run_ts=false
          run_web=false
          run_shell=false
          run_docker=false
          run_python=false
          run_scripts=false
          web_dir=""

          # --- Did any non-docs (code) file change? ---
          # The consumer ci.yaml no longer uses paths-ignore: a required status
          # check (ci / validate) can never be satisfied when the workflow is
          # skipped by a path filter (GitHub leaves it pending forever). So the
          # workflow always runs, and the markdown lint always runs, but the
          # heavy language jobs are gated here on a real code change. A docs-only
          # change runs detect + markdown + validate only — cheap, and the
          # required check still reports. On anything we can't diff (manual
          # dispatch, first push to a branch, shallow base) we fail safe and
          # treat it as a code change so the full battery runs.
          code_changed=true
          changed=""
          diffed=false
          case "${{ github.event_name }}" in
            pull_request)
              base="${{ github.event.pull_request.base.sha }}"
              if git cat-file -e "${base}^{commit}" 2> /dev/null; then
                changed=$(git diff --name-only "$base" HEAD)
                diffed=true
              fi
              ;;
            push)
              before="${{ github.event.before }}"
              if [ -n "$before" ] \
                && [ "$before" != "0000000000000000000000000000000000000000" ] \
                && git cat-file -e "${before}^{commit}" 2> /dev/null; then
                changed=$(git diff --name-only "$before" "${{ github.sha }}")
                diffed=true
              fi
              ;;
          esac

          # With a diff in hand, code changed only when some path is NOT a doc
          # file (or blank line). grep -qvE exits 0 iff such a line exists — no
          # subshell-scope or heredoc pitfalls. Without a diff (manual dispatch,
          # first push, shallow base) we keep the fail-safe default of true.
          if [ "$diffed" = "true" ]; then
            if printf '%s\n' "$changed" \
              | grep -qvE '(\.md$|^LICENSE$|^\.gitignore$|^[[:space:]]*$)'; then
              code_changed=true
            else
              code_changed=false
            fi
          fi

          if [ "$code_changed" = "true" ]; then
            [ -f go.mod ] && run_go=true
            [ -f jsr.json ] && run_ts=true
            [ -f Dockerfile ] && run_shell=true
            [ -f Dockerfile ] && run_docker=true

            # Nested Go modules: each TRACKED <dir>/go.mod is an independent
            # module (its own release lane in release.yaml), so each gets the
            # full go-ci battery at its own directory — `go test ./...` at
            # the root does NOT cross module boundaries, so without this a
            # nested module's tests would silently never run. Discovery
            # prunes vendored/generated trees (a committed node_modules can
            # carry upstream go.mod files) and skips modules with no tracked
            # .go files (a sentinel go.mod — e.g. `module web-ignore` keeping
            # root tooling out of a TS subtree — has nothing to validate and
            # would fail the battery). Unlike release.yaml's lane discovery,
            # internal/ and dotless-path modules with real Go code ARE
            # validated here — they compile and test like any module; they
            # are only excluded from RELEASE lanes. Keep the filters in sync
            # with release.yaml's gomodules step and
            # scripts/test-lane-semantics.sh, which pins both. git pathspec
            # '*/go.mod' matches any depth, never the root go.mod.
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              d=$(dirname "$f")
              case "$d" in
                *[!A-Za-z0-9._/-]*)
                  echo "::error::nested go.mod dir '$d' contains characters outside [A-Za-z0-9._/-]"
                  exit 1 ;;
              esac
              if [ -z "$(git ls-files "$d/*.go" | head -1)" ]; then
                echo "nested module '$d': no tracked .go files - skipping validation"
                continue
              fi
              go_nested_dirs=$(echo "$go_nested_dirs" | jq -c --arg v "$d" '. + [$v]')
            done < <(git ls-files '*/go.mod' | grep -Ev '(^|/)(node_modules|vendor|testdata|static|dist)/' || true)
            if [ "$go_nested_dirs" != "[]" ]; then
              run_go_nested=true
            fi

            # Probe known nested web-frontend locations. First hit wins.
            # Add new paths centrally if a future repo introduces a different
            # layout — no per-repo override needed.
            for d in \
              "static-src" \
              "web" \
              "internal/server/static-src" \
            ; do
              if [ -d "$d" ] && { [ -f "$d/package.json" ] || [ -f "$d/jsr.json" ]; }; then
                web_dir="$d"
                run_web=true
                break
              fi
            done

            # Python: any *.py → ruff lint (inline canonical config, same
            # rationale as the markdown job).
            if [ -n "$(find . -name '*.py' -not -path './.git/*' -print -quit)" ]; then
              run_python=true
            fi

            # Scripts: pure tooling/docs repos only (no go.mod/jsr.json/
            # Dockerfile — Go/TS/Docker repos lint via their own jobs). Fires on
            # shell scripts or workflow files → actionlint + shellcheck.
            if [ ! -f Dockerfile ] && [ ! -f go.mod ] && [ ! -f jsr.json ]; then
              if [ -n "$(find . -name '*.sh' -not -path './.git/*' -print -quit)" ] \
                || [ -n "$(find .github/workflows -name '*.y*ml' -print -quit 2> /dev/null)" ]; then
                run_scripts=true
              fi
            fi
          fi

          {
            echo "run_go=$run_go"
            echo "run_go_nested=$run_go_nested"
            echo "go_nested_dirs=$go_nested_dirs"
            echo "run_ts=$run_ts"
            echo "run_web=$run_web"
            echo "run_shell=$run_shell"
            echo "run_docker=$run_docker"
            echo "run_python=$run_python"
            echo "run_scripts=$run_scripts"
            echo "web_dir=$web_dir"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## CI dispatch"
            echo ""
            echo "| Surface | Detected | Path |"
            echo "|---|---|---|"
            echo "| go       | $run_go | . |"
            echo "| go-nested | $run_go_nested | $go_nested_dirs |"
            echo "| ts       | $run_ts | . |"
            echo "| web      | $run_web | ${web_dir:-—} |"
            echo "| shell    | $run_shell | . |"
            echo "| docker   | $run_docker | . |"
            echo "| python   | $run_python | . |"
            echo "| scripts  | $run_scripts | . |"
            echo "| markdown | true (always) | . |"
            echo ""
            echo "code_changed: $code_changed"
          } >> "$GITHUB_STEP_SUMMARY"

  # The four sub-CI workflows below use local refs (uses: ./...), not @sha
  # pins. GitHub resolves a local reusable-workflow ref to the SAME commit a
  # consumer pinned ci.yaml to, so a fix to go-ci/ts-ci/shell-ci reaches
  # consumers on their next ci.yaml bump — no second internal-pin bump + tag
  # cycle. (A local COMPOSITE ACTION, by contrast, resolves against the
  # consumer's checkout and 404s — those must stay owner/repo/path@sha.)
  go:
    needs: detect
    if: ${{ needs.detect.outputs.run_go == 'true' }}
    uses: ./.github/workflows/go-ci.yaml

  # Nested Go modules (independent release lanes — see release.yaml's
  # go-nested job): `go test ./...` at the root does not cross module
  # boundaries, so each nested module runs the full go-ci battery at its own
  # directory, pinned to its own go.mod's Go version.
  go-nested:
    needs: detect
    if: ${{ needs.detect.outputs.run_go_nested == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJSON(needs.detect.outputs.go_nested_dirs) }}
    uses: ./.github/workflows/go-ci.yaml
    with:
      working-directory: ${{ matrix.dir }}
      go-version-file: ${{ matrix.dir }}/go.mod

  ts:
    needs: detect
    if: ${{ needs.detect.outputs.run_ts == 'true' }}
    uses: ./.github/workflows/ts-ci.yaml

  web:
    needs: detect
    if: ${{ needs.detect.outputs.run_web == 'true' }}
    uses: ./.github/workflows/ts-ci.yaml
    with:
      working-directory: ${{ needs.detect.outputs.web_dir }}
      web-lint: true

  shell:
    needs: detect
    if: ${{ needs.detect.outputs.run_shell == 'true' }}
    uses: ./.github/workflows/shell-ci.yaml

  # Build-ability gate. Before this job, a consumer's required `ci / validate`
  # never built the image — image builds happened only in the non-required
  # Security workflow (security-scan.yaml) and post-merge in Release. A
  # Dockerfile that fails to build (e.g. a package pin that doesn't exist in the
  # base image's repo) could therefore merge green and only surface when Release
  # failed. This job builds the image at PR time (single-arch, no push, no scan)
  # so a broken Dockerfile fails the required check. It is purely "does it
  # build" — vulnerability scanning stays advisory in security-scan.yaml so a
  # base-image CVE never blocks a merge or release.
  docker:
    needs: detect
    if: ${{ needs.detect.outputs.run_docker == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image (no push, no scan)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ci-smoke:latest
          cache-from: type=gha
          # Cache producer for the shared `buildkit` scope (the advisory
          # security scan reads from it). Keep exporting, but ignore-error so a
          # transient GHA cache-backend 504 on export can't fail the REQUIRED
          # build-ability gate — the image has already built by export time.
          cache-to: type=gha,mode=max,ignore-error=true

      # Runtime image smoke test, opt-in per repo (runs only when
      # tests/image-smoke.sh exists). Build-time smoke tests live inside the
      # Dockerfile (a `test` stage the final stage depends on — used by the
      # thin wrapper images). This step instead runs the *assembled* image and
      # probes it, catching failures the build can't see: a broken `//go:embed`
      # frontend, a missing runtime dependency, a server that never binds its
      # port, or a broken HEALTHCHECK. The script receives the loaded image ref
      # and owns run + probe + teardown. Used by the HTTP-serving apps.
      #
      # Blocking: promoted 2026-07 after the enrolled fleet showed a sustained
      # green history. A red runtime smoke fails the docker job and with it
      # the required `ci / validate` check.
      - name: Image smoke test
        if: ${{ hashFiles('tests/image-smoke.sh') != '' }}
        run: sh tests/image-smoke.sh ci-smoke:latest

  # arm64 build-ability gate. Same rationale as the amd64 `docker` job: without
  # it, an arch-specific Dockerfile break (a hardcoded amd64 download URL, a
  # wrong `uname -m` case, a base image without an arm64 manifest) merges green
  # and only surfaces when Release builds the arm64 leg on a native runner.
  # Build only — the smoke test runs once, on amd64. Public repos only: arm
  # hosted runners are free for public repos; a free-plan private repo's job
  # would queue forever and block the required check (every Dockerfile
  # consumer is public today).
  docker-arm64:
    needs: detect
    if: ${{ needs.detect.outputs.run_docker == 'true' && github.event.repository.private == false }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image (arm64, no push, no scan)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ci-smoke-arm64:latest
          # Distinct cache scope: the default `buildkit` scope carries the
          # amd64 layers (docker job + security scan); mixing arches in one
          # scope would evict each other.
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64,ignore-error=true

  # Markdown lint always runs (every repo has at least a README). Inline rather
  # than a separate reusable workflow so it needs no self-referencing pinned tag
  # and no per-repo config sync — the canonical rule set for consumer repos
  # lives here (it deliberately differs from cplieger/.kiro's own
  # .markdownlint.json, which is tuned for steering docs: e.g. MD033 here
  # allows a curated element list instead of disabling the rule).
  markdown:
    needs: detect
    runs-on: ubuntu-24.04
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - name: Install markdownlint-cli2
        run: |
          # renovate: datasource=npm depName=markdownlint-cli2
          VERSION=0.23.0
          npm install -g "markdownlint-cli2@${VERSION}"

      - name: Write markdownlint config
        run: |
          # Single-line echo (not a heredoc): heredocs in GHA run blocks break
          # silently when YAML dedent shifts the terminator. JSON on one line is
          # valid and indentation-proof.
          echo '{"default":true,"MD003":{"style":"atx"},"MD004":{"style":"dash"},"MD007":{"indent":2},"MD010":{"code_blocks":false},"MD013":false,"MD024":{"siblings_only":true},"MD025":{"front_matter_title":""},"MD029":{"style":"ordered"},"MD033":{"allowed_elements":["br","details","summary","sub","sup","img","div","a","p","kbd","picture","source"]},"MD035":{"style":"---"},"MD040":false,"MD041":false,"MD045":true,"MD046":{"style":"fenced"},"MD048":{"style":"backtick"},"MD049":{"style":"underscore"},"MD050":{"style":"asterisk"},"MD059":true}' > "$RUNNER_TEMP/.markdownlint.json"

      - name: Lint Markdown
        run: |
          markdownlint-cli2 --config "$RUNNER_TEMP/.markdownlint.json" \
            "**/*.md" "#node_modules" "#.git"

  # Python lint (ruff). Inline + canonical config, same rationale as markdown:
  # no self-referencing pinned tag, no per-repo config sync. Fires on any *.py
  # (e.g. cplieger/ci's audit.py + scripts/*.py).
  python:
    needs: detect
    if: ${{ needs.detect.outputs.run_python == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - name: Install ruff
        run: |
          # renovate: datasource=pypi depName=ruff
          VERSION=0.15.22
          pipx install "ruff==${VERSION}"

      - name: Lint Python (ruff check)
        run: ruff check --output-format github .

  # Config + tooling/docs lint for repos with no go.mod/jsr.json/Dockerfile
  # (Docker/Go/TS repos get shell + workflow lint via their own jobs). This is
  # the surface for the tooling repos that call the meta workflow (cplieger/ci,
  # cplieger/.github — the private repos run their own bespoke ci.yaml and do
  # not come through here), so it covers their full battery: workflows
  # (actionlint + zizmor), shell (lint + format), YAML, TOML, and secret
  # scanning. Soft-gated like shell-ci.yaml: each step records its name to
  # /tmp/_ci_failures on failure and the final step fails the job if any did.
  scripts:
    needs: detect
    if: ${{ needs.detect.outputs.run_scripts == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - name: Install actionlint
        run: |
          # renovate: datasource=github-releases depName=rhysd/actionlint
          VERSION=v1.7.12
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/${VERSION}/actionlint_${VERSION#v}_linux_amd64.tar.gz" \
            | tar -xzf - -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/actionlint

      - name: Install yamllint
        run: |
          # renovate: datasource=pypi depName=yamllint
          VERSION=1.38.0
          pip install -q --break-system-packages "yamllint==${VERSION}"

      - name: Install zizmor
        run: |
          # renovate: datasource=pypi depName=zizmor
          VERSION=1.27.0
          pipx install "zizmor==${VERSION}"

      - name: Install shellcheck
        run: |
          # The runner's preinstalled shellcheck false-positives SC2317 on
          # trap-invoked functions (fixed in 0.11.0). Pin it like shell-ci.yaml
          # so the gate matches local tooling and stays reproducible.
          # renovate: datasource=github-releases depName=koalaman/shellcheck
          VERSION=v0.11.0
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/${VERSION}/shellcheck-${VERSION}.linux.x86_64.tar.gz" \
            | tar -xzf - -C /tmp "shellcheck-${VERSION}/shellcheck"
          sudo mv "/tmp/shellcheck-${VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: Install shfmt
        run: |
          # renovate: datasource=github-releases depName=mvdan/sh
          VERSION=v3.13.1
          sudo curl -fsSL -o /usr/local/bin/shfmt \
            "https://github.com/mvdan/sh/releases/download/${VERSION}/shfmt_${VERSION}_linux_amd64"
          sudo chmod +x /usr/local/bin/shfmt

      - name: Lint workflows (actionlint)
        continue-on-error: true
        run: |
          (
            actionlint -color
          ) || { echo "Lint workflows (actionlint)" >> /tmp/_ci_failures; exit 1; }

      # Workflow security audit (template injection, credential persistence,
      # cache poisoning, unpinned refs, …). Offline mode: no GitHub API calls,
      # so no token and no rate-limit flakes. Repo-level suppressions with
      # rationale live in .github/zizmor.yml.
      - name: Audit workflows (zizmor)
        continue-on-error: true
        run: |
          (
            zizmor --no-online-audits .
          ) || { echo "Audit workflows (zizmor)" >> /tmp/_ci_failures; exit 1; }

      - name: Lint shell scripts (shellcheck)
        continue-on-error: true
        run: |
          (
            files=$(find . -name '*.sh' -not -path './.git/*')
            if [ -z "$files" ]; then
              echo "shellcheck: no *.sh found - skipping"
            else
              # shellcheck disable=SC2086
              shellcheck -x -S info $files
            fi
          ) || { echo "Lint shell scripts (shellcheck)" >> /tmp/_ci_failures; exit 1; }

      - name: Format check shell scripts (shfmt)
        continue-on-error: true
        run: |
          (
            files=$(find . -name '*.sh' -not -path './.git/*')
            if [ -z "$files" ]; then
              echo "shfmt: no *.sh found - skipping"
            else
              # shellcheck disable=SC2086
              shfmt -d -i 2 -ci -bn $files
            fi
          ) || { echo "Format check shell scripts (shfmt)" >> /tmp/_ci_failures; exit 1; }

      # yamllint: honour a repo-local config when present (e.g. .kiro's
      # .yamllint.yaml), else fall back to a relaxed default with a 150-char
      # line cap. Non-strict, so line-length etc. surface as warnings (exit 0),
      # not failures — matching the private repos' bespoke behaviour.
      - name: Lint YAML (yamllint)
        continue-on-error: true
        run: |
          (
            if [ -f .yamllint ] || [ -f .yamllint.yaml ] || [ -f .yamllint.yml ]; then
              yamllint .
            else
              yamllint -d "{extends: relaxed, rules: {line-length: {max: 150}}}" .
            fi
          ) || { echo "Lint YAML (yamllint)" >> /tmp/_ci_failures; exit 1; }

      - name: Validate TOML
        continue-on-error: true
        run: |
          (
            python3 -c "
          import tomllib, pathlib
          for p in pathlib.Path('.').rglob('*.toml'):
              if '.git' in p.parts:
                  continue
              tomllib.loads(p.read_text())
          "
          ) || { echo "Validate TOML" >> /tmp/_ci_failures; exit 1; }

      - name: Scan for secrets (gitleaks)
        continue-on-error: true
        run: |
          (
            # renovate: datasource=github-releases depName=gitleaks/gitleaks
            VERSION=v8.30.1
            curl -fsSL --retry 3 "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" | tar -xzf - -C /tmp gitleaks
            /tmp/gitleaks dir . --no-banner --redact --exit-code 1
          ) || { echo "Scan for secrets (gitleaks)" >> /tmp/_ci_failures; exit 1; }

      # git-cliff semantics probe (opt-in by file presence; today only
      # cplieger/ci ships it). The fleet's release boolean depends on
      # UNDOCUMENTED git-cliff bump behaviors (see the probe's header); this
      # step re-verifies them against the pinned binary and the shipped
      # consumer cliff config, so a Renovate bump of the git-cliff pin (or a
      # cliff-config edit) cannot merge if the new combination breaks the
      # release-gate contract.
      - name: Probe git-cliff bump semantics
        continue-on-error: true
        run: |
          (
            if [ -x scripts/test-cliff-bump-semantics.sh ]; then
              ./scripts/test-cliff-bump-semantics.sh
            else
              echo "no cliff semantics probe in this repo - skipping"
            fi
          ) || { echo "Probe git-cliff bump semantics" >> /tmp/_ci_failures; exit 1; }

      # Nested-module lane shell-semantics probe (opt-in by file presence).
      # The cliff probe above pins the git-cliff side of the lane contract;
      # this one pins the SHELL side (lane discovery eligibility, changed-path
      # classification, module-path verification, version guards, escaping)
      # that release.yaml and the meta ci.yaml embed inline — so an edit to
      # the prune list or classification loop cannot merge if it breaks the
      # pinned contract.
      - name: Probe nested-lane shell semantics
        continue-on-error: true
        run: |
          (
            if [ -x scripts/test-lane-semantics.sh ]; then
              ./scripts/test-lane-semantics.sh
            else
              echo "no lane semantics probe in this repo - skipping"
            fi
          ) || { echo "Probe nested-lane shell semantics" >> /tmp/_ci_failures; exit 1; }

      - name: Check results
        if: always()
        run: |
          if [ -f /tmp/_ci_failures ]; then
            echo "::error::Failed validation steps:"
            sort -u /tmp/_ci_failures >&2
            exit 1
          fi
          echo "All validation steps passed"

  # Aggregator — emits a single `ci / validate` check name that branch
  # protection rules can target (preserves the check name from the previous
  # per-type templates so existing branch-protection rules keep working
  # without per-repo updates).
  validate:
    needs: [detect, go, go-nested, ts, web, shell, docker, docker-arm64, markdown, python, scripts]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      - name: Aggregate CI dispatch results
        env:
          DETECT: ${{ needs.detect.result }}
          GO: ${{ needs.go.result }}
          GO_NESTED: ${{ needs.go-nested.result }}
          TS: ${{ needs.ts.result }}
          WEB: ${{ needs.web.result }}
          SHELL: ${{ needs.shell.result }}
          DOCKER: ${{ needs.docker.result }}
          DOCKER_ARM64: ${{ needs.docker-arm64.result }}
          MARKDOWN: ${{ needs.markdown.result }}
          PYTHON: ${{ needs.python.result }}
          SCRIPTS: ${{ needs.scripts.result }}
        run: |
          # detect must always succeed (it gates everything else)
          if [ "$DETECT" != "success" ]; then
            echo "::error::detect job did not succeed: $DETECT"
            exit 1
          fi
          # Each dispatched job must be either success (it ran and passed)
          # or skipped (auto-detect said it wasn't applicable). markdown always
          # runs, so it must be success (skipped only if detect failed, caught
          # above).
          for pair in "go=$GO" "go-nested=$GO_NESTED" "ts=$TS" "web=$WEB" "shell=$SHELL" "docker=$DOCKER" "docker-arm64=$DOCKER_ARM64" "markdown=$MARKDOWN" "python=$PYTHON" "scripts=$SCRIPTS"; do
            name="${pair%%=*}"; result="${pair##*=}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "::error::$name job: $result"
              exit 1
            fi
            echo "  $name: $result"
          done
          echo "All dispatched CI jobs passed (or skipped per auto-detect)"
