# Unified CI pipeline. Single entry point for all releaseable consumer repos.
#
# Mirrors the unified release.yaml architecture: a thin caller in each consumer
# repo invokes this meta workflow, which auto-detects the repo's surfaces and
# dispatches to the right reusable workflow. No per-repo config files; no
# per-type templates.
#
# Detection (all independent — a hybrid repo runs multiple jobs in parallel):
#   - has go.mod              → `go` job:    go-ci.yaml at root
#   - has jsr.json at root    → `ts` job:    ts-ci.yaml at root (no web-lint)
#   - has Dockerfile          → `shell` job: shell-ci.yaml (actionlint + hadolint
#                                            + shellcheck nullglob-safe + gitleaks)
#   - has nested web frontend → `web` job:   ts-ci.yaml at the detected dir,
#                                            web-lint=true (HTML+CSS lints)
#
# Web-frontend nested directory probe order:
#   static-src/  →  web/  →  internal/server/static-src/
# First match (with package.json or jsr.json inside) wins. New patterns can be
# added to the array below — adding a path is centralized, not per-repo.
name: CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      run_go: ${{ steps.detect.outputs.run_go }}
      run_ts: ${{ steps.detect.outputs.run_ts }}
      run_web: ${{ steps.detect.outputs.run_web }}
      run_shell: ${{ steps.detect.outputs.run_shell }}
      web_dir: ${{ steps.detect.outputs.web_dir }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Detect repo surfaces
        id: detect
        run: |
          run_go=false
          run_ts=false
          run_web=false
          run_shell=false
          web_dir=""

          [ -f go.mod ] && run_go=true
          [ -f jsr.json ] && run_ts=true
          [ -f Dockerfile ] && run_shell=true

          # Probe known nested web-frontend locations. First hit wins.
          # Add new paths centrally if a future repo introduces a different
          # layout — no per-repo override needed.
          for d in \
            "static-src" \
            "web" \
            "internal/server/static-src" \
          ; do
            if [ -d "$d" ] && { [ -f "$d/package.json" ] || [ -f "$d/jsr.json" ]; }; then
              web_dir="$d"
              run_web=true
              break
            fi
          done

          {
            echo "run_go=$run_go"
            echo "run_ts=$run_ts"
            echo "run_web=$run_web"
            echo "run_shell=$run_shell"
            echo "web_dir=$web_dir"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## CI dispatch"
            echo ""
            echo "| Surface | Detected | Path |"
            echo "|---|---|---|"
            echo "| go    | $run_go | . |"
            echo "| ts    | $run_ts | . |"
            echo "| web   | $run_web | ${web_dir:-—} |"
            echo "| shell | $run_shell | . |"
          } >> "$GITHUB_STEP_SUMMARY"

  go:
    needs: detect
    if: ${{ needs.detect.outputs.run_go == 'true' }}
    uses: cplieger/ci/.github/workflows/go-ci.yaml@a11d032fed6e0e9c7f7bf76438a41b9020e03851 # main

  ts:
    needs: detect
    if: ${{ needs.detect.outputs.run_ts == 'true' }}
    uses: cplieger/ci/.github/workflows/ts-ci.yaml@a11d032fed6e0e9c7f7bf76438a41b9020e03851 # main

  web:
    needs: detect
    if: ${{ needs.detect.outputs.run_web == 'true' }}
    uses: cplieger/ci/.github/workflows/ts-ci.yaml@a11d032fed6e0e9c7f7bf76438a41b9020e03851 # main
    with:
      working-directory: ${{ needs.detect.outputs.web_dir }}
      web-lint: true

  shell:
    needs: detect
    if: ${{ needs.detect.outputs.run_shell == 'true' }}
    uses: cplieger/ci/.github/workflows/shell-ci.yaml@a11d032fed6e0e9c7f7bf76438a41b9020e03851 # main

  # Aggregator — emits a single `ci / validate` check name that branch
  # protection rules can target (preserves the check name from the previous
  # per-type templates so existing branch-protection rules keep working
  # without per-repo updates).
  validate:
    needs: [detect, go, ts, web, shell]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      - name: Aggregate CI dispatch results
        env:
          DETECT: ${{ needs.detect.result }}
          GO: ${{ needs.go.result }}
          TS: ${{ needs.ts.result }}
          WEB: ${{ needs.web.result }}
          SHELL: ${{ needs.shell.result }}
        run: |
          # detect must always succeed (it gates everything else)
          if [ "$DETECT" != "success" ]; then
            echo "::error::detect job did not succeed: $DETECT"
            exit 1
          fi
          # Each dispatched job must be either success (it ran and passed)
          # or skipped (auto-detect said it wasn't applicable).
          for pair in "go=$GO" "ts=$TS" "web=$WEB" "shell=$SHELL"; do
            name="${pair%%=*}"; result="${pair##*=}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "::error::$name job: $result"
              exit 1
            fi
            echo "  $name: $result"
          done
          echo "All dispatched CI jobs passed (or skipped per auto-detect)"
