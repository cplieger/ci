name: Audit

# Weekly cross-public-repo compliance audit. Uses the job token (sufficient for
# public repos); set an AUDIT_PAT secret to also cover private repos later.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 6
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run cross-repo audit
        env:
          GH_TOKEN: ${{ secrets.AUDIT_PAT || github.token }}
        run: |
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python3 scripts/audit.py 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          status=${PIPESTATUS[0]}
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit "$status"
