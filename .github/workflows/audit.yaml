name: Audit

# Weekly cross-repo compliance audit. The merge-model checks read fields that
# the GitHub API only exposes to a CLASSIC PAT with the 'repo' scope — a
# fine-grained PAT does NOT serialize them, even with Administration:read.
# Set AUDIT_PAT to a classic 'repo'-scope PAT. Without it the audit aborts
# (exit 2) with a clear diagnostic rather than flagging every repo. The same
# classic 'repo' scope also reads repo webhooks, which the deploy-trigger
# webhook check needs; AUDIT_WEBHOOK_HOST supplies the orchestrator host for it
# (when unset, that one check is skipped rather than failing every repo).

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - name: Run cross-repo audit
        env:
          GH_TOKEN: ${{ secrets.AUDIT_PAT || github.token }}
          # Host of the self-hosted deploy-trigger orchestrator (private infra,
          # so it is a secret, not hardcoded in this public repo). When absent
          # the audit skips the per-repo webhook check instead of failing.
          AUDIT_WEBHOOK_HOST: ${{ secrets.AUDIT_WEBHOOK_HOST }}
        run: |
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          python3 scripts/audit.py 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          status=${PIPESTATUS[0]}
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit "$status"
