# Maintains moving major/minor tags for this reusable-workflow repo.
#
# When a semver release tag `vX.Y.Z` is pushed, this (re)points the major
# (`vX`) and minor (`vX.Y`) tags at that same commit. Consumers pin the
# reusable workflows as `@<sha> # vX` and let Renovate follow the `vX` tag,
# so moving `vX` here is what propagates a new release to every consumer
# (Renovate opens an auto-merged digest bump).
#
# This is GitHub's recommended pattern for action/reusable-workflow
# versioning — its absence is why `v1` froze at an early commit while the
# v1.x.x patch tags marched ahead.
#
# Note: `vX` (no dot) and `vX.Y` (one dot) do not match the vX.Y.Z trigger,
# so the force-pushes below cannot retrigger this workflow.
#
# Uses RELEASE_PAT, not GITHUB_TOKEN, for the tag push: a release whose tree
# touches .github/workflows/** (the common case — most releases here ARE
# workflow changes) needs the `workflows` permission to force-move a ref onto
# that commit, and GITHUB_TOKEN cannot carry it ("refusing to allow a GitHub
# App to create or update workflow ... without `workflows` permission"). This
# mirrors self-release.yaml's tag push, which hit the same wall for the same
# reason.
name: Move major/minor tags

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# Top-level read-only (OpenSSF Scorecard Token-Permissions); the tag push uses
# RELEASE_PAT instead, see the note above.
permissions:
  contents: read

concurrency:
  group: move-major-tag
  cancel-in-progress: false

jobs:
  move-tags:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify release token
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_PAT:-}" ]; then
            echo "::error::RELEASE_PAT secret is missing or empty. Set it to a fine-grained PAT scoped to cplieger/ci with Contents: write + Workflows: write (moving vX/vX.Y onto a commit that touches .github/workflows/ needs the workflows permission GITHUB_TOKEN cannot carry)."
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Do not persist the default token in git config; the push below
          # authenticates with RELEASE_PAT via a scoped, one-shot auth header
          # instead (mirrors self-release.yaml's push step).
          persist-credentials: false

      - name: Point major and minor tags at this release
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail
          major="${TAG%%.*}"   # v2.1.3 -> v2
          minor="${TAG%.*}"    # v2.1.3 -> v2.1
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "Pointing ${major} and ${minor} at ${TAG} (${SHA})"
          git tag -f "${major}" "${SHA}"
          git tag -f "${minor}" "${SHA}"
          AUTH="$(printf 'x-access-token:%s' "$RELEASE_PAT" | base64 | tr -d '\n')"
          git config "http.https://github.com/.extraheader" "AUTHORIZATION: basic ${AUTH}"
          trap 'git config --unset-all "http.https://github.com/.extraheader" || true' EXIT
          git push -f origin "refs/tags/${major}" "refs/tags/${minor}"
