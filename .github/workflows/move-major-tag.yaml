# Maintains moving major/minor tags for this reusable-workflow repo.
#
# When a semver release tag `vX.Y.Z` is pushed, this (re)points the major
# (`vX`) and minor (`vX.Y`) tags at that same commit. Consumers pin the
# reusable workflows as `@<sha> # vX` and let Renovate follow the `vX` tag,
# so moving `vX` here is what propagates a new release to every consumer
# (Renovate opens an auto-merged digest bump).
#
# This is GitHub's recommended pattern for action/reusable-workflow
# versioning — its absence is why `v1` froze at an early commit while the
# v1.x.x patch tags marched ahead.
#
# Note: `vX` (no dot) and `vX.Y` (one dot) do not match the vX.Y.Z trigger,
# so the force-pushes below cannot retrigger this workflow.
name: Move major/minor tags

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

concurrency:
  group: move-major-tag
  cancel-in-progress: false

jobs:
  move-tags:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write # force-move the major/minor tags
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Point major and minor tags at this release
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          major="${TAG%%.*}"   # v2.1.3 -> v2
          minor="${TAG%.*}"    # v2.1.3 -> v2.1
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "Pointing ${major} and ${minor} at ${TAG} (${SHA})"
          git tag -f "${major}" "${SHA}"
          git tag -f "${minor}" "${SHA}"
          git push -f origin "refs/tags/${major}" "refs/tags/${minor}"
