# Daily security scan across the public cplieger consumer repos.
#
# Schedule:           Daily 03:00 UTC
# What it does:       Dispatches `security.yml` (the synced consumer security
#                     workflow) on every PUBLIC consumer repo. Trivy fs scan on
#                     all repos; Trivy image scan additionally on Dockerfile
#                     repos. Auto-detected by `security.yml`.
# Private repos:      Deliberately excluded. Public-repo Actions minutes are
#                     free; private repos are the only consumers of the
#                     account's included minutes, and both (homelab, .kiro)
#                     run bespoke CI on their own weekly cadence (homelab's
#                     security.yml has its own Mon 08:00 cron). A daily
#                     central dispatch on top of that was pure redundant burn.
# Concurrency note:   `gh workflow run` is fire-and-forget, so max-parallel
#                     below paces only the DISPATCH calls, not the scans — the
#                     ~41 dispatched security.yml runs start near-simultaneously
#                     and compete for the account's 20 concurrent-job slots.
#                     Accepted: each scan is brief (~3 min), the burst drains in
#                     minutes, and 03:00 UTC is dead time for ad-hoc work. The
#                     scans must run in each consumer repo (SARIF uploads target
#                     the repo they run in), so pulling the work into this
#                     matrix — the way weekly-gremlins bounds real work — is not
#                     an option here.
name: Daily security scan

on:
  schedule:
    - cron: "0 3 * * *"   # daily 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-security
  cancel-in-progress: false

jobs:
  fanout:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.fanout.outputs.matrix }}
    steps:
      - name: Discover public repos with security.yml
        id: fanout
        env:
          GH_TOKEN: ${{ secrets.CI_SCHEDULE }}
        run: |
          set -euo pipefail
          # Public only (visibility rule, not a repo-name list): private repos
          # draw the account's included minutes and own their scan cadence —
          # see the "Private repos" note in the header.
          repos=$(gh repo list cplieger --limit 300 --json name,isArchived,visibility --jq '
            [.[] | select(.isArchived == false and .visibility == "PUBLIC") | .name] | .[]
          ')
          REPOS=()
          for r in $repos; do
            if gh workflow view security.yml -R "cplieger/${r}" >/dev/null 2>&1; then
              REPOS+=("$r")
            fi
          done
          matrix=$(printf '%s\n' "${REPOS[@]}" | jq -R . | jq -s -c '[.[] | {repo: .}]')
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "Total repos: $(echo "$matrix" | jq 'length')"

  dispatch:
    needs: fanout
    if: ${{ needs.fanout.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      max-parallel: 4   # security scan is brief; cap low to free slots for ad-hoc work
      matrix:
        include: ${{ fromJSON(needs.fanout.outputs.matrix) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.CI_SCHEDULE }}
    steps:
      - name: Trigger security.yml on cplieger/${{ matrix.repo }}
        run: |
          gh workflow run security.yml -R "cplieger/${{ matrix.repo }}" --ref main
