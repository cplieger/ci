name: Security Scan

on:
  workflow_call:
    inputs:
      build-context:
        description: 'Docker build context path'
        type: string
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile'
        type: string
        default: './Dockerfile'
      severity:
        description: 'Trivy severity levels'
        type: string
        default: 'HIGH,CRITICAL'

permissions:
  contents: read

# Trivy binary version, pinned so local scans match what CI runs:
# cplieger/ci's scripts/install-local-tools.sh reads this same pin via
# `pin_version aquasecurity/trivy`. Without an explicit version the
# trivy-action installs its own baked-in default (v0.70.0 at the pinned SHA),
# which silently drifts from the binary other workflows install directly.
env:
  # renovate: datasource=github-releases depName=aquasecurity/trivy
  TRIVY_VERSION: v0.71.2

jobs:
  trivy:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Accept documented misconfig false-positives (fleet-wide)
        # DS-0002 (no USER): distroless images bake in nonroot UID 65534; some
        # apps legitimately require root. DS-0026 (no HEALTHCHECK): healthchecks
        # are defined in compose, not the Dockerfile. Ephemeral (not committed
        # to consumer repos); Trivy auto-loads .trivyignore from the workdir.
        run: printf '%s\n' AVD-DS-0002 AVD-DS-0026 DS-0002 DS-0026 > .trivyignore

      - name: Resolve profile
        id: profile
        run: |
          set -euo pipefail
          if [ -f Dockerfile ]; then echo 'image=true' >> "$GITHUB_OUTPUT"; else echo 'image=false' >> "$GITHUB_OUTPUT"; fi

      - name: Set up Docker Buildx
        if: ${{ steps.profile.outputs.image == 'true' }}
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image (no push)
        if: ${{ steps.profile.outputs.image == 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile }}
          push: false
          load: true
          tags: ci-scan:latest
          # Pure cache consumer — no cache-to by design. This throwaway scan
          # build reads the layers the required build-ability gate (ci.yaml
          # `docker` job) exports to the same default `buildkit` scope. It must
          # not ALSO export: a redundant mode=max push to the flaky GHA cache
          # backend clobbers the gate's cache and can 504, failing this
          # otherwise-advisory job (which is exactly what happened).
          cache-from: type=gha

      # All Trivy scans here are ADVISORY (exit-code 0): they upload SARIF to
      # the Security tab (and drive the OpenSSF/vuln badges) but never fail the
      # check or block a merge. CVEs in the base image are frequently outside
      # the maintainer's immediate control (no upstream fix yet, or not yet
      # picked up), so gating merges/releases on them is the wrong lever.
      # Build-ability — the only thing fully in our control — is gated by the
      # required `ci / validate` check (the `docker` job in the meta ci.yaml),
      # not here.
      - name: Trivy filesystem scan (advisory)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: fs
          scanners: 'vuln,secret'
          severity: ${{ inputs.severity }}
          ignore-unfixed: true
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-fs.sarif'

      - name: Trivy misconfig scan (report-only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: fs
          scanners: 'misconfig'
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-misconfig.sarif'

      - name: Trivy image scan (advisory)
        if: ${{ steps.profile.outputs.image == 'true' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          image-ref: 'ci-scan:latest'
          severity: ${{ inputs.severity }}
          ignore-unfixed: true
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-image.sarif'

      - name: Upload SARIF — filesystem
        if: ${{ always() && hashFiles('trivy-fs.sarif') != '' && github.event.repository.private == false }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-fs'

      - name: Upload SARIF — misconfig
        if: ${{ always() && hashFiles('trivy-misconfig.sarif') != '' && github.event.repository.private == false }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: 'trivy-misconfig.sarif'
          category: 'trivy-misconfig'

      - name: Upload SARIF — image
        if: ${{ always() && steps.profile.outputs.image == 'true' && hashFiles('trivy-image.sarif') != '' && github.event.repository.private == false }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image'
