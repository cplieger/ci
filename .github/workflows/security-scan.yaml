name: Security Scan

on:
  workflow_call:
    inputs:
      build-context:
        description: 'Docker build context path'
        type: string
        default: '.'
      dockerfile:
        description: 'Path to Dockerfile'
        type: string
        default: './Dockerfile'
      severity:
        description: 'Trivy severity levels'
        type: string
        default: 'HIGH,CRITICAL'

permissions:
  contents: read

# Trivy binary version, pinned so local scans match what CI runs:
# cplieger/ci's scripts/install-local-tools.sh reads this same pin via
# `pin_version aquasecurity/trivy`. Without an explicit version the
# trivy-action installs its own baked-in default (v0.70.0 at the pinned SHA),
# which silently drifts from the binary other workflows install directly.
env:
  # renovate: datasource=github-releases depName=aquasecurity/trivy
  TRIVY_VERSION: v0.72.0

jobs:
  trivy:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - name: Accept documented misconfig false-positives (all repos)
        # DS-0002 (no USER): distroless images bake in nonroot UID 65534; some
        # apps legitimately require root. DS-0026 (no HEALTHCHECK): healthchecks
        # are defined in compose, not the Dockerfile. Ephemeral (not committed
        # to consumer repos); Trivy auto-loads .trivyignore from the workdir.
        run: printf '%s\n' AVD-DS-0002 AVD-DS-0026 DS-0002 DS-0026 > .trivyignore

      - name: Resolve profile
        id: profile
        run: |
          set -euo pipefail
          if [ -f Dockerfile ]; then echo 'image=true' >> "$GITHUB_OUTPUT"; else echo 'image=false' >> "$GITHUB_OUTPUT"; fi

      - name: Set up Docker Buildx
        if: ${{ steps.profile.outputs.image == 'true' }}
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image (no push)
        if: ${{ steps.profile.outputs.image == 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile }}
          push: false
          load: true
          tags: ci-scan:latest
          # Pure cache consumer — no cache-to by design. This throwaway scan
          # build reads the layers the required build-ability gate (ci.yaml
          # `docker` job) exports to the same default `buildkit` scope. It must
          # not ALSO export: a redundant mode=max push to the flaky GHA cache
          # backend clobbers the gate's cache and can 504, failing this
          # otherwise-advisory job (which is exactly what happened).
          cache-from: type=gha

      # All Trivy scans here are ADVISORY (exit-code 0): they upload SARIF to
      # the Security tab (and drive the OpenSSF/vuln badges) but never fail the
      # check or block a merge. CVEs in the base image are frequently outside
      # the maintainer's immediate control (no upstream fix yet, or not yet
      # picked up), so gating merges/releases on them is the wrong lever.
      # Build-ability — the only thing fully in our control — is gated by the
      # required `ci / validate` check (the `docker` job in the meta ci.yaml),
      # not here.
      - name: Trivy filesystem scan (advisory)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: fs
          scanners: 'vuln,secret'
          severity: ${{ inputs.severity }}
          ignore-unfixed: true
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-fs.sarif'

      - name: Trivy misconfig scan (report-only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: fs
          scanners: 'misconfig'
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-misconfig.sarif'

      - name: Trivy image scan (advisory)
        if: ${{ steps.profile.outputs.image == 'true' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          image-ref: 'ci-scan:latest'
          severity: ${{ inputs.severity }}
          ignore-unfixed: true
          exit-code: '0'
          format: 'sarif'
          output: 'trivy-image.sarif'

      - name: Upload SARIF — filesystem
        if: ${{ always() && hashFiles('trivy-fs.sarif') != '' && github.event.repository.private == false }}
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-fs'

      - name: Upload SARIF — misconfig
        if: ${{ always() && hashFiles('trivy-misconfig.sarif') != '' && github.event.repository.private == false }}
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: 'trivy-misconfig.sarif'
          category: 'trivy-misconfig'

      - name: Upload SARIF — image
        if: ${{ always() && steps.profile.outputs.image == 'true' && hashFiles('trivy-image.sarif') != '' && github.event.repository.private == false }}
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image'

  # Full-HISTORY secret scan (advisory). The CI gates run `gitleaks dir` on
  # the working tree only, so a secret that was committed and later removed is
  # invisible to them; this job walks every commit. Advisory like the Trivy
  # scans above (exit-code 0 + SARIF to the Security tab): a historical leak
  # needs rotation + history rewrite, not a blocked merge. GitHub's own secret
  # scanning also covers pushes on public repos; this adds the gitleaks
  # ruleset and a scheduled full-history sweep (via daily-security).
  gitleaks-history:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          # No step in this job pushes with checkout-persisted credentials;
          # do not leave the token in .git/config (zizmor: artipacked).
          persist-credentials: false

      - name: Scan full git history (gitleaks, advisory)
        run: |
          # renovate: datasource=github-releases depName=gitleaks/gitleaks
          VERSION=v8.30.1
          curl -fsSL --retry 3 "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" | tar -xzf - -C /tmp gitleaks
          /tmp/gitleaks git . --no-banner --redact --exit-code 0 \
            --report-format sarif --report-path gitleaks-history.sarif

      - name: Upload SARIF — gitleaks history
        if: ${{ always() && hashFiles('gitleaks-history.sarif') != '' && github.event.repository.private == false }}
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4.37.2
        with:
          sarif_file: 'gitleaks-history.sarif'
          category: 'gitleaks-history'
