name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: cplieger/ci/.github/workflows/release.yaml@4e0a6937409828785a87d9eba577315d6cce50e0 # v1
    secrets: inherit
