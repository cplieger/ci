name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: cplieger/ci/.github/workflows/release.yaml@49ec4be725bc5117be1181418964b0df22bd87d8 # v1
    secrets: inherit
