# Canonical shared files → consumer repos (synced as PRs by sync.yaml).
# TODO: confirm the repo list as library repos are created.

group:
  # Go libraries + tool: lint, changelog, editor configs.
  - repos: |
      cplieger/health
      cplieger/metrics
      cplieger/auth
      cplieger/vterm
      cplieger/wiregen
      cplieger/ssrf
      cplieger/httpx
      cplieger/atomicfile
    files:
      - .golangci.yaml
      - cliff.toml
      - .editorconfig

  # Go apps: lint + editor config only. Each keeps its own cliff.toml — the
  # [bump] track differs (stable apps 1.x, alpha apps 0.x) so the shared
  # cliff.toml is intentionally not synced here.
  - repos: |
      cplieger/cert-converter
      cplieger/plex-exporter
      cplieger/plex-language-sync
      cplieger/registry-stats
      cplieger/docker-fclones-scheduler
      cplieger/docker-age
      cplieger/tautulli-remap
      cplieger/subflux
      cplieger/vibecli
      cplieger/vibekit
    files:
      - .golangci.yaml
      - .editorconfig

  # TypeScript libraries: lint/format bases (imported by each repo's own
  # eslint.config.mjs), changelog, editor config.
  - repos: |
      cplieger/reactive
      cplieger/actions
      cplieger/vterm
    files:
      - source: configs/eslint.config.base.mjs
        dest: eslint.config.base.mjs
      - source: configs/prettier.json
        dest: .prettierrc.json
      - source: configs/stylelint.json
        dest: .stylelintrc.json
      - source: configs/htmlvalidate.json
        dest: .htmlvalidate.json
      - .editorconfig
      - cliff.toml

  # Docker image repos (shell-based builds): editor config only. Each keeps
  # its own stable-1.x cliff.toml (the shared cliff.toml is the 0.x alpha one).
  - repos: |
      cplieger/docker-smtp-relay
      cplieger/docker-nut-upsd
      cplieger/docker-radvd
      cplieger/docker-keepalived
      cplieger/docker-caddy
      cplieger/docker-static-web
    files:
      - .editorconfig
