# Canonical shared files → consumer repos (synced as PRs by sync.yaml).

group:
  # Go libraries: lint, changelog, editor configs + workflow callers.
  - repos: |
      cplieger/health
      cplieger/metrics
      cplieger/auth
      cplieger/wiregen
      cplieger/ssrf
      cplieger/httpx
      cplieger/atomicfile
    files:
      - .golangci.yaml
      - cliff.toml
      - .editorconfig
      - source: .github/workflow-templates/ci-go.yml
        dest: .github/workflows/ci.yaml
      - source: .github/workflow-templates/codeql.yml
        dest: .github/workflows/codeql.yml
      - source: .github/workflow-templates/security.yml
        dest: .github/workflows/security.yml
      - source: .github/workflow-templates/release-go.yml
        dest: .github/workflows/release.yaml

  # vterm is cross-language (Go + TS); synced for Go lint/editor only +
  # universal CodeQL caller (auto-detect handles Go+TS).
  - repos: |
      cplieger/vterm
    files:
      - .golangci.yaml
      - cliff.toml
      - .editorconfig
      - source: .github/workflow-templates/codeql.yml
        dest: .github/workflows/codeql.yml

  # Go apps: lint + editor config + codeql + ci + security (no release — apps
  # build images via their own build.yaml).
  - repos: |
      cplieger/cert-converter
      cplieger/plex-exporter
      cplieger/plex-language-sync
      cplieger/registry-stats
      cplieger/docker-fclones-scheduler
      cplieger/docker-age
      cplieger/tautulli-remap
      cplieger/subflux
      cplieger/vibecli
      cplieger/vibekit
    files:
      - .golangci.yaml
      - .editorconfig
      - source: .github/workflow-templates/ci-go.yml
        dest: .github/workflows/ci.yaml
      - source: .github/workflow-templates/codeql.yml
        dest: .github/workflows/codeql.yml
      - source: .github/workflow-templates/security.yml
        dest: .github/workflows/security.yml

  # TypeScript libraries: lint/format bases, changelog, editor config +
  # workflow callers (excludes vterm — cross-language).
  - repos: |
      cplieger/reactive
      cplieger/actions
    files:
      - source: configs/eslint.config.base.mjs
        dest: eslint.config.base.mjs
      - source: configs/prettier.json
        dest: .prettierrc.json
      - source: configs/stylelint.json
        dest: .stylelintrc.json
      - source: configs/htmlvalidate.json
        dest: .htmlvalidate.json
      - .editorconfig
      - cliff.toml
      - source: .github/workflow-templates/codeql.yml
        dest: .github/workflows/codeql.yml
      - source: .github/workflow-templates/security.yml
        dest: .github/workflows/security.yml
      - source: .github/workflow-templates/release-ts.yml
        dest: .github/workflows/release.yaml

  # vterm TS configs only (cross-language; no workflow callers synced).
  - repos: |
      cplieger/vterm
    files:
      - source: configs/eslint.config.base.mjs
        dest: eslint.config.base.mjs
      - source: configs/prettier.json
        dest: .prettierrc.json
      - source: configs/stylelint.json
        dest: .stylelintrc.json
      - source: configs/htmlvalidate.json
        dest: .htmlvalidate.json
      - .editorconfig
      - cliff.toml

  # Docker image repos (shell-based builds): editor config + security.
  - repos: |
      cplieger/docker-smtp-relay
      cplieger/docker-nut-upsd
      cplieger/docker-radvd
      cplieger/docker-keepalived
      cplieger/docker-caddy
      cplieger/docker-static-web
    files:
      - .editorconfig
      - source: .github/workflow-templates/security.yml
        dest: .github/workflows/security.yml
